// COMPONENT: SolicitacoesTab
// ═══════════════════════════════════════════════════════════
function SolicitacoesTab({ purchaseRequests, onUpdateRequests, caps, purchaseHistory, onUpdateHistory, priceMap, userName, users }) {
  const [filter,    setFilter]    = useState('PENDENTE')
  const [detailReq, setDetailReq] = useState(null)

  const visible = purchaseRequests
    .filter(r=>filter===''||r.status===filter)
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))

  const saveRequest = (updatedReq, newStatus) => {
    const reqs = purchaseRequests.map(r => r.id === updatedReq.id ? updatedReq : r)
    onUpdateRequests(reqs)
    saveRequests(reqs)
    if (newStatus === 'APROVADO') {
      const price = priceMap?.get(updatedReq.code)
      const entry = {
        id: Date.now().toString() + Math.random().toString(36).slice(2),
        code: updatedReq.code,
        description: updatedReq.description || updatedReq.code,
        brand: updatedReq.brand || price?.brand || '',
        qty: updatedReq.qty || 1,
        pv: price?.pv || updatedReq.pv || 0,
        cityGroup: updatedReq.cityGroup || 'BELTRAO',
        date: todayStr(),
        enteredBy: userName || sessionStorage.getItem('sc_name') || 'Sistema',
        fromRequest: updatedReq.id,
      }
      const h = [...(purchaseHistory||[]), entry]
      onUpdateHistory(h)
      saveHistory(h)
    }
  }

  const quickAction = (req, status) => {
    const updated = { ...req, status, resolvedAt: new Date().toISOString() }
    saveRequest(updated, status)
  }

  return (
    <div className="solicit-tab">
      <div className="page-header">
        <div>
          <h2 className="page-title">Solicitações de Compra</h2>
          <p className="page-subtitle">{purchaseRequests.filter(r=>r.status==='PENDENTE').length} pendente(s)</p>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['','PENDENTE','APROVADO','RECUSADO'].map(s=>(
            <button key={s} className={`btn btn-sm ${filter===s?'btn-yellow':'btn-ghost'}`}
              onClick={()=>setFilter(s)}>{s||'Todas'}</button>
          ))}
        </div>
      </div>
      {visible.length===0
        ?<div className="table-empty"><div className="table-empty-icon">📋</div><p>Nenhuma solicitação.</p></div>
        :(
          <div className="table-scroll">
            <table className="product-table">
              <thead><tr>
                <th>Código</th><th>Descrição</th><th>Cidade</th>
                <th className="num">Qtd</th><th>Solicitado por</th><th>Tipo</th><th>Data</th>
                <th>Observação / Resposta</th><th>Status</th>
                <th>Ver</th>
                {caps.canApprove&&<th>Ações</th>}
              </tr></thead>
              <tbody>
                {visible.map((r,idx)=>(
                  <tr key={r.id} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                    <td className="mono">{r.code}</td>
                    <td title={r.description}>{(r.description||'').slice(0,40)}{(r.description||'').length>40&&'...'}</td>
                    <td><span className={`empresa-badge ${r.cityGroup==='BELTRAO'?'beltrao':r.cityGroup==='TOLEDO'?'toledo':'dv'}`}>{r.cityGroup==='BELTRAO'?'Beltrão':r.cityGroup==='TOLEDO'?'Toledo':'Dois Viz.'}</span></td>
                    <td className="num">{r.qty}</td>
                    <td>{r.createdBy}</td>
                    <td><span style={{fontSize:11,padding:'2px 6px',borderRadius:4,background:'var(--surface)',border:'1px solid var(--border)'}}>{r.tipo==='VENDA_CASADA'?'Venda Casada':r.tipo==='PROJETO'?'Projeto':'Estoque'}</span></td>
                    <td>{fmtDate(r.createdAt)}</td>
                    <td title={r.response||r.observation}>
                      {r.response
                        ? <span style={{color:'var(--info)',fontSize:12}}>💬 {r.response.slice(0,25)}{r.response.length>25&&'...'}</span>
                        : <span style={{color:'var(--muted)',fontSize:12}}>{(r.observation||'').slice(0,25)}{(r.observation||'').length>25&&'...'}</span>
                      }
                    </td>
                    <td><span className={`status-tag status-${(r.status||'').toLowerCase()}`}>{r.status}</span></td>
                    <td>
                      <button className="btn btn-sm btn-ghost" onClick={()=>setDetailReq(r)}>🔍 Ver</button>
                    </td>
                    {caps.canApprove&&(
                      <td>
                        {r.status==='PENDENTE'&&(
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn btn-sm" style={{background:'var(--success-bg)',color:'var(--success)',border:'1px solid var(--success)'}}
                              onClick={()=>quickAction(r,'APROVADO')}>✔</button>
                            <button className="btn btn-sm" style={{background:'var(--danger-bg)',color:'var(--danger)',border:'1px solid var(--danger)'}}
                              onClick={()=>quickAction(r,'RECUSADO')}>✘</button>
                          </div>
                        )}
                      </td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      }
      {detailReq&&(
        <SolicitacaoDetailModal
          req={detailReq}
          users={users||[]}
          caps={caps}
          userName={userName}
          priceMap={priceMap}
          onClose={()=>setDetailReq(null)}
          onSave={(updated, status) => { saveRequest(updated, status); setDetailReq(null) }}
        />
      )}
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: FinancialTab
// ═══════════════════════════════════════════════════════════
const EMPTY_LINE = {code:'',description:'',brand:'',qty:1,pv:0}

function FinancialTab({ purchaseHistory, onUpdateHistory, caps, onDeleteOrder, rawItems, priceMap, userName }) {
  const [showAdd,   setShowAdd]   = useState(false)
  const [editItem,    setEditItem]    = useState(null)
  const [deleteId,    setDeleteId]    = useState(null)
  // multi-item registration state
  const [regCity,   setRegCity]   = useState('BELTRAO')
  const [regDate,   setRegDate]   = useState(todayStr())
  const [regLines,  setRegLines]  = useState([{...EMPTY_LINE}])
  const [suggest,   setSuggest]   = useState({idx:-1,list:[]})  // autocomplete

  const searchItems = (q, idx) => {
    if (!q || q.length < 2) { setSuggest({idx:-1,list:[]}); return }
    const nq = normStr(q)
    const seen = new Set()
    const hits = []
    rawItems.forEach(i => {
      if (seen.has(i.code)) return
      if (normStr(i.code).includes(nq)||normStr(i.description).includes(nq)) {
        const price = priceMap?.get(i.code) ?? {}
        hits.push({code:i.code, description:i.description, brand:price.brand||i.brand||'', pv:price.pv||0})
        seen.add(i.code)
      }
    })
    priceMap?.forEach((v,k) => {
      if (!seen.has(k) && normStr(k).includes(nq)) {
        hits.push({code:k, description:k, brand:v.brand||'', pv:v.pv||0})
        seen.add(k)
      }
    })
    setSuggest({idx, list:hits.slice(0,8)})
  }

  const pickSuggest = (item) => {
    setRegLines(prev => prev.map((l,i) => i===suggest.idx ? {...l,...item} : l))
    setSuggest({idx:-1, list:[]})
  }

  const setLine = (idx, field, val) => {
    setRegLines(prev => prev.map((l,i) => i===idx ? {...l,[field]:val} : l))
    if (field==='code'||field==='description') searchItems(val, idx)
    else setSuggest({idx:-1,list:[]})
  }

  const addLine  = () => setRegLines(prev=>[...prev,{...EMPTY_LINE}])
  const remLine  = idx => setRegLines(prev=>prev.filter((_,i)=>i!==idx))

  const doAdd = () => {
    const valid = regLines.filter(l=>l.code.trim())
    if (!valid.length) return
    const newEntries = valid.map(l=>({
      id: Date.now().toString()+Math.random().toString(36).slice(2),
      code:l.code.trim(), description:l.description||l.code, brand:l.brand,
      qty:l.qty||1, pv:l.pv||0, cityGroup:regCity, date:regDate,
      enteredBy: userName || sessionStorage.getItem('sc_name') || 'Sistema',
    }))
    const h = [...purchaseHistory, ...newEntries]
    onUpdateHistory(h); saveHistory(h)
    setShowAdd(false)
    setRegLines([{...EMPTY_LINE}]); setSuggest({idx:-1,list:[]})
  }

  const doEdit = () => {
    const h = purchaseHistory.map(x => x.id===editItem.id ? {...x,...editItem} : x)
    onUpdateHistory(h)
    saveHistory(h)
    // Sync sc_orders too (remove old, keep by id)
    const allOrders = getOrders().map(o => o.id===editItem.id ? {...o,...editItem} : o)
    saveOrders(allOrders)
    setEditItem(null)
  }

  const doDelete = (id) => {
    const h = purchaseHistory.filter(x => x.id !== id)
    onUpdateHistory(h)
    saveHistory(h)
    const allOrders = getOrders().filter(o => o.id !== id)
    saveOrders(allOrders)
    if (onDeleteOrder) onDeleteOrder(allOrders)
    setDeleteId(null)
  }

  const byMonth = useMemo(() => {
    const m = new Map()
    purchaseHistory.forEach(h => {
      const key = (h.date||'').slice(0,7)
      if (!m.has(key)) m.set(key,{total:0,count:0})
      const e = m.get(key)
      e.total += (h.qty||0)*(h.pv||0)
      e.count += 1
    })
    return [...m.entries()].sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12)
  },[purchaseHistory])

  return (
    <div className="financial-tab">
      <div className="page-header">
        <div>
          <h2 className="page-title">Financeiro</h2>
          <p className="page-subtitle">Histórico de compras e resumo mensal</p>
        </div>
        <button className="btn btn-yellow" onClick={()=>setShowAdd(true)}>+ Registrar Compra</button>
      </div>

      {byMonth.length>0&&(
        <div className="fin-grid">
          {byMonth.map(([month,data])=>(
            <div key={month} className="fin-card">
              <div className="fin-month">{month}</div>
              <div className="fin-value">{fmtBRL(data.total)}</div>
              <div className="fin-count">{data.count} pedido(s)</div>
            </div>
          ))}
        </div>
      )}

      <div className="table-scroll">
        <table className="product-table">
          <thead><tr>
            <th>Código</th><th>Descrição</th><th>Cidade</th>
            <th className="num">Qtd</th><th className="num">PV</th><th className="num">Total</th><th>Data</th>
            {caps?.canEdit&&<th style={{width:80}}>Ações</th>}
          </tr></thead>
          <tbody>
            {purchaseHistory.slice().reverse().map((h,idx)=>(
              <tr key={h.id} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                <td className="mono">{h.code}</td>
                <td>{h.description}</td>
                <td>{h.cityGroup}</td>
                <td className="num">{h.qty}</td>
                <td className="num">{fmtBRL(h.pv)}</td>
                <td className="num"><strong>{fmtBRL((h.qty||0)*(h.pv||0))}</strong></td>
                <td>{fmtDate(h.date)}</td>
                {caps?.canEdit&&(
                  <td style={{whiteSpace:'nowrap'}}>
                    <button className="btn btn-sm btn-secondary" style={{marginRight:4}}
                      onClick={()=>setEditItem({...h})}>✏️</button>
                    <button className="btn btn-sm" style={{background:'var(--danger-bg)',color:'var(--danger)'}}
                      onClick={()=>setDeleteId(h.id)}>🗑️</button>
                  </td>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {editItem&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditItem(null)}>
          <div className="modal">
            <div className="modal-header">
              <h2 className="modal-title">Editar Pedido</h2>
              <button className="modal-close" onClick={()=>setEditItem(null)}>✕</button>
            </div>
            <div className="modal-body">
              {[['Código','code','text'],['Descrição','description','text'],['Data','date','date']].map(([lbl,key,type])=>(
                <div key={key} className="form-field">
                  <label>{lbl}</label>
                  <input type={type} className="login-input" value={editItem[key]||''}
                    onChange={e=>setEditItem({...editItem,[key]:e.target.value})}/>
                </div>
              ))}
              <div className="form-field">
                <label>Quantidade</label>
                <input type="number" className="login-input" min="1" value={editItem.qty||1}
                  onChange={e=>setEditItem({...editItem,qty:parseInt(e.target.value)||1})}/>
              </div>
              <div className="form-field">
                <label>PV (R$)</label>
                <input type="number" className="login-input" min="0" step="0.01" value={editItem.pv||0}
                  onChange={e=>setEditItem({...editItem,pv:parseFloat(e.target.value)||0})}/>
              </div>
              <div className="form-field">
                <label>Cidade</label>
                <select className="login-input" value={editItem.cityGroup||'BELTRAO'}
                  onChange={e=>setEditItem({...editItem,cityGroup:e.target.value})}>
                  <option value="BELTRAO">Beltrão</option>
                  <option value="TOLEDO">Toledo</option>
                  <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
                </select>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setEditItem(null)}>Cancelar</button>
              <button className="btn btn-yellow" onClick={doEdit}>💾 Salvar</button>
            </div>
          </div>
        </div>
      )}

      {showAdd&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&(setShowAdd(false),setSuggest({idx:-1,list:[]}))}>
          <div className="modal" style={{maxWidth:680,width:'95vw'}}>
            <div className="modal-header">
              <h2 className="modal-title">Registrar Compra</h2>
              <button className="modal-close" onClick={()=>setShowAdd(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
                <div className="form-field" style={{flex:1,minWidth:130}}>
                  <label>Data</label>
                  <input type="date" className="login-input" value={regDate} onChange={e=>setRegDate(e.target.value)}/>
                </div>
                <div className="form-field" style={{flex:1,minWidth:130}}>
                  <label>Cidade</label>
                  <select className="filter-select" style={{width:'100%'}} value={regCity} onChange={e=>setRegCity(e.target.value)}>
                    <option value="BELTRAO">Beltrão</option>
                    <option value="TOLEDO">Toledo</option>
                    <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
                  </select>
                </div>
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:.5}}>Itens da Compra</div>
              {regLines.map((line,idx)=>(
                <div key={idx} style={{position:'relative',background:'var(--surface2)',borderRadius:6,padding:'10px 12px',marginBottom:8}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 2fr auto auto auto',gap:8,alignItems:'center'}}>
                    <div style={{position:'relative'}}>
                      <input className="login-input" placeholder="Código" value={line.code}
                        onChange={e=>setLine(idx,'code',e.target.value)}
                        onBlur={()=>setTimeout(()=>setSuggest(p=>p.idx===idx?{idx:-1,list:[]}:p),150)}
                        style={{fontSize:12,padding:'6px 8px'}}/>
                      {suggest.idx===idx&&suggest.list.length>0&&(
                        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--card)',border:'1px solid var(--border)',borderRadius:4,zIndex:50,maxHeight:180,overflowY:'auto'}}>
                          {suggest.list.map(s=>(
                            <div key={s.code} onMouseDown={()=>pickSuggest(s)}
                              style={{padding:'6px 10px',cursor:'pointer',fontSize:12,borderBottom:'1px solid var(--border)'}}
                              onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                              <span style={{color:'var(--accent)',marginRight:6}}>{s.code}</span>
                              <span style={{color:'var(--muted)'}}>{s.description?.slice(0,40)}</span>
                              {s.brand&&<span className="brand-badge" style={{marginLeft:6,fontSize:10}}>{s.brand}</span>}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                    <input className="login-input" placeholder="Descrição" value={line.description}
                      onChange={e=>setLine(idx,'description',e.target.value)}
                      style={{fontSize:12,padding:'6px 8px'}}/>
                    <input className="login-input" type="number" placeholder="Qtd" min="1" value={line.qty}
                      onChange={e=>setLine(idx,'qty',parseInt(e.target.value)||1)}
                      style={{width:60,fontSize:12,padding:'6px 8px'}}/>
                    <input className="login-input" type="number" placeholder="PV" min="0" step="0.01" value={line.pv}
                      onChange={e=>setLine(idx,'pv',parseFloat(e.target.value)||0)}
                      style={{width:90,fontSize:12,padding:'6px 8px'}}/>
                    {regLines.length>1
                      ? <button className="btn btn-sm" style={{background:'var(--danger-bg)',color:'var(--danger)',padding:'4px 8px'}} onClick={()=>remLine(idx)}>✕</button>
                      : <div style={{width:32}}/>}
                  </div>
                  {line.brand&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Fabricante: <strong>{line.brand}</strong>{line.pv>0&&<span style={{marginLeft:8}}>PV: {fmtBRL(line.pv)}</span>}</div>}
                </div>
              ))}
              <button className="btn btn-secondary btn-sm" onClick={addLine} style={{marginTop:4}}>+ Adicionar item</button>
            </div>
            <div className="modal-actions">
              <button className="btn btn-yellow" onClick={doAdd}>💾 Salvar Compra</button>
              <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
      {deleteId&&(
        <ConfirmModal
          title="Remover pedido"
          message="Remover este registro do histórico? Essa ação não pode ser desfeita."
          confirmLabel="Remover"
          confirmClass="btn-danger"
          onConfirm={()=>doDelete(deleteId)}
          onCancel={()=>setDeleteId(null)}/>
      )}
    </div>
  )
}

// COMPONENT: ComprasTab
// ═══════════════════════════════════════════════════════════
const STATUS_PEDIDO = {
  aguardando:   { label:'Aguardando',    color:'var(--warning)',  bg:'var(--warning-bg)' },
  parcial:      { label:'Parcial',       color:'var(--purple)',   bg:'var(--purple-bg)' },
  faturado:     { label:'Faturado',      color:'var(--info)',     bg:'var(--info-bg)' },
  em_transito:  { label:'Em Trânsito',   color:'var(--info)',     bg:'var(--info-bg)' },
  entregue:     { label:'Entregue',      color:'var(--success)',  bg:'var(--success-bg)' },
  cancelado:    { label:'Cancelado',     color:'var(--danger)',   bg:'var(--danger-bg)' },
}
const badgePedido = s => {
  const cfg = STATUS_PEDIDO[s] || { label:s, color:'var(--muted)', bg:'var(--card2)' }
  return <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:4,background:cfg.bg,color:cfg.color}}>{cfg.label}</span>
}
const ITEM0 = { codigo:'', descricao:'', quantidade:'1', valor_unit:'' }
const FORM0_PEDIDO = { numero:'', data_pedido:new Date().toISOString().slice(0,10), loja_cnpj:'35369505000102', fornecedor:'', fornecedor_cnpj:'', previsao_entrega:'', observacoes:'', status:'aguardando' }

function ComprasTab({ userName }) {
  const [pedidos,    setPedidos]   = useState([])
  const [loading,    setLoading]   = useState(false)
  const [lojaFilt,   setLojaFilt]  = useState('')
  const [statusFilt, setStatusFilt]= useState('')
  const [detail,     setDetail]    = useState(null)
  const [showForm,   setShowForm]  = useState(false)
  const [editId,     setEditId]    = useState(null)
  const [form,       setForm]      = useState(FORM0_PEDIDO)
  const [itens,      setItens]     = useState([{...ITEM0}])
  const [saving,     setSaving]    = useState(false)
  const [error,      setError]     = useState(null)

  const load = async () => {
    setLoading(true); setError(null)
    try { setPedidos(await dbLoadPedidos(lojaFilt)) }
    catch(e) { setError(e.message) }
    finally { setLoading(false) }
  }
  useEffect(() => { load() }, [lojaFilt])

  const openNew = () => {
    setEditId(null); setForm({...FORM0_PEDIDO, created_by: userName||''}); setItens([{...ITEM0}]); setShowForm(true); setError(null)
  }
  const openEdit = p => {
    setEditId(p.id)
    setForm({ numero:p.numero, data_pedido:p.data_pedido?.slice(0,10)||'', loja_cnpj:p.loja_cnpj,
               fornecedor:p.fornecedor||'', previsao_entrega:p.previsao_entrega?.slice(0,10)||'',
               observacoes:p.observacoes||'', status:p.status||'aguardando', created_by:p.created_by||'' })
    setItens(p.pedido_itens?.length
      ? p.pedido_itens.map(i=>({ codigo:i.codigo||'', descricao:i.descricao||'', quantidade:String(i.quantidade||1), valor_unit:String(fromCents(i.valor_unit_centavos)||'') }))
      : [{...ITEM0}])
    setShowForm(true); setError(null)
  }
  const closeForm = () => { setShowForm(false); setEditId(null) }

  const addItem = () => setItens(p=>[...p,{...ITEM0}])
  const setItem = (i,k,v) => setItens(p=>p.map((it,idx)=>idx===i?{...it,[k]:v}:it))
  const removeItem = i => setItens(p=>p.filter((_,idx)=>idx!==i))

  const save = async () => {
    setSaving(true); setError(null)
    try {
      await dbSavePedido({...form}, itens, editId)
      closeForm(); load()
    } catch(e) { setError(e.message) }
    finally { setSaving(false) }
  }
  const deletePedido = async id => {
    if (!confirm('Excluir pedido?')) return
    await dbDeletePedido(id); load()
    if (detail?.id===id) setDetail(null)
  }

  const visivel = pedidos.filter(p => !statusFilt || p.status===statusFilt)
  const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '—'

  const totalLinha = it => {
    const q = parseFloat(it.quantidade)||0
    const v = parseFloat(String(it.valor_unit||'').replace(',','.'))||0
    return q*v
  }

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {/* Cabeçalho */}
      <div className="page-header" style={{marginBottom:0}}>
        <div>
          <h2 className="page-title">🛒 Pedidos de Compra</h2>
          <p className="page-subtitle">{visivel.length} pedido(s)</p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select className="filter-input" value={lojaFilt} onChange={e=>setLojaFilt(e.target.value)}>
            <option value=''>Todas as lojas</option>
            {LOJAS.map(l=><option key={l.id} value={l.cnpjRaw}>{l.nome}</option>)}
          </select>
          <select className="filter-input" value={statusFilt} onChange={e=>setStatusFilt(e.target.value)}>
            <option value=''>Todos os status</option>
            {Object.entries(STATUS_PEDIDO).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          <button className="btn btn-yellow btn-sm" onClick={openNew}>+ Novo Pedido</button>
        </div>
      </div>

      {error && <div className="alert alert-danger">{error}</div>}

      {/* Modal formulário */}
      {showForm && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)',width:'100%',maxWidth:780,maxHeight:'90vh',overflowY:'auto',padding:24,display:'flex',flexDirection:'column',gap:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{margin:0,fontSize:16}}>{editId?'Editar Pedido':'Novo Pedido de Compra'}</h3>
              <button className="btn btn-sm btn-ghost" onClick={closeForm}>✕</button>
            </div>
            {error && <div className="alert alert-danger" style={{margin:0}}>{error}</div>}

            {/* Campos principais */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>NÚMERO DO PEDIDO *</label>
                <input className="login-input" value={form.numero} onChange={e=>setForm(p=>({...p,numero:e.target.value}))} placeholder="Ex: 01846829"/>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>DATA DO PEDIDO</label>
                <input type="date" className="login-input" value={form.data_pedido} onChange={e=>setForm(p=>({...p,data_pedido:e.target.value}))}/>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>LOJA *</label>
                <select className="login-input" value={form.loja_cnpj} onChange={e=>setForm(p=>({...p,loja_cnpj:e.target.value}))}>
                  {LOJAS.map(l=><option key={l.id} value={l.cnpjRaw}>{l.nome}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>FORNECEDOR</label>
                <input className="login-input" value={form.fornecedor} onChange={e=>setForm(p=>({...p,fornecedor:e.target.value}))} placeholder="Intelbras, etc."/>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>CNPJ FORNECEDOR</label>
                <input className="login-input" value={form.fornecedor_cnpj} onChange={e=>setForm(p=>({...p,fornecedor_cnpj:e.target.value}))} placeholder="00.000.000/0000-00"/>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>PREVISÃO DE ENTREGA</label>
                <input type="date" className="login-input" value={form.previsao_entrega} onChange={e=>setForm(p=>({...p,previsao_entrega:e.target.value}))}/>
              </div>
              <div>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>STATUS</label>
                <select className="login-input" value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
                  {Object.entries(STATUS_PEDIDO).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>OBSERVAÇÕES</label>
              <input className="login-input" value={form.observacoes} onChange={e=>setForm(p=>({...p,observacoes:e.target.value}))} placeholder="Condição de pagamento, etc."/>
            </div>

            {/* Itens */}
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <label style={{fontSize:12,fontWeight:700}}>Itens do Pedido</label>
                <button className="btn btn-sm btn-ghost" onClick={addItem}>+ Linha</button>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    {['Código','Descrição *','Qtd','Valor Unit. (R$)','Total',''].map(h=>(
                      <th key={h} style={{padding:'4px 6px',textAlign:h==='Total'||h==='Qtd'?'right':'left',color:'var(--muted)',fontWeight:600,fontSize:11}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {itens.map((it,i)=>(
                    <tr key={i}>
                      <td style={{padding:'4px 4px'}}><input className="login-input" style={{padding:'4px 6px',width:90}} value={it.codigo} onChange={e=>setItem(i,'codigo',e.target.value)} placeholder="Código"/></td>
                      <td style={{padding:'4px 4px'}}><input className="login-input" style={{padding:'4px 6px',width:'100%'}} value={it.descricao} onChange={e=>setItem(i,'descricao',e.target.value)} placeholder="Descrição do produto"/></td>
                      <td style={{padding:'4px 4px'}}><input className="login-input" style={{padding:'4px 6px',width:56,textAlign:'right'}} value={it.quantidade} onChange={e=>setItem(i,'quantidade',e.target.value)}/></td>
                      <td style={{padding:'4px 4px'}}><input className="login-input" style={{padding:'4px 6px',width:90,textAlign:'right'}} value={it.valor_unit} onChange={e=>setItem(i,'valor_unit',e.target.value)} placeholder="0,00"/></td>
                      <td style={{padding:'4px 8px',textAlign:'right',whiteSpace:'nowrap'}}>{fmtCents(toCents(totalLinha(it)))}</td>
                      <td style={{padding:'4px 4px'}}>{itens.length>1&&<button className="btn btn-sm btn-ghost" style={{padding:'2px 6px',color:'var(--danger)'}} onClick={()=>removeItem(i)}>✕</button>}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr>
                    <td colSpan={4} style={{padding:'8px 8px',textAlign:'right',fontSize:12,fontWeight:700,color:'var(--muted)'}}>TOTAL DO PEDIDO</td>
                    <td style={{padding:'8px 8px',textAlign:'right',fontWeight:800,fontSize:14,color:'var(--accent)'}}>{fmtCents(toCents(itens.reduce((s,it)=>s+totalLinha(it),0)))}</td>
                    <td/>
                  </tr>
                </tfoot>
              </table>
            </div>

            <div style={{display:'flex',gap:8,justifyContent:'flex-end',paddingTop:8,borderTop:'1px solid var(--border)'}}>
              <button className="btn btn-ghost" onClick={closeForm}>Cancelar</button>
              <button className="btn btn-yellow" disabled={saving} onClick={save}>{saving?'Salvando...':'Salvar Pedido'}</button>
            </div>
          </div>
        </div>
      )}

      {/* Layout lista + detalhe */}
      <div style={{display:'flex',gap:12,minHeight:400}}>
        {/* Lista */}
        <div style={{flex:1,overflowX:'auto'}}>
          {loading ? <div style={{padding:32,textAlign:'center',color:'var(--muted)'}}>Carregando...</div> : (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{borderBottom:'2px solid var(--border)'}}>
                  {['Número','Data','Loja','Fornecedor','Itens','Total','Status','Previsão',''].map(h=>(
                    <th key={h} style={{padding:'8px 10px',textAlign:'left',fontSize:11,color:'var(--muted)',fontWeight:700,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {visivel.length===0 && <tr><td colSpan={9} style={{padding:32,textAlign:'center',color:'var(--muted)'}}>Nenhum pedido encontrado.</td></tr>}
                {visivel.map(p=>{
                  const totalCents = p.pedido_itens?.reduce((s,i)=>s+fromCents(i.valor_unit_centavos)*(i.quantidade||0),0)||0
                  const isSelected = detail?.id===p.id
                  return (
                    <tr key={p.id} onClick={()=>setDetail(isSelected?null:p)}
                      style={{borderBottom:'1px solid var(--border)',cursor:'pointer',
                        background:isSelected?'var(--card2)':'transparent',transition:'background .1s'}}>
                      <td style={{padding:'8px 10px',fontWeight:700,color:'var(--accent)'}}>{p.numero}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{fmtDate(p.data_pedido)}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{lojaNome(p.loja_cnpj)}</td>
                      <td style={{padding:'8px 10px'}}>{p.fornecedor||'—'}</td>
                      <td style={{padding:'8px 10px',textAlign:'center'}}>{p.pedido_itens?.length||0}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{totalCents>0?fmtCents(toCents(totalCents)):'—'}</td>
                      <td style={{padding:'8px 10px'}}>{badgePedido(p.status)}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{fmtDate(p.previsao_entrega)}</td>
                      <td style={{padding:'8px 10px'}}>
                        <div style={{display:'flex',gap:4}}>
                          <button className="btn btn-sm btn-ghost" onClick={e=>{e.stopPropagation();openEdit(p)}} title="Editar">✏️</button>
                          <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)'}} onClick={e=>{e.stopPropagation();deletePedido(p.id)}} title="Excluir">🗑</button>
                        </div>
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          )}
        </div>

        {/* Painel de detalhe */}
        {detail && (
          <div style={{width:360,flexShrink:0,background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:16,overflowY:'auto',maxHeight:600}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:14}}>Pedido {detail.numero}</span>
              <button className="btn btn-sm btn-ghost" onClick={()=>setDetail(null)}>✕</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:12,marginBottom:12}}>
              <div><span style={{color:'var(--muted)'}}>Loja: </span><strong>{lojaNome(detail.loja_cnpj)}</strong></div>
              <div><span style={{color:'var(--muted)'}}>Fornecedor: </span><strong>{detail.fornecedor||'—'}</strong></div>
              <div><span style={{color:'var(--muted)'}}>Data: </span>{fmtDate(detail.data_pedido)}</div>
              <div><span style={{color:'var(--muted)'}}>Previsão: </span>{fmtDate(detail.previsao_entrega)}</div>
              <div><span style={{color:'var(--muted)'}}>Status: </span>{badgePedido(detail.status)}</div>
              {detail.observacoes&&<div style={{color:'var(--muted)',fontStyle:'italic'}}>{detail.observacoes}</div>}
            </div>
            <div style={{fontSize:12,fontWeight:700,marginBottom:6,borderTop:'1px solid var(--border)',paddingTop:10}}>Itens</div>
            {(detail.pedido_itens||[]).map((it,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                <div>
                  {it.codigo&&<span style={{fontFamily:'monospace',color:'var(--muted)',marginRight:6}}>{it.codigo}</span>}
                  {it.descricao}
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                  <div>{it.quantidade}×{fmtCents(it.valor_unit_centavos)}</div>
                  <div style={{fontWeight:700}}>{fmtCents(toCents(fromCents(it.valor_unit_centavos)*(it.quantidade||0)))}</div>
                </div>
              </div>
            ))}
            {detail.notas_fiscais?.length>0 && (
              <>
                <div style={{fontSize:12,fontWeight:700,marginBottom:6,borderTop:'1px solid var(--border)',paddingTop:10}}>Nota Fiscal Vinculada</div>
                {detail.notas_fiscais.map(nf=>(
                  <div key={nf.id} style={{fontSize:12,background:'var(--success-bg)',borderRadius:6,padding:'8px 10px'}}>
                    <div style={{fontWeight:700,color:'var(--success)'}}>NF {nf.numero} — {fmtCents(nf.valor_total_centavos)}</div>
                    <div style={{color:'var(--muted)'}}>{fmtDate(nf.data_emissao)}</div>
                  </div>
                ))}
              </>
            )}
          </div>
        )}
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: NFeTab
// ═══════════════════════════════════════════════════════════
const STATUS_VINCULO = {
  pendente:   { label:'Pendente',   color:'var(--warning)', bg:'var(--warning-bg)' },
  sugerido:   { label:'Sugerido',   color:'var(--info)',    bg:'var(--info-bg)'    },
  vinculado:  { label:'Vinculado',  color:'var(--success)', bg:'var(--success-bg)' },
  sem_pedido: { label:'Sem pedido', color:'var(--danger)',  bg:'var(--danger-bg)'  },
}
const badgeVinculo = s => {
  const cfg = STATUS_VINCULO[s] || { label:s||'—', color:'var(--muted)', bg:'var(--card2)' }
  return <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:4,background:cfg.bg,color:cfg.color}}>{cfg.label}</span>
}

function NFeTab() {
  const [notas,      setNotas]     = useState([])
  const [pedidos,    setPedidos]   = useState([])
  const [loading,    setLoading]   = useState(false)
  const [lojaFilt,   setLojaFilt]  = useState('')
  const [vincFilt,   setVincFilt]  = useState('')
  const [detail,     setDetail]    = useState(null)
  const [linkId,     setLinkId]    = useState(null)
  const [linkSearch, setLinkSearch]= useState('')
  const [error,      setError]     = useState(null)
  const [motor,      setMotor]     = useState(null)   // {running, prog, total, current, resultados}

  const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '—'

  const load = async () => {
    setLoading(true); setError(null)
    try {
      const [n, p] = await Promise.all([
        dbLoadNotas(lojaFilt, vincFilt),
        dbLoadPedidos(''),
      ])
      setNotas(n); setPedidos(p)
    } catch(e) { setError(e.message) }
    finally { setLoading(false) }
  }
  useEffect(() => { load() }, [lojaFilt, vincFilt])

  const vincularManual = async (nfId, pedidoId) => {
    await dbVincularManual(nfId, pedidoId)
    setLinkId(null); setLinkSearch(''); load()
  }

  const confirmarVinculo = async (nfId, pedidoId) => {
    const nfData = notas.find(n=>n.id===nfId)
    const previsao = nfData ? calcPrevisaoChegada(nfData.data_emissao, detectarUF(nfData.emit_cnpj, nfData.emit_uf)) : null
    await sb.from('notas_fiscais').update({ status_vinculo:'vinculado', acao_necessaria:'', previsao_chegada: previsao }).eq('id',nfId)
    if (pedidoId) await sb.from('pedidos').update({ status:'faturado', previsao_entrega: previsao, updated_at:new Date().toISOString() }).eq('id',pedidoId)
    await sb.from('vinculo_log').insert({ nf_id:nfId, pedido_id:pedidoId, evento:'confirmado', detalhe:'Confirmado pelo usuário' })
    load()
  }

  const rejeitarVinculo = async (nfId) => {
    await sb.from('notas_fiscais').update({ status_vinculo:'sem_pedido', pedido_id:null, score_confianca:0, acao_necessaria:'revisão manual' }).eq('id',nfId)
    await sb.from('vinculo_log').insert({ nf_id:nfId, evento:'rejeitado', detalhe:'Sugestão rejeitada pelo usuário' })
    load()
  }

  const [confirmandoTodos, setConfirmandoTodos] = useState(false)
  const confirmarTodos = async () => {
    const sugeridas = notas.filter(n => n.status_vinculo === 'sugerido' && n.pedido_id)
    if (!sugeridas.length) return
    setConfirmandoTodos(true)
    try {
      for (const nf of sugeridas) {
        const previsao = calcPrevisaoChegada(nf.data_emissao, detectarUF(nf.emit_cnpj, nf.emit_uf))
        await sb.from('notas_fiscais').update({ status_vinculo:'vinculado', acao_necessaria:'', previsao_chegada: previsao }).eq('id', nf.id)
        if (nf.pedido_id) await sb.from('pedidos').update({ status:'faturado', previsao_entrega: previsao, updated_at: new Date().toISOString() }).eq('id', nf.pedido_id)
        await sb.from('vinculo_log').insert({ nf_id: nf.id, pedido_id: nf.pedido_id, evento:'confirmado', detalhe:'Confirmado em lote pelo usuário' })
      }
      load()
    } finally {
      setConfirmandoTodos(false)
    }
  }

  const rodarMotor = async (retry=false, tudo=false) => {
    setMotor({ running:true, prog:0, total:0, current:'', resultados:[] })
    try {
      const res = await executarMotorVinculo((prog, total, cur) =>
        setMotor(p => ({ ...p, prog, total, current:cur })), retry, tudo
      )
      setMotor({ running:false, prog:res.length, total:res.length, current:'', resultados:res })
      load()
    } catch(e) {
      setMotor(p => ({ ...p, running:false, current:'Erro: '+e.message }))
    }
  }

  const pedidosParaVinculo = pedidos.filter(p => {
    const q = linkSearch.toLowerCase()
    return !q || p.numero.toLowerCase().includes(q) || (p.fornecedor||'').toLowerCase().includes(q)
  })

  const scoreColor = s => s>=80?'var(--success)':s>=50?'var(--warning)':'var(--danger)'
  const scoreBg    = s => s>=80?'var(--success-bg)':s>=50?'var(--warning-bg)':'var(--danger-bg)'

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="page-header" style={{marginBottom:0}}>
        <div>
          <h2 className="page-title">📋 Notas Fiscais</h2>
          <p className="page-subtitle">{notas.length} nota(s)</p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select className="filter-input" value={lojaFilt} onChange={e=>setLojaFilt(e.target.value)}>
            <option value=''>Todas as lojas</option>
            {LOJAS.map(l=><option key={l.id} value={l.cnpjRaw}>{l.nome}</option>)}
          </select>
          <select className="filter-input" value={vincFilt} onChange={e=>setVincFilt(e.target.value)}>
            <option value=''>Todos os vínculos</option>
            {Object.entries(STATUS_VINCULO).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          <button className="btn btn-sm btn-ghost" onClick={load} title="Recarregar">🔄</button>
          <button className="btn btn-sm btn-yellow" disabled={motor?.running} onClick={()=>rodarMotor(false)} title="Processa apenas NF-e novas (pendente)">
            {motor?.running ? `⚙️ ${motor.prog}/${motor.total}` : '⚙️ Motor de Vínculo'}
          </button>
          <button className="btn btn-sm btn-ghost" disabled={motor?.running} onClick={()=>rodarMotor(true)} title="Re-tenta NF-e sem pedido também">
            ↩ Retry
          </button>
          <button className="btn btn-sm btn-ghost" disabled={motor?.running} onClick={()=>rodarMotor(false,true)} title="Reprocessa todas as NF-e inclusive já vinculadas/sugeridas">
            ↺ Tudo
          </button>
          {notas.some(n=>n.status_vinculo==='sugerido')&&(
            <button className="btn btn-sm btn-ghost" disabled={confirmandoTodos} onClick={confirmarTodos}
              style={{color:'var(--success)',border:'1px solid var(--success)'}}
              title="Confirma todos os vínculos sugeridos de uma vez">
              {confirmandoTodos ? '⏳ Confirmando...' : `✓ Aceitar todos (${notas.filter(n=>n.status_vinculo==='sugerido').length})`}
            </button>
          )}
        </div>
      </div>

      {/* Progresso / resultado do motor */}
      {motor && (
        <div style={{background:motor.running?'var(--info-bg)':'var(--success-bg)',
                     border:`1px solid ${motor.running?'var(--info)':'var(--success)'}`,
                     borderRadius:'var(--r)',padding:'10px 16px',display:'flex',flexDirection:'column',gap:6}}>
          {motor.running ? (
            <>
              <div style={{fontSize:13,fontWeight:700,color:'var(--info)'}}>
                ⚙️ Processando {motor.prog}/{motor.total} — {motor.current}
              </div>
              <div style={{height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
                <div style={{height:'100%',background:'var(--info)',width:`${motor.total?motor.prog/motor.total*100:0}%`,transition:'width .3s'}}/>
              </div>
            </>
          ) : (
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:700,fontSize:13,color:'var(--success)'}}>
                ✅ Motor concluído — {motor.resultados?.length||0} notas processadas
                {' · '}{motor.resultados?.filter(r=>r.status==='vinculado').length||0} vinculadas
                {' · '}{motor.resultados?.filter(r=>r.status==='sugerido').length||0} aguardando confirmação
              </span>
              <button className="btn btn-sm btn-ghost" onClick={()=>setMotor(null)}>✕</button>
            </div>
          )}
        </div>
      )}

      {error && <div className="alert alert-danger">{error}</div>}

      {/* Modal vínculo manual */}
      {linkId && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)',width:'100%',maxWidth:480,padding:24}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
              <h3 style={{margin:0,fontSize:15}}>Vincular NF manualmente</h3>
              <button className="btn btn-sm btn-ghost" onClick={()=>setLinkId(null)}>✕</button>
            </div>
            <input className="login-input" style={{marginBottom:10}} placeholder="Buscar pedido por número ou fornecedor…" value={linkSearch} onChange={e=>setLinkSearch(e.target.value)} autoFocus/>
            <div style={{maxHeight:260,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
              {pedidosParaVinculo.slice(0,30).map(p=>(
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--card)',borderRadius:6,border:'1px solid var(--border)'}}>
                  <div style={{fontSize:13}}>
                    <strong style={{color:'var(--accent)'}}>{p.numero}</strong>
                    <span style={{color:'var(--muted)',marginLeft:8}}>{p.fornecedor||'—'}</span>
                    <span style={{color:'var(--muted2)',marginLeft:8,fontSize:11}}>{lojaNome(p.loja_cnpj)}</span>
                  </div>
                  <button className="btn btn-sm btn-yellow" onClick={()=>vincularManual(linkId,p.id)}>Vincular</button>
                </div>
              ))}
              {pedidosParaVinculo.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:16}}>Nenhum pedido encontrado.</div>}
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
        {/* Lista */}
        <div style={{flex:1,overflowX:'auto',minWidth:0}}>
          {loading ? <div style={{padding:32,textAlign:'center',color:'var(--muted)'}}>Carregando...</div> : (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:780}}>
              <thead>
                <tr style={{borderBottom:'2px solid var(--border)'}}>
                  {['NF / Série','Data','Emitente','Loja','Valor Total','Score','Prev. Chegada','Vínculo',''].map(h=>(
                    <th key={h} style={{padding:'8px 10px',textAlign:'left',fontSize:11,color:'var(--muted)',fontWeight:700,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {notas.length===0&&<tr><td colSpan={9} style={{padding:32,textAlign:'center',color:'var(--muted)'}}>Nenhuma nota fiscal encontrada.</td></tr>}
                {notas.map(nf=>{
                  const isSelected = detail?.id===nf.id
                  return (
                    <tr key={nf.id} onClick={()=>setDetail(isSelected?null:nf)}
                      style={{borderBottom:'1px solid var(--border)',cursor:'pointer',background:isSelected?'var(--card2)':'transparent'}}>
                      <td style={{padding:'8px 10px',fontWeight:700,color:'var(--accent)',whiteSpace:'nowrap'}}>{nf.numero}{nf.serie?`/${nf.serie}`:''}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{fmtDate(nf.data_emissao)}</td>
                      <td style={{padding:'8px 10px',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{nf.emit_nome||'—'}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{lojaNome(nf.loja_cnpj)}</td>
                      <td style={{padding:'8px 10px',fontWeight:700,whiteSpace:'nowrap'}}>{fmtCents(nf.valor_total_centavos)}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>
                        {nf.score_confianca>0
                          ? <span style={{background:(nf.score_confianca>=80?'var(--success)':nf.score_confianca>=50?'var(--info)':'var(--muted)')+'22',color:nf.score_confianca>=80?'var(--success)':nf.score_confianca>=50?'var(--info)':'var(--muted)',borderRadius:4,padding:'2px 6px',fontWeight:700,fontSize:12}}>{nf.score_confianca}</span>
                          : '—'}
                      </td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{nf.previsao_chegada?fmtDate(nf.previsao_chegada):'—'}</td>
                      <td style={{padding:'8px 10px'}}>{badgeVinculo(nf.status_vinculo)}</td>
                      <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>
                        {nf.status_vinculo==='sugerido'&&(
                          <>
                            <button className="btn btn-sm btn-ghost" onClick={e=>{e.stopPropagation();confirmarVinculo(nf.id,nf.pedido_id)}} title="Confirmar vínculo sugerido" style={{color:'var(--success)',marginRight:4}}>✓</button>
                            <button className="btn btn-sm btn-ghost" onClick={e=>{e.stopPropagation();rejeitarVinculo(nf.id)}} title="Rejeitar sugestão" style={{color:'var(--danger)',marginRight:4}}>✗</button>
                          </>
                        )}
                        {nf.status_vinculo!=='vinculado'&&(
                          <button className="btn btn-sm btn-ghost" onClick={e=>{e.stopPropagation();setLinkId(nf.id);setLinkSearch('')}} title="Vincular manualmente a pedido">🔗</button>
                        )}
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          )}
        </div>

        {/* Painel detalhe */}
        {detail && (
          <div style={{width:380,flexShrink:0,background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:16,overflowY:'auto',maxHeight:'calc(100vh - 180px)',position:'sticky',top:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:14}}>NF {detail.numero}{detail.serie?`/${detail.serie}`:''}</span>
              <button className="btn btn-sm btn-ghost" onClick={()=>setDetail(null)}>✕</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5,fontSize:12,marginBottom:12}}>
              <div><span style={{color:'var(--muted)'}}>Emitente: </span><strong>{detail.emit_nome||'—'}</strong></div>
              {detail.emit_cnpj&&<div style={{color:'var(--muted)',fontSize:11}}>{detail.emit_cnpj}</div>}
              <div><span style={{color:'var(--muted)'}}>Loja: </span><strong>{lojaNome(detail.loja_cnpj)}</strong></div>
              <div><span style={{color:'var(--muted)'}}>Data emissão: </span>{fmtDate(detail.data_emissao)}</div>
              <div><span style={{color:'var(--muted)'}}>Valor total: </span><strong style={{color:'var(--accent)'}}>{fmtCents(detail.valor_total_centavos)}</strong></div>
              {detail.base_calculo_centavos>0&&<div><span style={{color:'var(--muted)'}}>Base ICMS: </span>{fmtCents(detail.base_calculo_centavos)}</div>}
              {detail.icms_centavos>0&&<div><span style={{color:'var(--muted)'}}>ICMS: </span>{fmtCents(detail.icms_centavos)}</div>}
              {detail.pis_centavos>0&&<div><span style={{color:'var(--muted)'}}>PIS: </span>{fmtCents(detail.pis_centavos)}</div>}
              {detail.cofins_centavos>0&&<div><span style={{color:'var(--muted)'}}>COFINS: </span>{fmtCents(detail.cofins_centavos)}</div>}
              {detail.desconto_centavos>0&&<div><span style={{color:'var(--muted)'}}>Desconto: </span>{fmtCents(detail.desconto_centavos)}</div>}
              {detail.cond_pagamento&&<div><span style={{color:'var(--muted)'}}>Cond. pag.: </span>{detail.cond_pagamento}</div>}
              <div><span style={{color:'var(--muted)'}}>Vínculo: </span>{badgeVinculo(detail.status_vinculo)}</div>
              {detail.score_confianca>0&&<div><span style={{color:'var(--muted)'}}>Score: </span><span style={{color:detail.score_confianca>=80?'var(--success)':detail.score_confianca>=50?'var(--info)':'var(--muted)',fontWeight:700}}>{detail.score_confianca}/100</span></div>}
              {detail.previsao_chegada&&<div><span style={{color:'var(--muted)'}}>Prev. chegada: </span><strong>{fmtDate(detail.previsao_chegada)}</strong></div>}
              {detail.status_vinculo==='vinculado'&&detail.pedidos&&<div style={{color:'var(--success)',fontSize:12}}>Pedido: {detail.pedidos.numero} — {detail.pedidos.fornecedor}</div>}
              {detail.status_vinculo==='sugerido'&&detail.pedido_id&&(
                <div style={{display:'flex',gap:6,marginTop:4}}>
                  <button className="btn btn-sm" style={{background:'var(--success)',color:'#fff'}} onClick={()=>confirmarVinculo(detail.id,detail.pedido_id)}>✓ Confirmar</button>
                  <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)'}} onClick={()=>rejeitarVinculo(detail.id)}>✗ Rejeitar</button>
                </div>
              )}
              {detail.vinculo_motivo&&<div style={{color:'var(--warning)',fontSize:11,fontStyle:'italic',marginTop:2}}>{detail.vinculo_motivo}</div>}
              {detail.acao_necessaria&&<div style={{color:'var(--danger)',fontSize:11,fontWeight:600,marginTop:2}}>⚠ {detail.acao_necessaria}</div>}
              {detail.chave_acesso&&<div style={{fontSize:10,color:'var(--muted2)',wordBreak:'break-all',marginTop:4}}>Chave: {detail.chave_acesso}</div>}
            </div>

            {/* Itens */}
            {detail.nf_itens?.length>0&&(
              <>
                <div style={{fontSize:12,fontWeight:700,marginBottom:6,borderTop:'1px solid var(--border)',paddingTop:10}}>Itens ({detail.nf_itens.length})</div>
                {detail.nf_itens.map((it,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      {it.codigo&&<span style={{fontFamily:'monospace',fontSize:11,color:'var(--muted)',marginRight:5}}>{it.codigo}</span>}
                      <span style={{wordBreak:'break-word'}}>{it.descricao}</span>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                      <div style={{color:'var(--muted)'}}>{it.quantidade}×</div>
                      <div style={{fontWeight:700}}>{fmtCents(it.valor_total_centavos)}</div>
                    </div>
                  </div>
                ))}
              </>
            )}

            {/* Pagamentos */}
            {detail.nf_pagamentos?.length>0&&(
              <>
                <div style={{fontSize:12,fontWeight:700,marginBottom:6,borderTop:'1px solid var(--border)',paddingTop:10}}>Vencimentos</div>
                {detail.nf_pagamentos.map((p,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'4px 0',borderBottom:'1px solid var(--border)'}}>
                    <span>{p.vencimento?fmtDate(p.vencimento):'—'}</span>
                    <strong>{fmtCents(p.valor_centavos)}</strong>
                  </div>
                ))}
              </>
            )}

            {detail.status_vinculo!=='vinculado'&&(
              <button className="btn btn-sm btn-yellow" style={{marginTop:12,width:'100%',justifyContent:'center'}}
                onClick={()=>{setLinkId(detail.id);setLinkSearch('')}}>🔗 Vincular a Pedido</button>
            )}
          </div>
        )}
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: GmailTab
// ═══════════════════════════════════════════════════════════
function GmailTab({ gmailTokens, onTokensChange, authError, connecting }) {
  const [emails,      setEmails]      = useState([])
  const [loading,     setLoading]     = useState(false)
  const [loadingMore, setLoadingMore] = useState(false)
  const [loadedCount, setLoadedCount] = useState(0)
  const [nextToken,   setNextToken]   = useState(null)
  const [currentQ,    setCurrentQ]    = useState('')
  const [diagInfo,    setDiagInfo]    = useState(null)
  const [error,       setError]       = useState(null)
  const [search,      setSearch]      = useState('')
  const [selectedId,  setSelectedId]  = useState(null)
  const [body,        setBody]        = useState(null)
  const [loadingBody, setLoadingBody] = useState(false)
  const [attachments, setAttachments] = useState([])
  const [processing,  setProcessing]  = useState(null)
  const [processed,   setProcessed]   = useState({}) // {messageId: resultData}
  const [attResult,   setAttResult]   = useState(null)
  const [autoProc,    setAutoProc]    = useState(null) // {total,done,errors,running,current}
  const autoRunRef = React.useRef(false)

  const isConnected = !!gmailTokens?.refresh_token

  // Data de 40 dias atrás no formato que o Gmail aceita (YYYY/MM/DD)
  const daysAgo = (n=40) => {
    const d = new Date()
    d.setDate(d.getDate() - n)
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`
  }

  const META_HEADERS = ['Subject','From','Date']
  const DATE_Q = `after:${daysAgo()} -from:mailer-daemon -subject:"delivery status"`
  const PAGE_SIZE = 100

  const parseDetails = msgs => msgs.map(m => {
    const h = m.payload?.headers || []
    const g = n => h.find(x=>x.name?.toLowerCase()===n.toLowerCase())?.value||''
    const hasAtt = !!(m.payload?.parts||[]).some(p=>p.filename && p.body?.attachmentId)
    return {id:m.id, subject:g('Subject'), from:g('From'), date:g('Date'), snippet:m.snippet||'', hasAtt}
  })

  const sleep = ms => new Promise(r => setTimeout(r, ms))

  const fetchMetaBatched = async (ids) => {
    const BATCH = 20; let results = []
    for (let i = 0; i < ids.length; i += BATCH) {
      const batch = ids.slice(i, i + BATCH)
      const details = await Promise.all(batch.map(m =>
        gmailFetch(`messages/${m.id}`, {format:'metadata', metadataHeaders:META_HEADERS})
      ))
      results = [...results, ...details]
      if (i + BATCH < ids.length) await sleep(150)
    }
    return results
  }

  // Resolve o ID do label pelo nome (mais confiável que busca por texto)
  const resolveLabelId = async (name) => {
    const data = await gmailFetch('labels')
    const label = (data.labels||[]).find(l => l.name?.toLowerCase() === name.toLowerCase())
    return label?.id || null
  }

  // Busca com paginação manual (busca textual)
  const fetchEmails = async (q) => {
    const query = q ?? currentQ
    setLoading(true); setError(null); setNextToken(null); setCurrentQ(query); setEmails([])
    try {
      const list = await gmailFetch('messages', {q:query||'in:inbox', maxResults:PAGE_SIZE})
      setNextToken(list.nextPageToken || null)
      if (!list.messages?.length) { setEmails([]); return }
      const parsed = parseDetails(await fetchMetaBatched(list.messages))
      setEmails(parsed); setLoadedCount(parsed.length)
    } catch(e) { setError(e.message) }
    finally { setLoading(false) }
  }

  // Carregamento inicial via labelIds (mais preciso que busca textual por label)
  const fetchRecent = async () => {
    setLoading(true); setError(null); setEmails([]); setLoadedCount(0); setDiagInfo(null)
    let all = []; let token = null
    try {
      // 1. Lista todos os labels para encontrar o ID correto
      // Busca tudo na conta sem filtro de label — emails encaminhados podem não ter label aplicado
      const q = `in:anywhere after:${daysAgo()} -from:mailer-daemon -subject:"delivery status"`
      setCurrentQ(q)

      // Diagnóstico: estimativa total
      const estAll = await gmailFetch('messages', {q, maxResults:1})
      setDiagInfo({ totalEst: estAll.resultSizeEstimate || 0 })

      do {
        const p = {q, maxResults:PAGE_SIZE}
        if (token) p.pageToken = token
        const list = await gmailFetch('messages', p)
        token = list.nextPageToken || null
        if (!list.messages?.length) break
        const parsed = parseDetails(await fetchMetaBatched(list.messages))
        all = [...all, ...parsed]
        setEmails([...all]); setLoadedCount(all.length)
        setNextToken(token)
      } while (token)
    } catch(e) { setError(e.message) }
    finally { setLoading(false) }
    return all
  }

  const loadMore = async () => {
    if (!nextToken) return
    setLoadingMore(true)
    try {
      const list = await gmailFetch('messages', {q:currentQ||'in:inbox', maxResults:50, pageToken:nextToken})
      setNextToken(list.nextPageToken || null)
      if (!list.messages?.length) return
      const parsed = parseDetails(await fetchMetaBatched(list.messages))
      setEmails(prev => { const n=[...prev,...parsed]; setLoadedCount(n.length); return n })
    } catch(e) { setError(e.message) }
    finally { setLoadingMore(false) }
  }

  const fetchBody = async (id) => {
    setLoadingBody(true); setBody(null); setAttachments([]); setAttResult(null)
    try {
      const msg = await gmailFetch(`messages/${id}`, {format:'full'})
      setAttachments(extractAttachments(msg.payload))
      const extract = payload => {
        if (payload.body?.data) return decodeURIComponent(escape(atob(payload.body.data.replace(/-/g,'+').replace(/_/g,'/'))))
        for (const p of (payload.parts||[])) {
          if (p.mimeType==='text/plain' && p.body?.data)
            return decodeURIComponent(escape(atob(p.body.data.replace(/-/g,'+').replace(/_/g,'/'))))
        }
        for (const p of (payload.parts||[])) {
          if (p.mimeType==='text/html' && p.body?.data)
            return decodeURIComponent(escape(atob(p.body.data.replace(/-/g,'+').replace(/_/g,'/'))))
        }
        return '(conteúdo não disponível)'
      }
      setBody(extract(msg.payload))
    } catch(e) { setBody('Erro: ' + e.message) }
    finally { setLoadingBody(false) }
  }

  const processAtt = async (att) => {
    setProcessing(att.name); setAttResult(null)
    try {
      const raw = await gmailFetch(`messages/${selectedId}/attachments/${att.attachmentId}`)
      const b64 = raw.data
      const isXml = att.mimeType.includes('xml') || att.name.toLowerCase().endsWith('.xml')
      const isPdf = att.mimeType.includes('pdf') || att.name.toLowerCase().endsWith('.pdf')
      let data
      if (isXml) {
        const bin = atob(b64.replace(/-/g,'+').replace(/_/g,'/'))
        const bytes = new Uint8Array(bin.length)
        for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i)
        data = parseNFeXml(new TextDecoder('utf-8').decode(bytes))
      } else if (isPdf) {
        const text = await extractPdfText(b64)
        data = parsePdf(text, att.name)
      } else {
        throw new Error('Tipo não suportado: ' + att.mimeType)
      }
      setAttResult({ att, data })
      if (!data.error) {
        const emailMeta = emails.find(e=>e.id===selectedId) || {}
        await dbSaveProcessed(selectedId, emailMeta, att.name, data)
        await saveNFe(selectedId, emailMeta, att.name, data).catch(()=>{})
        setProcessed(prev => ({...prev, [selectedId]: {...data, att_name:att.name}}))
      }
    } catch(e) {
      setAttResult({ att, data:{ type:'error', error:e.message, items:[] } })
    } finally { setProcessing(null) }
  }

  // Busca direcionada: só emails com PDF ou XML não processados, 10 por vez
  const runAutoProcess = async () => {
    if (autoRunRef.current) return
    autoRunRef.current = true
    setAutoProc({ total: 0, done: 0, errors: 0, running: true, current: 'Buscando emails com anexos...', restantes: 0 })

    try {
      const since = daysAgo()
      const q = `has:attachment (filename:pdf OR filename:xml) in:anywhere after:${since} (from:intelbras.com.br OR from:controlid.com.br OR subject:"NF-e autorizada" OR subject:"Emissão de NF-e" OR subject:"Recebemos seu Pedido" OR subject:"Danfe")`
      const list = await gmailFetch('messages', { q, maxResults: 50 })
      const msgs = list.messages || []

      // Filtra apenas os não processados ainda
      const toProc = msgs.filter(m => !processed[m.id])
      if (!toProc.length) {
        setAutoProc({ total: 0, done: 0, errors: 0, running: false, current: null, restantes: 0 })
        autoRunRef.current = false
        return
      }

      // Pega metadata dos não processados em batch
      const meta = await fetchMetaBatched(toProc)
      const parsed = parseDetails(meta)

      // Processa no máximo 10 por rodada
      const BATCH = 10
      const batch = parsed.slice(0, BATCH)
      const restantes = Math.max(0, toProc.length - BATCH)
      setAutoProc({ total: batch.length, done: 0, errors: 0, running: true, current: null, restantes })

      for (let i = 0; i < batch.length; i++) {
        if (!autoRunRef.current) break
        const email = batch[i]
        setAutoProc(p => ({ ...p, current: email.subject || email.from || email.id, done: i }))
        try {
          const full = await gmailFetch(`messages/${email.id}`, { format: 'full' })
          const atts = extractAttachments(full.payload)
          const processable = atts.filter(a => /\.(pdf|xml)$/i.test(a.name))
          if (!processable.length) {
            await dbSaveProcessed(email.id, email, '', { type:'none', items:[], error:null }).catch(()=>{})
            setProcessed(prev => ({ ...prev, [email.id]: { type:'none' } }))
            setAutoProc(p => ({ ...p, done: i + 1 }))
            continue
          }
          const att = processable.find(a => /\.xml$/i.test(a.name)) || processable[0]
          const raw = await gmailFetch(`messages/${email.id}/attachments/${att.attachmentId}`)
          const b64 = raw.data
          let data
          if (/\.xml$/i.test(att.name)) {
            const bin = atob(b64.replace(/-/g,'+').replace(/_/g,'/'))
            const bytes = new Uint8Array(bin.length)
            for (let j = 0; j < bin.length; j++) bytes[j] = bin.charCodeAt(j)
            data = parseNFeXml(new TextDecoder('utf-8').decode(bytes))
          } else {
            data = parsePdf(await extractPdfText(b64), att.name)
          }
          const saveData = data.error ? { type:'error', items:[], error:data.error } : data
          await dbSaveProcessed(email.id, email, att.name, saveData).catch(()=>{})
          setProcessed(prev => ({ ...prev, [email.id]: { ...saveData, att_name: att.name } }))
          if (!data.error) {
            await saveNFe(email.id, email, att.name, data).catch(()=>{})
            await dbAutoInsertPedido(data, email, email.id).catch(()=>{})
          }
        } catch(e) {
          setAutoProc(p => ({ ...p, errors: p.errors + 1 }))
        }
        setAutoProc(p => ({ ...p, done: i + 1 }))
        await sleep(1500)
      }
    } catch(e) {
      setAutoProc(p => ({ ...p, errors: p.errors + 1 }))
    }

    autoRunRef.current = false
    setAutoProc(p => ({ ...p, running: false, current: null }))
  }

  // Carrega mapa de emails processados ao conectar — NÃO dispara auto-process
  useEffect(() => {
    if (!isConnected) return
    dbLoadProcessed().then(rows => {
      const map = {}
      rows.forEach(r => { map[r.message_id] = r })
      setProcessed(map)
    }).catch(() => {})
  }, [isConnected])

  const selEmail = emails.find(e=>e.id===selectedId)
  const disconnect = () => { saveGmailTokens(null); onTokensChange(null); setEmails([]); setSelectedId(null); setBody(null); setAttachments([]) }

  const fmtSize = b => b<1024?`${b}B`:b<1048576?`${(b/1024).toFixed(0)}KB`:`${(b/1048576).toFixed(1)}MB`
  const attIcon = (m,n) => m.includes('pdf')||n.endsWith('.pdf')?'📄':m.includes('xml')||n.endsWith('.xml')?'📋':'📎'
  const canProcess = (m,n) => { const l=n.toLowerCase(); return m.includes('pdf')||m.includes('xml')||l.endsWith('.pdf')||l.endsWith('.xml') }
  const fmtBRLn = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
  const fmtQty  = v => Number.isInteger(v)?v:Number(v||0).toLocaleString('pt-BR',{maximumFractionDigits:4})
  const typeLabel = t => t==='nfe'?'📋 NF-e (XML)':t==='danfe'?'📄 DANFE (PDF)':t==='pedido'?'🛒 Pedido (PDF)':'⚠️ Erro'

  if (!isConnected) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:80,gap:16}}>
      <div style={{fontSize:56}}>{connecting?'⏳':'📧'}</div>
      <h2 style={{color:'var(--text)',margin:0}}>{connecting?'Conectando...':'Gmail não conectado'}</h2>
      {connecting
        ? <p style={{color:'var(--muted)',textAlign:'center',margin:0}}>Aguarde, trocando código de autorização...</p>
        : <p style={{color:'var(--muted)',textAlign:'center',maxWidth:360,margin:0}}>Conecte sua conta Gmail para visualizar emails de pedidos, notas fiscais e fornecedores diretamente aqui.</p>}
      {authError&&<div className="alert alert-danger" style={{maxWidth:420,textAlign:'center'}}>❌ {authError}</div>}
      {!connecting&&<button className="btn btn-yellow" style={{marginTop:8}} onClick={()=>window.location.href=gmailAuthUrl()}>
        🔗 {authError?'Tentar novamente':'Conectar Gmail'}
      </button>}
    </div>
  )

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 110px)',gap:0}}>

      {/* Barra de progresso do processamento automático */}
      {autoProc && (autoProc.running || autoProc.total > 0) && (
        <div style={{background: autoProc.running ? 'var(--info-bg)' : 'var(--success-bg)',
                     border:`1px solid ${autoProc.running?'var(--info)':'var(--success)'}`,
                     borderRadius:'var(--r)', padding:'10px 16px', marginBottom:8,
                     display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}}>
          <div style={{flex:1, minWidth:200}}>
            {autoProc.running ? (
              <>
                <span style={{fontWeight:700, color:'var(--info)', fontSize:13}}>
                  ⚙️ Processando automaticamente... {autoProc.done}/{autoProc.total}
                  {autoProc.errors > 0 && <span style={{color:'var(--warning)', marginLeft:8}}>{autoProc.errors} erro(s)</span>}
                </span>
                {autoProc.current && (
                  <div style={{fontSize:11, color:'var(--muted)', marginTop:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                    {autoProc.current}
                  </div>
                )}
                {/* barra de progresso */}
                <div style={{marginTop:6, height:4, background:'var(--border)', borderRadius:2, overflow:'hidden'}}>
                  <div style={{height:'100%', background:'var(--info)', borderRadius:2, width:`${autoProc.total?Math.round(autoProc.done/autoProc.total*100):0}%`, transition:'width .3s'}}/>
                </div>
              </>
            ) : (
              <span style={{fontWeight:700, color:'var(--success)', fontSize:13}}>
                ✅ {autoProc.done} email(s) processado(s)
                {autoProc.errors > 0 && <span style={{color:'var(--warning)', marginLeft:8}}>· {autoProc.errors} erro(s)</span>}
                {autoProc.restantes > 0 && <span style={{color:'var(--info)', marginLeft:8}}>· {autoProc.restantes} restantes — clique em Processar para continuar</span>}
              </span>
            )}
          </div>
          {autoProc.running && (
            <button className="btn btn-sm btn-ghost" onClick={()=>{ autoRunRef.current=false }}>Parar</button>
          )}
          {!autoProc.running && (
            <button className="btn btn-sm btn-ghost" onClick={()=>setAutoProc(null)}>✕</button>
          )}
        </div>
      )}

      <div className="page-header" style={{marginBottom:10}}>
        <div>
          <h2 className="page-title">📧 Gmail</h2>
          <p className="page-subtitle">
            {loading ? `Carregando... ${loadedCount} emails` : `${emails.length} emails · últimos 40 dias`}
          </p>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <form onSubmit={e=>{e.preventDefault();fetchEmails(search)}} style={{display:'flex',gap:6}}>
            <input className="filter-input" style={{width:220}} placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
            <button className="btn btn-sm btn-yellow" type="submit">Buscar</button>
          </form>
          {['nota fiscal','pedido','fornecedor'].map(q=>(
            <button key={q} className="btn btn-sm btn-ghost" style={{fontSize:11}} onClick={()=>{setSearch(q);fetchEmails(q)}}>{q}</button>
          ))}
          <button className="btn btn-sm btn-ghost" onClick={fetchRecent} title="Recarregar últimos 40 dias">🔄</button>
          <button className="btn btn-sm btn-yellow" disabled={autoProc?.running}
            onClick={runAutoProcess}
            title="Busca e processa até 10 emails novos com NF ou pedido">
            {autoProc?.running ? `⚙️ ${autoProc.done}/${autoProc.total}` : '⚙️ Processar'}
          </button>
          <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)',fontSize:11}} onClick={disconnect}>Desconectar</button>
        </div>
      </div>

      {diagInfo&&(
        <div style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 12px',marginBottom:8,fontSize:11,color:'var(--muted)'}}>
          📊 Total estimado pela API no período: <strong style={{color:'var(--accent)'}}>{diagInfo.totalEst}</strong> emails
          <span style={{marginLeft:12,color:'var(--muted2)'}}>({emails.length} carregados)</span>
        </div>
      )}

      <div style={{display:'flex',flex:1,gap:12,minHeight:0}}>
        {/* Lista de emails */}
        <div style={{width:360,display:'flex',flexDirection:'column',gap:4,overflowY:'auto'}}>
          {loading&&<div style={{textAlign:'center',padding:24,color:'var(--muted)'}}>Carregando...</div>}
          {error&&<div className="alert alert-danger" style={{margin:0}}>{error}</div>}
          {!loading&&emails.length===0&&!error&&<div className="table-empty"><div className="table-empty-icon">📭</div><p>Nenhum email.</p></div>}
          {emails.map(e=>(
            <div key={e.id} onClick={()=>{setSelectedId(e.id);fetchBody(e.id)}}
              style={{padding:'10px 12px',borderRadius:6,cursor:'pointer',flexShrink:0,
                border:`1px solid ${selectedId===e.id?'var(--accent)':'var(--border)'}`,
                background:selectedId===e.id?'var(--card2)':'var(--card)'}}>
              <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
                {e.hasAtt&&<span title="Tem anexo processável" style={{fontSize:11}}>📎</span>}
                {processed[e.id] && processed[e.id].doc_type !== 'none' && <span title={`Processado: ${processed[e.id].att_name||''}`} style={{fontSize:11}}>✅</span>}
                {processed[e.id] && processed[e.id].doc_type === 'none'  && <span title="Verificado — sem anexo de NF ou pedido" style={{fontSize:11,opacity:.4}}>✓</span>}
                <span style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.subject||'(sem assunto)'}</span>
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.from}</div>
              <div style={{fontSize:11,color:'var(--muted2)',overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{e.snippet}</div>
            </div>
          ))}
          {nextToken&&(
            <button className="btn btn-ghost btn-sm" style={{flexShrink:0,marginTop:4}}
              disabled={loadingMore} onClick={loadMore}>
              {loadingMore?'Carregando...':'Carregar mais emails'}
            </button>
          )}
        </div>

        {/* Painel de conteúdo */}
        <div style={{flex:1,background:'var(--card)',borderRadius:8,border:'1px solid var(--border)',padding:20,overflowY:'auto',minWidth:0,display:'flex',flexDirection:'column',gap:16}}>
          {!selectedId&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1,color:'var(--muted)',fontSize:14}}>Selecione um email para visualizar</div>}
          {selectedId&&loadingBody&&<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Carregando...</div>}
          {selectedId&&!loadingBody&&selEmail&&(<>
            {/* Cabeçalho */}
            <div style={{paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{selEmail.subject||'(sem assunto)'}</div>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:2}}>De: {selEmail.from}</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>{selEmail.date}</div>
            </div>

            {/* Anexos */}
            {attachments.length>0&&(
              <div>
                <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,letterSpacing:.5,textTransform:'uppercase',marginBottom:8}}>
                  Anexos ({attachments.length})
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {attachments.map(att=>(
                    <div key={att.attachmentId} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',
                      background:'var(--card2)',borderRadius:6,border:'1px solid var(--border)',flexShrink:0}}>
                      <span style={{fontSize:18}}>{attIcon(att.mimeType,att.name)}</span>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{att.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{fmtSize(att.size)}</div>
                      </div>
                      {canProcess(att.mimeType,att.name)&&(
                        <button className="btn btn-sm btn-yellow" style={{fontSize:11,padding:'3px 10px',flexShrink:0}}
                          disabled={!!processing} onClick={()=>processAtt(att)}>
                          {processing===att.name?'⏳ Processando...':'⚙️ Processar'}
                        </button>
                      )}
