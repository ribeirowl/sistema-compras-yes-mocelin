function RequestModal({ item, cityGroup: cityGroupProp, purchaseHistory, purchaseRequests, onClose, onSubmit }) {
  const [qty,        setQty]        = useState(1)
  const [obs,        setObs]        = useState('')
  const [city,       setCity]       = useState(cityGroupProp||'BELTRAO')
  const [sellerName, setSellerName] = useState(()=>sessionStorage.getItem('sc_name')||'')
  const [errors,     setErrors]     = useState({})
  const [warn,       setWarn]       = useState(null)
  const [blocked,    setBlocked]    = useState(false)

  useEffect(()=>{
    const now = new Date()
    const isDisc = item.status.type==='ENCERRADO'||item.status.type==='ENCERRADO_COM_SUB'
    if (isDisc) {
      setBlocked(true)
      setWarn(`Produto descontinuado / fora de linha.${item.status.substitute?` Substituto: ${item.status.substitute}`:''}`)
      return
    }
    const recent = purchaseHistory.find(h =>
      h.code===item.code && h.cityGroup===city &&
      (now-new Date(h.date))/86400000 <= 8)
    if (recent) {
      const days = Math.floor((now-new Date(recent.date))/86400000)
      setWarn(`Este produto foi comprado há ${days} dias (${fmtDate(recent.date)}). Confirme se realmente deseja solicitar novamente.`)
    } else { setWarn(null) }
  },[item,city,purchaseHistory])

  const submit = () => {
    const errs = {}
    if (!sellerName.trim()) errs.sellerName = 'Informe seu nome'
    if (!obs.trim()) errs.obs = 'Observação é obrigatória'
    if (Object.keys(errs).length) { setErrors(errs); return }
    onSubmit({
      id:          Date.now().toString(),
      code:        item.code,
      description: item.description,
      brand:       item.brand,
      cityGroup:   city,
      qty,
      observation: obs,
      status:      'PENDENTE',
      createdAt:   new Date().toISOString(),
      createdBy:   sellerName.trim(),
    })
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2 className="modal-title">Solicitar Compra</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="request-product-info">
            <span className="mono" style={{color:'var(--accent)',fontWeight:700}}>{item.code}</span>
            <span>{item.description}</span>
            <span><span className="brand-badge">{item.brand||'—'}</span></span>
          </div>
          {warn&&<div className={`alert ${blocked?'alert-error':'alert-warning'}`}>⚠️ {warn}</div>}
          {!blocked&&(
            <>
              <div className="form-field">
                <label>Seu nome <span style={{color:'var(--danger)'}}>*</span></label>
                <input className={`login-input${errors.sellerName?' input-error':''}`} value={sellerName}
                  onChange={e=>{setSellerName(e.target.value);setErrors(p=>({...p,sellerName:''}))}}
                  placeholder="Nome do vendedor"/>
                {errors.sellerName&&<span className="field-error">{errors.sellerName}</span>}
              </div>
              <div className="form-field">
                <label>Cidade</label>
                <select className="filter-select" style={{width:'100%'}} value={city} onChange={e=>setCity(e.target.value)}>
                  <option value="BELTRAO">Beltrão</option>
                  <option value="TOLEDO">Toledo</option>
                  <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
                </select>
              </div>
              <div className="form-field">
                <label>Quantidade</label>
                <input type="number" className="login-input" min="1" value={qty}
                  onChange={e=>setQty(parseInt(e.target.value)||1)}/>
              </div>
              <div className="form-field">
                <label>Observação <span style={{color:'var(--danger)'}}>*</span></label>
                <textarea className={`obs-textarea${errors.obs?' input-error':''}`} value={obs}
                  onChange={e=>{setObs(e.target.value);setErrors(p=>({...p,obs:''}))}}
                  placeholder="Motivo da solicitação, urgência, cliente aguardando..."/>
                {errors.obs&&<span className="field-error">{errors.obs}</span>}
              </div>
            </>
          )}
        </div>
        <div className="modal-actions">
          {!blocked&&<button className="btn btn-yellow" onClick={submit}>Enviar Solicitação</button>}
          <button className="btn btn-ghost" onClick={onClose}>{blocked?'Fechar':'Cancelar'}</button>
        </div>
      </div>
    </div>
  )
}

function StatusOverrideModal({ item, currentOverride, onClose, onSave, onClear }) {
  const [status,      setStatus]      = useState(currentOverride?.status||'COMPRADO_COM_PREV')
  const [arrivalDate, setArrivalDate] = useState(currentOverride?.arrivalDate||todayStr())
  const [notes,       setNotes]       = useState(currentOverride?.notes||'')
  const needsDate = status==='COMPRADO_COM_PREV'||status==='DISPONIVEL_MES'
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <h2 className="modal-title">Definir Status Manual</h2>
            <p className="modal-sub">{item.code} · {item.description.slice(0,45)}</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-field">
            <label>Status</label>
            <select className="filter-select" style={{width:'100%'}} value={status} onChange={e=>setStatus(e.target.value)}>
              <option value="COMPRADO_COM_PREV">Comprado — com previsão de chegada</option>
              <option value="COMPRADO_SEM_PREV">Comprado — sem previsão</option>
              <option value="AGUARDANDO_COMPRA">Aguardando compra</option>
              <option value="DISPONIVEL_MES">Disponível em até 30 dias</option>
            </select>
          </div>
          {needsDate && (
            <div className="form-field">
              <label>Previsão de Chegada</label>
              <input type="date" className="login-input" value={arrivalDate} onChange={e=>setArrivalDate(e.target.value)}/>
            </div>
          )}
          <div className="form-field">
            <label>Observação (NF, pedido...)</label>
            <textarea className="obs-textarea" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="NF, número do pedido, info adicional..."/>
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn btn-yellow" onClick={()=>onSave({status, arrivalDate:needsDate?arrivalDate:null, notes})}>Salvar</button>
          {currentOverride && <button className="btn btn-danger" onClick={onClear}>Limpar Status Manual</button>}
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  )
}

function DisponibilidadeTab({ rawItems, priceMap, discontinuedMap, purchaseHistory, purchaseRequests, productOverrides, onUpdateOverrides, availMap, onUpdateAvailMap, onNewRequest, caps }) {
  const [search,      setSearch]      = useState('')
  const [showAll,     setShowAll]     = useState(false)
  const [editItem,    setEditItem]    = useState(null)
  const [requestItem, setRequestItem] = useState(null)
  const [uploading,   setUploading]   = useState(false)
  const [uploadErr,   setUploadErr]   = useState(null)

  const availLoaded = availMap && availMap.size > 0

  // Unique empresas (lojas) sorted
  const empresas = useMemo(() => {
    const s = new Set()
    rawItems.forEach(i => s.add(i.empresa))
    return [...s].sort()
  }, [rawItems])

  // Consolidate by code only (show all lojas)
  const byCode = useMemo(() => {
    const map = new Map()
    rawItems.forEach(item => {
      if (!map.has(item.code)) {
        map.set(item.code, { code:item.code, description:item.description, family:item.family, brand:item.brand, empresaStock:{}, totalStock:0, totalSuggestion:0 })
      }
      const g = map.get(item.code)
      g.empresaStock[item.empresa] = (g.empresaStock[item.empresa]||0) + item.stock
      g.totalStock += item.stock
      g.totalSuggestion += item.suggestion
    })
    return [...map.values()]
  }, [rawItems])

  const filtered = useMemo(() => {
    let items = byCode
    if (!showAll) items = items.filter(i => i.totalSuggestion > 0 || (availMap?.has(i.code)))
    if (search) { const q=normStr(search); items=items.filter(i=>normStr(i.code).includes(q)||normStr(i.description).includes(q)) }
    return items.sort((a,b) => b.totalSuggestion - a.totalSuggestion)
  }, [byCode, showAll, search, availMap])

  const handleAvailUpload = async file => {
    if (!file) return
    setUploading(true); setUploadErr(null)
    try {
      const wb = await readWb(file)
      const am = parseAvailability(wb)
      if (am.size === 0) throw new Error('Nenhum dado encontrado. Verifique se é a planilha de disponibilidade correta.')
      saveAvailMap(am)
      onUpdateAvailMap(am)
    } catch(e) { setUploadErr(e.message) }
    finally { setUploading(false) }
  }

  const getStatus = item => getProductStatus(item.code, 'BELTRAO', rawItems, purchaseHistory, purchaseRequests, discontinuedMap, productOverrides, availMap, priceMap)

  const applyOverride = (code, data) => {
    const next = { ...productOverrides }
    const key = `${code}__BELTRAO`; const key2 = `${code}__TOLEDO`
    if (!data) { delete next[key]; delete next[key2] }
    else { next[key] = { ...data, setAt:new Date().toISOString() }; next[key2] = { ...data, setAt:new Date().toISOString() } }
    onUpdateOverrides(next); saveOverrides(next)
  }

  return (
    <div>
      <div className="page-header">
        <div><h2 className="page-title">📋 Disponibilidade</h2>
          <p className="page-subtitle">Estoque nas lojas · Disponibilidade Intelbras · Status para vendedores</p></div>
      </div>

      {/* Upload planilha de disponibilidade — apenas para quem pode fazer upload */}
      {caps?.canUpload ? (
        <div style={{background:'var(--card)',border:`1px solid ${availLoaded?'var(--success)':'var(--warning)'}`,borderRadius:'var(--r)',padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:1}}>
            <span style={{fontWeight:700,color:availLoaded?'var(--success)':'var(--warning)',fontSize:13}}>
              {availLoaded ? `✅ Disponibilidade Intelbras carregada — ${availMap.size} produtos` : '⚠️ Planilha de disponibilidade não carregada — status indisponível para vendedores'}
            </span>
            {uploadErr && <div style={{color:'var(--danger)',fontSize:12,marginTop:4}}>⚠️ {uploadErr}</div>}
          </div>
          <label style={{cursor:uploading?'wait':'pointer'}}>
            <input type="file" accept=".xls,.xlsx" hidden disabled={uploading}
              onChange={e=>e.target.files[0]&&handleAvailUpload(e.target.files[0])}/>
            <span className={`btn btn-sm ${availLoaded?'btn-ghost':'btn-yellow'}`}>
              {uploading?<><span className="spinner"/>Carregando...</>:availLoaded?'↑ Atualizar Planilha':'↑ Carregar Planilha de Disponibilidade Intelbras'}
            </span>
          </label>
        </div>
      ) : availLoaded && (
        <div style={{background:'var(--success-bg)',border:'1px solid var(--success)',borderRadius:'var(--r)',padding:'10px 16px',marginBottom:16,fontSize:13,color:'var(--success)',fontWeight:600}}>
          ✅ Disponibilidade Intelbras carregada — {availMap.size} produtos
        </div>
      )}

      <div className="filter-bar">
        <input className="filter-search" placeholder="Buscar código ou descrição..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <label className="filter-toggle">
          <input type="checkbox" checked={showAll} onChange={e=>setShowAll(e.target.checked)}/>
          <span>Mostrar todos os itens</span>
        </label>
        <span style={{fontSize:12,color:'var(--muted)'}}>{filtered.length} itens</span>
      </div>

      {filtered.length===0
        ?<div className="table-empty"><div className="table-empty-icon">📋</div><p>Nenhum item.</p></div>
        :(
          <div className="table-scroll" style={{overflowX:'auto'}}>
            <table className="product-table" style={{minWidth:Math.max(900,700+empresas.length*80)}}>
              <thead>
                <tr>
                  <th>Código</th>
                  <th>Descrição</th>
                  {empresas.map(e=><th key={e} className="num" title={e} style={{fontSize:10}}>{e.replace(/ /g,'\u00A0').slice(0,12)}</th>)}
                  <th className="num" style={{color:'var(--success)'}} title="Disponibilidade Imediata — Origem">Imediato</th>
                  <th className="num" style={{color:'var(--info)'}} title="Disponibilidade P/ Mês — Origem">P/ Mês</th>
                  <th>Status</th>
                  <th>Previsão</th>
                  <th style={{minWidth:140}}>Ações</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((item,idx)=>{
                  const av = availMap?.get(item.code)
                  const status = getStatus(item)
                  const cfg = STATUS_CFG[status.type]??STATUS_CFG.SEM_INFORMACAO
                  const hasOverride = !!(productOverrides?.[`${item.code}__BELTRAO`])
                  return (
                    <tr key={item.code} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                      <td className="mono">{item.code}</td>
                      <td title={item.description} style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.description}</td>
                      {empresas.map(e=>(
                        <td key={e} className="num" style={{color:(item.empresaStock[e]||0)>0?'var(--success)':'var(--muted2)',fontWeight:(item.empresaStock[e]||0)>0?700:400}}>
                          {item.empresaStock[e]||0}
                        </td>
                      ))}
                      <td className="num" style={{color:av?.origemImediato?'var(--success)':'var(--muted2)',fontWeight:700}}>
                        {av ? (av.origemImediato ? 'Sim' : 'Não') : '—'}
                      </td>
                      <td className="num" style={{color:av?.origemMes?'var(--info)':'var(--muted2)'}}>
                        {av ? (av.origemMes ? 'Sim' : 'Não') : '—'}
                      </td>
                      <td>
                        <span className="status-badge" style={{background:cfg.bg,color:cfg.txt}}>{cfg.label}</span>
                        {hasOverride&&<span style={{marginLeft:4,fontSize:10,color:'var(--accent)'}}>✏️</span>}
                      </td>
                      <td style={{fontSize:12,color:'var(--muted)'}}>{status.arrivalDate?fmtDate(status.arrivalDate):'—'}</td>
                      <td style={{display:'flex',gap:3,flexWrap:'nowrap'}}>
                        <button className="btn btn-sm btn-yellow" onClick={()=>setRequestItem(item)}>+ Solicitar</button>
                        {caps?.canUpload&&<button className="btn btn-sm btn-ghost" onClick={()=>setEditItem(item)} title="Status manual">✏️</button>}
                        {caps?.canUpload&&hasOverride&&<button className="btn btn-sm btn-danger" onClick={()=>applyOverride(item.code,null)} title="Limpar">✕</button>}
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>
        )
      }

      {editItem&&(
        <StatusOverrideModal item={editItem}
          currentOverride={productOverrides?.[`${editItem.code}__BELTRAO`]}
          onClose={()=>setEditItem(null)}
          onSave={data=>{applyOverride(editItem.code,data);setEditItem(null)}}
          onClear={()=>{applyOverride(editItem.code,null);setEditItem(null)}}/>
      )}

      {requestItem&&(
        <DisponibilidadeRequestModal item={requestItem}
          purchaseHistory={purchaseHistory} purchaseRequests={purchaseRequests}
          onClose={()=>setRequestItem(null)}
          onSubmit={req=>{onNewRequest(req);setRequestItem(null)}}/>
      )}
    </div>
  )
}

function DisponibilidadeRequestModal({ item, purchaseHistory, purchaseRequests, onClose, onSubmit }) {
  const [cityGroup,  setCityGroup]  = useState('BELTRAO')
  const [qty,        setQty]        = useState(1)
  const [obs,        setObs]        = useState('')
  const [tipo,       setTipo]       = useState('ESTOQUE')
  const [sellerName, setSellerName] = useState(()=>sessionStorage.getItem('sc_name')||'')
  const [errors,     setErrors]     = useState({})
  const alreadyPending = purchaseRequests.some(r=>r.code===item.code&&r.cityGroup===cityGroup&&r.status==='PENDENTE')

  const submit = () => {
    const errs = {}
    if (!sellerName.trim()) errs.sellerName = 'Informe seu nome'
    if (!obs.trim()) errs.obs = 'Observação é obrigatória'
    if (Object.keys(errs).length) { setErrors(errs); return }
    onSubmit({id:Date.now().toString(),code:item.code,description:item.description,brand:item.brand||'',cityGroup,qty,tipo,observation:obs,status:'PENDENTE',createdAt:new Date().toISOString(),createdBy:sellerName.trim()})
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div><h2 className="modal-title">Solicitar Compra</h2>
            <p className="modal-sub">{item.code} · {item.description.slice(0,40)}</p></div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {alreadyPending&&<div className="alert alert-warning">⚠️ Já existe uma solicitação pendente para esta cidade.</div>}
          <div className="form-field">
            <label>Seu nome <span style={{color:'var(--danger)'}}>*</span></label>
            <input className={`login-input${errors.sellerName?' input-error':''}`} value={sellerName}
              onChange={e=>{setSellerName(e.target.value);setErrors(p=>({...p,sellerName:''}))}}
              placeholder="Nome do vendedor"/>
            {errors.sellerName&&<span className="field-error">{errors.sellerName}</span>}
          </div>
          <div className="form-field">
            <label>Cidade</label>
            <select className="filter-select" style={{width:'100%'}} value={cityGroup} onChange={e=>setCityGroup(e.target.value)}>
              <option value="BELTRAO">Beltrão</option>
              <option value="TOLEDO">Toledo</option>
              <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
            </select>
          </div>
          <div className="form-field">
            <label>Quantidade</label>
            <input type="number" className="login-input" min="1" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)}/>
          </div>
          <div className="form-field">
            <label>Tipo de solicitação</label>
            <select className="filter-select" style={{width:'100%'}} value={tipo} onChange={e=>setTipo(e.target.value)}>
              <option value="ESTOQUE">Estoque</option>
              <option value="VENDA_CASADA">Venda Casada</option>
              <option value="PROJETO">Projeto</option>
            </select>
          </div>
          <div className="form-field">
            <label>Observação <span style={{color:'var(--danger)'}}>*</span></label>
            <textarea className={`obs-textarea${errors.obs?' input-error':''}`} value={obs}
              onChange={e=>{setObs(e.target.value);setErrors(p=>({...p,obs:''}))}}
              placeholder="Motivo, urgência, cliente aguardando..."/>
            {errors.obs&&<span className="field-error">{errors.obs}</span>}
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn btn-yellow" onClick={submit}>Enviar Solicitação</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  )
}

// COMPONENT: PedidosTab (visão do Vendedor)
// ═══════════════════════════════════════════════════════════
function PedidosTab({ purchaseHistory, productOverrides, rawItems, priceMap, purchaseRequests }) {
  const [lojaFilter, setLojaFilter] = useState('TODOS')
  const [search, setSearch] = useState('')

  // Lojas disponíveis a partir do histórico
  const lojas = useMemo(() => {
    const s = new Set(purchaseHistory.map(h=>h.cityGroup).filter(Boolean))
    return [...s].sort()
  }, [purchaseHistory])

  const items = useMemo(() => {
    const now = new Date()
    // Pedidos do histórico (últimos 90 dias)
    const fromHistory = purchaseHistory
      .filter(h => Math.floor((now - new Date(h.date)) / 86400000) <= 90)
      .map(h => {
        const price = priceMap?.get(h.code)
        const ufOrigem = h.ufOrigem || price?.ufOrigem || ''
        const brand    = h.brand || price?.brand || ''
        // Calcula previsão: data da compra + dias úteis por UF/marca
        let arrivalDate = h.arrivalDate || null
        if (!arrivalDate && h.date && (h.availType==='DISPONIVEL_IMEDIATO'||h.availType==='DISPONIVEL_MES'||h.availType==='SEM_DISPONIBILIDADE'||!h.availType)) {
          const calcDate = getArrivalDate(ufOrigem, brand)
          // usa data da compra como base, não hoje
          let days = UF_DAYS[ufOrigem]
          if (!days) { const nb = normStr(brand); days = nb.includes('intelbras') ? UF_DAYS.SC : 10 }
          arrivalDate = addBizDays(h.date, days).toISOString().slice(0,10)
        }
        const req = h.fromRequest ? (purchaseRequests||[]).find(r=>r.id===h.fromRequest) : null
        return {
          code: h.code, description: h.description||h.code, brand,
          cityGroup: h.cityGroup, qty: h.qty, pv: h.pv||0,
          purchaseDate: h.date, arrivalDate,
          availType: h.availType||'', ufOrigem, notes: h.notes||'',
          fromRequest: !!h.fromRequest, requestedBy: req?.createdBy||null,
        }
      })
    // Overrides manuais de status comprado
    const fromOverrides = Object.entries(productOverrides||{})
      .filter(([,v]) => v.status==='COMPRADO_COM_PREV'||v.status==='COMPRADO_SEM_PREV')
      .map(([key, v]) => {
        const [code, cityGroup] = key.split('__')
        const ri = rawItems.find(i=>i.code===code)||{}
        return { code, description:ri.description||code, brand:ri.brand||'', cityGroup, qty:'—', pv:0,
          purchaseDate:v.setAt?v.setAt.slice(0,10):'—', arrivalDate:v.arrivalDate||null, availType:'override', notes:v.notes||'' }
      })
    let all = [...fromHistory, ...fromOverrides]
    if (lojaFilter!=='TODOS') all = all.filter(i=>i.cityGroup===lojaFilter)
    if (search) { const q=normStr(search); all=all.filter(i=>normStr(i.code).includes(q)||normStr(i.description).includes(q)) }
    return all.sort((a,b)=>(b.purchaseDate||'').localeCompare(a.purchaseDate||''))
  }, [purchaseHistory, productOverrides, rawItems, lojaFilter, search])

  const AVAIL_LABEL = { DISPONIVEL_IMEDIATO:'Imediato', DISPONIVEL_MES:'P/ Mês', SEM_DISPONIBILIDADE:'Sem disp.', override:'Manual', '':'—' }

  return (
    <div>
      <div className="page-header">
        <div>
          <h2 className="page-title">🚚 Pedidos Realizados</h2>
          <p className="page-subtitle">{items.length} pedido(s) — últimos 90 dias</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input className="filter-search" style={{minWidth:180}} placeholder="Buscar código..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select className="filter-select" value={lojaFilter} onChange={e=>setLojaFilter(e.target.value)}>
            <option value="TODOS">Todas as lojas</option>
            {lojas.map(l=><option key={l} value={l}>{l==='BELTRAO'?'Beltrão':l==='TOLEDO'?'Toledo':l}</option>)}
          </select>
        </div>
      </div>
      {items.length===0
        ? <div className="table-empty"><div className="table-empty-icon">📭</div><p>Nenhum pedido nos últimos 90 dias.</p></div>
        : (
          <div className="table-scroll">
            <table className="product-table">
              <thead><tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Loja</th>
                <th className="num">Qtd</th>
                <th>Disponib.</th>
                <th>Origem</th>
                <th>Data</th>
                <th>Previsão Chegada</th>
              </tr></thead>
              <tbody>
                {items.map((item,idx) => {
                  const now = new Date()
                  const arrD = item.arrivalDate ? new Date(item.arrivalDate) : null
                  const daysTo = arrD ? Math.ceil((arrD - now) / 86400000) : null
                  const arrColor = daysTo===null?'var(--muted)':daysTo<0?'var(--danger)':daysTo<7?'var(--success)':'var(--warning)'
                  return (
                    <tr key={item.code+item.cityGroup+idx} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                      <td className="mono">{item.code}</td>
                      <td title={item.description} style={{maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.description}</td>
                      <td><span className="empresa-badge">{item.cityGroup==='BELTRAO'?'Beltrão':item.cityGroup==='TOLEDO'?'Toledo':item.cityGroup}</span></td>
                      <td className="num">{item.qty}</td>
                      <td style={{fontSize:11,color:'var(--muted)'}}>{AVAIL_LABEL[item.availType]||'—'}</td>
                      <td>
                        {item.fromRequest
                          ? <span style={{background:'var(--purple-bg)',color:'var(--purple)',fontSize:11,padding:'2px 7px',borderRadius:4,whiteSpace:'nowrap'}}>
                              📋 {item.requestedBy||'Solicitação'}
                            </span>
                          : <span style={{color:'var(--muted)',fontSize:11}}>Compra direta</span>
                        }
                      </td>
                      <td>{fmtDate(item.purchaseDate)}</td>
                      <td style={{color:arrColor}}>
                        {item.arrivalDate ? fmtDate(item.arrivalDate) : <span style={{color:'var(--muted)'}}>Sem previsão</span>}
                        {daysTo!==null&&daysTo>=0&&<span style={{fontSize:11,marginLeft:4}}>({daysTo}d)</span>}
                        {daysTo!==null&&daysTo<0&&<span style={{fontSize:11,marginLeft:4,color:'var(--danger)'}}>atrasado</span>}
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>
        )
      }
    </div>
  )
}

// COMPONENT: SolicitacoesTab
// ═══════════════════════════════════════════════════════════
function SolicitacoesTab({ purchaseRequests, onUpdateRequests, caps, purchaseHistory, onUpdateHistory, priceMap }) {
  const [filter, setFilter] = useState('PENDENTE')

  const visible = purchaseRequests
    .filter(r=>filter===''||r.status===filter)
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))

  const updateStatus = (id, status) => {
    const updated = purchaseRequests.map(r=>r.id===id?{...r,status,resolvedAt:new Date().toISOString()}:r)
    onUpdateRequests(updated)
    saveRequests(updated)
    if (status === 'APROVADO') {
      const req = purchaseRequests.find(r => r.id === id)
      if (req) {
        const price = priceMap?.get(req.code)
        const entry = {
          id: Date.now().toString() + Math.random().toString(36).slice(2),
          code: req.code,
          description: req.description || req.code,
          brand: req.brand || price?.brand || '',
          qty: req.qty || 1,
          pv: price?.pv || req.pv || 0,
          cityGroup: req.cityGroup || 'BELTRAO',
          date: todayStr(),
          enteredBy: 'Gabriel Ribeiro',
          fromRequest: req.id,
        }
        const h = [...(purchaseHistory||[]), entry]
        onUpdateHistory(h)
        saveHistory(h)
      }
    }
  }

  return (
    <div className="solicit-tab">
      <div className="page-header">
        <div>
          <h2 className="page-title">Solicitações de Compra</h2>
          <p className="page-subtitle">{purchaseRequests.filter(r=>r.status==='PENDENTE').length} pendente(s)</p>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['','PENDENTE','APROVADO','RECUSADO'].map(s=>(
            <button key={s} className={`btn btn-sm ${filter===s?'btn-yellow':'btn-ghost'}`}
              onClick={()=>setFilter(s)}>{s||'Todas'}</button>
          ))}
        </div>
      </div>
      {visible.length===0
        ?<div className="table-empty"><div className="table-empty-icon">📋</div><p>Nenhuma solicitação.</p></div>
        :(
          <div className="table-scroll">
            <table className="product-table">
              <thead><tr>
                <th>Código</th><th>Descrição</th><th>Cidade</th>
                <th className="num">Qtd</th><th>Solicitado por</th><th>Tipo</th><th>Data</th>
                <th>Observação</th><th>Status</th>
                {caps.canApprove&&<th>Ações</th>}
              </tr></thead>
              <tbody>
                {visible.map((r,idx)=>(
                  <tr key={r.id} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                    <td className="mono">{r.code}</td>
                    <td title={r.description}>{(r.description||'').slice(0,40)}{(r.description||'').length>40&&'...'}</td>
                    <td>{r.cityGroup}</td>
                    <td className="num">{r.qty}</td>
                    <td>{r.createdBy}</td>
                    <td><span style={{fontSize:11,padding:'2px 6px',borderRadius:4,background:'var(--surface)',border:'1px solid var(--border)'}}>{r.tipo==='VENDA_CASADA'?'Venda Casada':r.tipo==='PROJETO'?'Projeto':'Estoque'}</span></td>
                    <td>{fmtDate(r.createdAt)}</td>
                    <td title={r.observation}>{(r.observation||'').slice(0,30)}{(r.observation||'').length>30&&'...'}</td>
                    <td><span className={`status-tag status-${(r.status||'').toLowerCase()}`}>{r.status}</span></td>
                    {caps.canApprove&&(
                      <td>
                        {r.status==='PENDENTE'&&(
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn btn-sm" style={{background:'var(--success-bg)',color:'var(--success)',border:'1px solid var(--success)'}}
                              onClick={()=>updateStatus(r.id,'APROVADO')}>✔</button>
                            <button className="btn btn-sm" style={{background:'var(--danger-bg)',color:'var(--danger)',border:'1px solid var(--danger)'}}
                              onClick={()=>updateStatus(r.id,'RECUSADO')}>✘</button>
                          </div>
                        )}
                      </td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      }
    </div>
  )
}

// COMPONENT: FinancialTab

const EMPTY_LINE = {code:'',description:'',brand:'',qty:1,pv:0}

function FinancialTab({ purchaseHistory, onUpdateHistory, caps, onDeleteOrder, rawItems, priceMap }) {
  const [showAdd,   setShowAdd]   = useState(false)
  const [editItem,  setEditItem]  = useState(null)
  // multi-item registration state
  const [regCity,   setRegCity]   = useState('BELTRAO')
  const [regDate,   setRegDate]   = useState(todayStr)
  const [regLines,  setRegLines]  = useState([{...EMPTY_LINE}])
  const [suggest,   setSuggest]   = useState({idx:-1,list:[]})  // autocomplete

  const searchItems = (q, idx) => {
    if (!q || q.length < 2) { setSuggest({idx:-1,list:[]}); return }
    const nq = normStr(q)
    const seen = new Set()
    const hits = []
    rawItems.forEach(i => {
      if (seen.has(i.code)) return
      if (normStr(i.code).includes(nq)||normStr(i.description).includes(nq)) {
        const price = priceMap?.get(i.code) ?? {}
        hits.push({code:i.code, description:i.description, brand:price.brand||i.brand||'', pv:price.pv||0})
        seen.add(i.code)
      }
    })
    priceMap?.forEach((v,k) => {
      if (!seen.has(k) && normStr(k).includes(nq)) {
        hits.push({code:k, description:k, brand:v.brand||'', pv:v.pv||0})
        seen.add(k)
      }
    })
    setSuggest({idx, list:hits.slice(0,8)})
  }

  const pickSuggest = (item) => {
    setRegLines(prev => prev.map((l,i) => i===suggest.idx ? {...l,...item} : l))
    setSuggest({idx:-1, list:[]})
  }

  const setLine = (idx, field, val) => {
    setRegLines(prev => prev.map((l,i) => i===idx ? {...l,[field]:val} : l))
    if (field==='code'||field==='description') searchItems(val, idx)
    else setSuggest({idx:-1,list:[]})
  }

  const addLine  = () => setRegLines(prev=>[...prev,{...EMPTY_LINE}])
  const remLine  = idx => setRegLines(prev=>prev.filter((_,i)=>i!==idx))

  const doAdd = () => {
    const valid = regLines.filter(l=>l.code.trim())
    if (!valid.length) return
    const newEntries = valid.map(l=>({
      id: Date.now().toString()+Math.random().toString(36).slice(2),
      code:l.code.trim(), description:l.description||l.code, brand:l.brand,
      qty:l.qty||1, pv:l.pv||0, cityGroup:regCity, date:regDate,
      enteredBy:'Gabriel Ribeiro',
    }))
    const h = [...purchaseHistory, ...newEntries]
    onUpdateHistory(h); saveHistory(h)
    setShowAdd(false)
    setRegLines([{...EMPTY_LINE}]); setSuggest({idx:-1,list:[]})
  }

  const doEdit = () => {
    const h = purchaseHistory.map(x => x.id===editItem.id ? {...x,...editItem} : x)
    onUpdateHistory(h)
    saveHistory(h)
    // Sync sc_orders too (remove old, keep by id)
    const allOrders = getOrders().map(o => o.id===editItem.id ? {...o,...editItem} : o)
    saveOrders(allOrders)
    setEditItem(null)
  }

  const doDelete = (id) => {
    if (!window.confirm('Remover este pedido do histórico?')) return
    const h = purchaseHistory.filter(x => x.id !== id)
    onUpdateHistory(h)
    saveHistory(h)
    // Remove from sc_orders too
    const allOrders = getOrders().filter(o => o.id !== id)
    saveOrders(allOrders)
    if (onDeleteOrder) onDeleteOrder(allOrders)
  }

  const byMonth = useMemo(() => {
    const m = new Map()
    purchaseHistory.forEach(h => {
      const key = (h.date||'').slice(0,7)
      if (!m.has(key)) m.set(key,{total:0,count:0})
      const e = m.get(key)
      e.total += (h.qty||0)*(h.pv||0)
      e.count += 1
    })
    return [...m.entries()].sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12)
  },[purchaseHistory])

  return (
    <div className="financial-tab">
      <div className="page-header">
        <div>
          <h2 className="page-title">Financeiro</h2>
          <p className="page-subtitle">Histórico de compras e resumo mensal</p>
        </div>
        <button className="btn btn-yellow" onClick={()=>setShowAdd(true)}>+ Registrar Compra</button>
      </div>

      {byMonth.length>0&&(
        <div className="fin-grid">
          {byMonth.map(([month,data])=>(
            <div key={month} className="fin-card">
              <div className="fin-month">{month}</div>
              <div className="fin-value">{fmtBRL(data.total)}</div>
              <div className="fin-count">{data.count} pedido(s)</div>
            </div>
          ))}
        </div>
      )}

      <div className="table-scroll">
        <table className="product-table">
          <thead><tr>
            <th>Código</th><th>Descrição</th><th>Cidade</th>
            <th className="num">Qtd</th><th className="num">PV</th><th className="num">Total</th><th>Data</th>
            {caps?.canEdit&&<th style={{width:80}}>Ações</th>}
          </tr></thead>
          <tbody>
            {purchaseHistory.slice().reverse().map((h,idx)=>(
              <tr key={h.id} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                <td className="mono">{h.code}</td>
                <td>{h.description}</td>
                <td>{h.cityGroup}</td>
                <td className="num">{h.qty}</td>
                <td className="num">{fmtBRL(h.pv)}</td>
                <td className="num"><strong>{fmtBRL((h.qty||0)*(h.pv||0))}</strong></td>
                <td>{fmtDate(h.date)}</td>
                {caps?.canEdit&&(
                  <td style={{whiteSpace:'nowrap'}}>
                    <button className="btn btn-sm btn-secondary" style={{marginRight:4}}
                      onClick={()=>setEditItem({...h})}>✏️</button>
                    <button className="btn btn-sm" style={{background:'var(--danger-bg)',color:'var(--danger)'}}
                      onClick={()=>doDelete(h.id)}>🗑️</button>
                  </td>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {editItem&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditItem(null)}>
          <div className="modal">
            <div className="modal-header">
              <h2 className="modal-title">Editar Pedido</h2>
              <button className="modal-close" onClick={()=>setEditItem(null)}>✕</button>
            </div>
            <div className="modal-body">
              {[['Código','code','text'],['Descrição','description','text'],['Data','date','date']].map(([lbl,key,type])=>(
                <div key={key} className="form-field">
                  <label>{lbl}</label>
                  <input type={type} className="login-input" value={editItem[key]||''}
                    onChange={e=>setEditItem({...editItem,[key]:e.target.value})}/>
                </div>
              ))}
              <div className="form-field">
                <label>Quantidade</label>
                <input type="number" className="login-input" min="1" value={editItem.qty||1}
                  onChange={e=>setEditItem({...editItem,qty:parseInt(e.target.value)||1})}/>
              </div>
              <div className="form-field">
                <label>PV (R$)</label>
                <input type="number" className="login-input" min="0" step="0.01" value={editItem.pv||0}
                  onChange={e=>setEditItem({...editItem,pv:parseFloat(e.target.value)||0})}/>
              </div>
              <div className="form-field">
                <label>Cidade</label>
                <select className="login-input" value={editItem.cityGroup||'BELTRAO'}
                  onChange={e=>setEditItem({...editItem,cityGroup:e.target.value})}>
                  <option value="BELTRAO">Beltrão</option>
                  <option value="TOLEDO">Toledo</option>
                  <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
                </select>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setEditItem(null)}>Cancelar</button>
              <button className="btn btn-yellow" onClick={doEdit}>💾 Salvar</button>
            </div>
          </div>
        </div>
      )}

      {showAdd&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&(setShowAdd(false),setSuggest({idx:-1,list:[]}))}>
          <div className="modal" style={{maxWidth:680,width:'95vw'}}>
            <div className="modal-header">
              <h2 className="modal-title">Registrar Compra</h2>
              <button className="modal-close" onClick={()=>setShowAdd(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
                <div className="form-field" style={{flex:1,minWidth:130}}>
                  <label>Data</label>
                  <input type="date" className="login-input" value={regDate} onChange={e=>setRegDate(e.target.value)}/>
                </div>
                <div className="form-field" style={{flex:1,minWidth:130}}>
                  <label>Cidade</label>
                  <select className="filter-select" style={{width:'100%'}} value={regCity} onChange={e=>setRegCity(e.target.value)}>
                    <option value="BELTRAO">Beltrão</option>
                    <option value="TOLEDO">Toledo</option>
                    <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
                  </select>
                </div>
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:.5}}>Itens da Compra</div>
              {regLines.map((line,idx)=>(
                <div key={idx} style={{position:'relative',background:'var(--surface2)',borderRadius:6,padding:'10px 12px',marginBottom:8}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 2fr auto auto auto',gap:8,alignItems:'center'}}>
                    <div style={{position:'relative'}}>
                      <input className="login-input" placeholder="Código" value={line.code}
                        onChange={e=>setLine(idx,'code',e.target.value)}
                        onBlur={()=>setTimeout(()=>setSuggest(p=>p.idx===idx?{idx:-1,list:[]}:p),150)}
                        style={{fontSize:12,padding:'6px 8px'}}/>
                      {suggest.idx===idx&&suggest.list.length>0&&(
                        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--card)',border:'1px solid var(--border)',borderRadius:4,zIndex:50,maxHeight:180,overflowY:'auto'}}>
                          {suggest.list.map(s=>(
                            <div key={s.code} onMouseDown={()=>pickSuggest(s)}
                              style={{padding:'6px 10px',cursor:'pointer',fontSize:12,borderBottom:'1px solid var(--border)'}}
                              onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                              <span style={{color:'var(--accent)',marginRight:6}}>{s.code}</span>
                              <span style={{color:'var(--muted)'}}>{s.description?.slice(0,40)}</span>
                              {s.brand&&<span className="brand-badge" style={{marginLeft:6,fontSize:10}}>{s.brand}</span>}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                    <input className="login-input" placeholder="Descrição" value={line.description}
                      onChange={e=>setLine(idx,'description',e.target.value)}
                      style={{fontSize:12,padding:'6px 8px'}}/>
                    <input className="login-input" type="number" placeholder="Qtd" min="1" value={line.qty}
                      onChange={e=>setLine(idx,'qty',parseInt(e.target.value)||1)}
                      style={{width:60,fontSize:12,padding:'6px 8px'}}/>
                    <input className="login-input" type="number" placeholder="PV" min="0" step="0.01" value={line.pv}
                      onChange={e=>setLine(idx,'pv',parseFloat(e.target.value)||0)}
                      style={{width:90,fontSize:12,padding:'6px 8px'}}/>
                    {regLines.length>1
                      ? <button className="btn btn-sm" style={{background:'var(--danger-bg)',color:'var(--danger)',padding:'4px 8px'}} onClick={()=>remLine(idx)}>✕</button>
                      : <div style={{width:32}}/>}
                  </div>
                  {line.brand&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Fabricante: <strong>{line.brand}</strong>{line.pv>0&&<span style={{marginLeft:8}}>PV: {fmtBRL(line.pv)}</span>}</div>}
                </div>
              ))}
              <button className="btn btn-secondary btn-sm" onClick={addLine} style={{marginTop:4}}>+ Adicionar item</button>
            </div>
            <div className="modal-actions">
              <button className="btn btn-yellow" onClick={doAdd}>💾 Salvar Compra</button>
              <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function App() {
  // Theme
  const [theme, setTheme] = useState(()=>localStorage.getItem('sc_theme')||'dark')
  useEffect(()=>{
    document.documentElement.classList.toggle('light', theme==='light')
    localStorage.setItem('sc_theme', theme)
  },[theme])
  const toggleTheme = () => setTheme(t => t==='dark'?'light':'dark')

  // Sync state — show loading screen until Supabase pull is done
  const [dbReady, setDbReady] = useState(false)

  // Auth — checa localStorage (lembrar acesso) antes do sessionStorage
  const [role,     setRole]     = useState(()=>{
    try { const r=JSON.parse(localStorage.getItem('sc_remember')||'{}'); if(r.role){sessionStorage.setItem('sc_role',r.role);sessionStorage.setItem('sc_name',r.name);return r.role} } catch{}
    return sessionStorage.getItem('sc_role')||null
  })
  const [userName, setUserName] = useState(()=>{
    try { const r=JSON.parse(localStorage.getItem('sc_remember')||'{}'); if(r.name) return r.name } catch{}
    return sessionStorage.getItem('sc_name')||''
  })
  const caps = ROLE_CAPS[role] || ROLE_CAPS.SELLER

  // File data — populated after dbPull
  const [rawItems,        setRawItems]        = useState([])
  const [priceMap,        setPriceMap]        = useState(new Map())
  const [discontinuedMap, setDiscontinuedMap] = useState(new Map())
  const [processed,       setProcessed]       = useState(false)
  const [loading,         setLoading]         = useState(false)
  const [error,           setError]           = useState(null)
  const [showUploadPanel, setShowUploadPanel] = useState(false)

  // Persistent data — populated after dbPull
  const [purchaseHistory,  setPurchaseHistory]  = useState([])
  const [purchaseRequests, setPurchaseRequests] = useState([])
  const [productOverrides, setProductOverrides] = useState({})
  const [availMap,         setAvailMap]         = useState(new Map())
  const [orders,           setOrders]           = useState([])
  const [savedFeedback,    setSavedFeedback]    = useState(false)
  const [logo,             setLogo]             = useState(null)
  const [users,            setUsers]            = useState([])
  const [notifs,           setNotifs]           = useState([])
  const [showNotifPanel,   setShowNotifPanel]   = useState(false)

  const [syncError, setSyncError] = useState(false)

  // Pull from Supabase on mount, then hydrate all state from localStorage
  useEffect(()=>{
    dbPull().then(ok => {
      if (!ok) setSyncError(true)
    }).finally(()=>{
      const ri = getRawItems()
      setRawItems(ri)
      setPriceMap(getPriceMap())
      setDiscontinuedMap(getDiscMap())
      setProcessed(ri.length>0)
      setPurchaseHistory(getHistory())
      setPurchaseRequests(getRequests())
      setProductOverrides(getOverrides())
      setAvailMap(getAvailMap())
      setOrders(getOrders())
      setUsers(getUsers())
      setNotifs(getNotifs())
      setLogo(localStorage.getItem(LOGO_KEY)||null)
      setDbReady(true)
    })
  },[])

  useEffect(()=>{
    const onStorage = () => setLogo(localStorage.getItem(LOGO_KEY)||null)
    window.addEventListener('storage', onStorage)
    return () => window.removeEventListener('storage', onStorage)
  },[])

  // UI state
  const [activeTab,    setActiveTab]    = useState(()=>{
    const saved = sessionStorage.getItem('sc_tab')||'dashboard'
    return saved
  })
  const [selections,   setSelections]   = useState({})
  const [filters,      setFilters]      = useState({search:'',priority:'',brand:'',onlySelected:false})
  const [sort,         setSort]         = useState({col:'priority',dir:'asc'})
  const [showExport,   setShowExport]   = useState(false)
  const [showOrder,    setShowOrder]    = useState(false)
  const [groupByBrand, setGroupByBrand] = useState(false)

  const handleLogin  = (r,n) => {
    setRole(r); setUserName(n)
    // Vendedor começa na pesquisa se dados já existem
    if (r==='SELLER' && getRawItems().length>0) setActiveTab('pesquisa')
  }
  const handleLogout = () => {
    sessionStorage.clear()
    // sc_remember é mantido para que o próximo acesso seja automático/pré-preenchido
    setRole(null); setUserName('')
    // NÃO limpa rawItems/priceMap/availMap — dados persistem para o próximo login
  }

  const handleNewRequest = useCallback(req => {
    const reqs = [...getRequests(), req]
    saveRequests(reqs)
    setPurchaseRequests(reqs)
  }, [])

  const handleSaveOrder = useCallback((tabItemsArg, selectionsArg, activeTabArg, availMapArg, priceMapArg) => {
    const selected = tabItemsArg.filter(i => selectionsArg[i.id]?.selected)
    console.log('[SaveOrder] tabItems:', tabItemsArg.length, 'selected:', selected.length)
    if (!selected.length) return
    try {
      const now = todayStr()
      const cityGroup = activeTabArg === 'TOLEDO' ? 'TOLEDO' : activeTabArg === 'BELTRAO' ? 'BELTRAO' : (selected[0]?.cityGroup||'BELTRAO')
      const newOrders = selected.map(item => {
        const av = availMapArg instanceof Map ? availMapArg.get(item.code) : undefined
        const availType = av?.origemImediato ? 'DISPONIVEL_IMEDIATO'
                        : av?.origemMes      ? 'DISPONIVEL_MES'
                        : 'SEM_DISPONIBILIDADE'
        const qty = selectionsArg[item.id]?.qty ?? item.adjustedQty
        const pv  = selectionsArg[item.id]?.pv ?? item.pv ?? 0
        return { id: Date.now().toString()+Math.random().toString(36).slice(2), code:item.code, description:item.description, brand:item.brand, cityGroup:item.cityGroup||cityGroup, qty, pv, date:now, availType, ufOrigem:item.ufOrigem||'' }
      })
      const allOrders = [...getOrders(), ...newOrders]
      saveOrders(allOrders); setOrders(allOrders)
      const allHistory = [...getHistory(), ...newOrders.map(o=>({...o, enteredBy:'Gabriel Ribeiro'}))]
      saveHistory(allHistory); setPurchaseHistory(allHistory)
      setSavedFeedback(true); setTimeout(()=>setSavedFeedback(false), 2500)
    } catch(e) {
      console.error('Erro ao salvar pedido:', e)
      alert('Erro ao salvar pedido: ' + e.message)
    }
  }, [])

  const handleReset = useCallback(async () => {
    if (!window.confirm('Isso vai apagar TODOS os dados (pedidos, histórico, tabelas, disponibilidade) do sistema inteiro.\n\nTem certeza?')) return
    try {
      // Limpa Supabase
      await sb.from('app_data').delete().in('key', SYNC_KEYS)
      // Limpa localStorage
      SYNC_KEYS.forEach(k => localStorage.removeItem(k))
      // Reseta estado
      setRawItems([]); setPriceMap(new Map()); setDiscontinuedMap(new Map())
      setProcessed(false); setPurchaseHistory([]); setPurchaseRequests([])
      setProductOverrides({}); setAvailMap(new Map()); setOrders([])
      setSelections({}); setShowUploadPanel(false); setError(null)
      alert('Dados resetados. Insira as tabelas novamente.')
    } catch(e) {
      alert('Erro ao resetar: ' + e.message)
    }
  }, [])

  const handleProcess = useCallback(async (stockFile, priceFile) => {
    setLoading(true); setError(null)
    try {
      const swb = await readWb(stockFile)
      const ri  = parseStockReport(swb)
      if (ri.length===0) throw new Error('Nenhum item encontrado. Verifique se é o Relatório de Sugestão de Compras correto.')
      let pm=new Map(), dm=new Map()
      if (priceFile) {
        const pwb = await readWb(priceFile)
        const p = parsePriceTable(pwb)
        pm=p.priceMap; dm=p.discontinuedMap
      }
      // Salvar no localStorage
      saveRawItems(ri)
      savePriceMap(pm, ri)
      saveDiscMap(dm)
      saveDataDate(todayStr())

      setRawItems(ri); setPriceMap(pm); setDiscontinuedMap(dm)

      const tabItems = applyRules(ri, pm, dm, getOrders())
      const allItems = [...tabItems.BELTRAO,...tabItems.TOLEDO,...tabItems.OUTROS,...tabItems.MANUAL,...tabItems.SEM_PRECO]
      const initSel  = {}
      allItems.forEach(i=>{
        initSel[i.id] = { selected: i.suggestion>0 && (i.priority==='ALTA'||i.priority==='MEDIA'), qty: Math.max(1,i.adjustedQty) }
      })
      setSelections(initSel)
      setProcessed(true); setShowUploadPanel(false)
      setActiveTab('dashboard')
      setFilters({search:'',priority:'',brand:'',onlySelected:false})
    } catch(err) { setError(err.message) }
    finally { setLoading(false) }
  }, [])

  // Derived tab data
  const tabItems = useMemo(()=>
    processed ? applyRules(rawItems,priceMap,discontinuedMap,orders) : {BELTRAO:[],TOLEDO:[],OUTROS:[],MANUAL:[],SEM_PRECO:[]}
  ,[processed,rawItems,priceMap,discontinuedMap,orders])

  const allItems = useMemo(()=>
    [...tabItems.BELTRAO,...tabItems.TOLEDO,...tabItems.OUTROS,...tabItems.MANUAL,...tabItems.SEM_PRECO]
  ,[tabItems])

  const tabSummary = useMemo(()=>{
    const r={}
    for (const [tab,items] of Object.entries(tabItems)) {
      const selItems=items.filter(i=>selections[i.id]?.selected)
      r[tab]={
        total:       items.length,
        totalValue:  items.reduce((s,i)=>s+i.adjustedQty*i.pv,0),
        selectedValue:selItems.reduce((s,i)=>s+(selections[i.id]?.qty??i.adjustedQty)*(selections[i.id]?.pv??i.pv),0),
      }
    }
    return r
  },[tabItems,selections])

  const SPECIAL_TABS = ['dashboard','pesquisa','solicitacoes','financeiro','disponibilidade','pedidos','usuarios']
  const isSpecialTab = t => SPECIAL_TABS.includes(t)

  // Notificações pendentes: pedidos cujo prazo de chegada já passou
  const pendingNotifs = useMemo(()=>{
    const today = todayStr()
    const sentIds = new Set((notifs||[]).map(n=>n.histId))
    return purchaseHistory
      .filter(h => {
        if (!h.fromRequest) return false
        if (sentIds.has(h.id)) return false
        // Calcula arrivalDate se não tiver
        let arr = h.arrivalDate
        if (!arr && h.date) {
          const ufOrigem = h.ufOrigem || ''
          const brand    = h.brand || ''
          let days = UF_DAYS[ufOrigem]
          if (!days) { const nb = normStr(brand); days = nb.includes('intelbras') ? UF_DAYS.SC : 10 }
          arr = addBizDays(h.date, days).toISOString().slice(0,10)
        }
        if (!arr || arr > today) return false
        // Encontra o vendedor da solicitação
        const req  = (purchaseRequests||[]).find(r=>r.id===h.fromRequest)
        const name = req?.createdBy || null
        if (!name) return false
        const seller = (users||[]).find(u=>normStr(u.name)===normStr(name))
        return seller && seller.whatsapp
      })
      .map(h => {
        const req = (purchaseRequests||[]).find(r=>r.id===h.fromRequest)
        const seller = (users||[]).find(u=>normStr(u.name)===normStr(req?.createdBy||''))
        let arr = h.arrivalDate
        if (!arr && h.date) {
          const days = UF_DAYS[h.ufOrigem||''] || 10
          arr = addBizDays(h.date, days).toISOString().slice(0,10)
        }
        return { histId:h.id, code:h.code, description:h.description, qty:h.qty, arrivalDate:arr, sellerName:seller.name, whatsapp:seller.whatsapp }
      })
  },[purchaseHistory,purchaseRequests,users,notifs])

  const curTabItems = useMemo(()=>
    isSpecialTab(activeTab) ? [] : (tabItems[activeTab]||[])
  ,[activeTab,tabItems])

  const toggleSelect = useCallback(id=>setSelections(prev=>({...prev,[id]:{...prev[id],selected:!prev[id]?.selected}})),[])
  const setQty       = useCallback((id,qty)=>setSelections(prev=>({...prev,[id]:{...prev[id],qty:Math.max(0,qty)}})),[])
  const setPv        = useCallback((id,pv)=>setSelections(prev=>({...prev,[id]:{...prev[id],pv:Math.max(0,parseFloat(pv)||0)}})),[])
  const selectAll    = useCallback((ids,val)=>setSelections(prev=>{const n={...prev};ids.forEach(id=>{n[id]={...n[id],selected:val}});return n}),[])

  // Auto-enable "Por marca" ao entrar na aba OUTROS
  useEffect(()=>{ if(activeTab==='OUTROS') setGroupByBrand(true) },[activeTab])

  const tabBrands  = useMemo(()=>[...new Set(curTabItems.map(i=>i.brand).filter(Boolean))].sort(),[curTabItems])
  const selInTab   = useMemo(()=>curTabItems.filter(i=>selections[i.id]?.selected).length,[curTabItems,selections])
  const curTabCfg  = TABS_CFG.find(t=>t.id===activeTab)
  const pendingCnt = purchaseRequests.filter(r=>r.status==='PENDENTE').length

  if (!dbReady) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)',flexDirection:'column',gap:16}}>
      <div style={{width:44,height:44,border:'4px solid var(--border)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <span style={{color:'var(--muted)',fontSize:14}}>Sincronizando dados...</span>
      {syncError && <span style={{color:'var(--warning)',fontSize:12,maxWidth:320,textAlign:'center'}}>⚠ Falha ao conectar com o servidor — usando dados locais</span>}
    </div>
  )

  if (!role) return <LoginScreen onLogin={handleLogin}/>

  const visibleTabs = TABS_CFG.filter(t=>t.roles.includes(role))

  const goTab = tab => {
    setActiveTab(tab)
    sessionStorage.setItem('sc_tab', tab)
    setFilters({search:'',priority:'',brand:'',onlySelected:false})
    setGroupByBrand(false)
    setShowExport(false)
    setShowOrder(false)
  }

  // Conteúdo principal
  const renderContent = () => {
    // Gabriel sem dados — mostra upload
    if (!processed && role==='GABRIEL') {
      return <UploadPanel onProcess={handleProcess} loading={loading} error={error} dataDate={getDataDate()}/>
    }
    // Vendedor/Admin sem dados
    if (!processed) {
      return (
        <div className="table-empty" style={{marginTop:80}}>
          <div className="table-empty-icon">⏳</div>
          <p>Aguardando carregamento dos dados pelo administrador.</p>
          <p style={{marginTop:8,color:'var(--muted2)',fontSize:12}}>Peça ao Gabriel para carregar o relatório de estoque.</p>
        </div>
      )
    }
    // Painel de upload (Gabriel atualizando)
    if (showUploadPanel) {
      return <UploadPanel onProcess={handleProcess} loading={loading} error={error}
        onCancel={()=>{setShowUploadPanel(false);setError(null)}} dataDate={getDataDate()}/>
    }
    if (activeTab==='dashboard')
      return <Dashboard tabSummary={tabSummary} onGoTab={goTab} caps={caps} purchaseHistory={purchaseHistory} orders={orders}/>
    if (activeTab==='pesquisa')
      return <ProductSearchTab rawItems={rawItems} priceMap={priceMap} discontinuedMap={discontinuedMap}
        purchaseHistory={purchaseHistory} purchaseRequests={purchaseRequests}
        productOverrides={productOverrides} availMap={availMap} role={role} caps={caps}/>
    if (activeTab==='solicitacoes')
      return <SolicitacoesTab purchaseRequests={purchaseRequests}
        onUpdateRequests={reqs=>{setPurchaseRequests(reqs)}} caps={caps} role={role}
        purchaseHistory={purchaseHistory} onUpdateHistory={setPurchaseHistory} priceMap={priceMap}/>
    if (activeTab==='financeiro')
      return <FinancialTab purchaseHistory={purchaseHistory} onUpdateHistory={setPurchaseHistory}
        caps={caps} onDeleteOrder={updated=>setOrders(updated)} rawItems={rawItems} priceMap={priceMap}/>
    if (activeTab==='disponibilidade')
      return <DisponibilidadeTab rawItems={rawItems} priceMap={priceMap} discontinuedMap={discontinuedMap}
        purchaseHistory={purchaseHistory} purchaseRequests={purchaseRequests}
        productOverrides={productOverrides} onUpdateOverrides={setProductOverrides}
        availMap={availMap} onUpdateAvailMap={setAvailMap} onNewRequest={handleNewRequest} caps={caps}/>
    if (activeTab==='encerramentos')
      return <EncerramentosTab discontinuedMap={discontinuedMap}/>
    if (activeTab==='pedidos')
      return <PedidosTab purchaseHistory={purchaseHistory} productOverrides={productOverrides} rawItems={rawItems} priceMap={priceMap} purchaseRequests={purchaseRequests}/>
    if (activeTab==='usuarios')
      return <UsuariosTab users={users} onUpdateUsers={u=>{setUsers(u);saveUsers(u)}}/>
    // Abas de tabela
    return (
      <>
        <div className="page-header">
          <div>
            <h2 className="page-title">{curTabCfg?.icon} {curTabCfg?.label}</h2>
            <p className="page-subtitle">
              {tabSummary[activeTab]?.total??0} itens
              {caps.seePrices&&(tabSummary[activeTab]?.totalValue??0)>0&&` · ${fmtBRL(tabSummary[activeTab].totalValue)}`}
              {caps.seePrices&&(tabSummary[activeTab]?.selectedValue??0)>0&&` · Sel: ${fmtBRL(tabSummary[activeTab].selectedValue)}`}
            </p>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {activeTab==='OUTROS'&&(
              <label className="filter-toggle">
                <input type="checkbox" checked={groupByBrand} onChange={e=>setGroupByBrand(e.target.checked)}/>
                <span>Por marca</span>
              </label>
            )}
            {selInTab>0&&activeTab!=='SEM_PRECO'&&caps.canExport&&(
              <>
                <button className="btn btn-secondary btn-sm" onClick={()=>setShowOrder(true)}>🖨️ Pedido</button>
                <button className="btn btn-yellow" onClick={()=>setShowExport(true)}>
                  Exportar ({selInTab})
                </button>
                <button
                  className={`btn btn-sm ${savedFeedback?'btn-success':'btn-secondary'}`}
                  onClick={()=>handleSaveOrder(curTabItems,selections,activeTab,availMap,priceMap)}
                  title="Salva o pedido no banco — desconta da sugestão de compra">
                  {savedFeedback?'✅ Salvo!':'💾 Salvar Pedido'}
                </button>
              </>
            )}
          </div>
        </div>
        <FilterBar filters={filters} sort={sort} brands={tabBrands}
          onFilterChange={setFilters} onSortChange={setSort}
          showBrandFilter={activeTab==='OUTROS'||activeTab==='MANUAL'||activeTab==='SEM_PRECO'}/>
        <ProductTable items={curTabItems} selections={selections}
          filters={filters} sort={sort}
          activeTab={activeTab} groupByBrand={groupByBrand&&activeTab==='OUTROS'}
          caps={caps}
          onToggleSelect={toggleSelect} onSetQty={setQty} onSetPv={setPv} onSelectAll={selectAll}/>
      </>
    )
  }

  return (
    <div className="app">
      {/* ── TOPBAR ── */}
      <header className="topbar">
        <div className="topbar-brand">
          {logo
            ? <img src={logo} alt="Logo" className="topbar-logo-img"/>
            : <span className="topbar-logo">🛒</span>
          }
          <div>
            <div className="topbar-title">Yes Mocelin</div>
            <div className="topbar-subtitle">Sistema de Compras</div>
          </div>
        </div>
        <div className="topbar-actions">
          {processed&&!showUploadPanel&&<span className="topbar-info">{allItems.length} itens · {getDataDate()||'—'}</span>}
          <span className="topbar-user">
            {userName}
            <span className="topbar-role">{role}</span>
          </span>
          {caps.canUpload&&processed&&!showUploadPanel&&(
            <button className="btn btn-ghost btn-sm" onClick={()=>{setShowUploadPanel(true);setError(null)}}>
              ↑ Atualizar Dados
            </button>
          )}
          {caps.canUpload&&(
            <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)',opacity:.7}} onClick={handleReset} title="Resetar todos os dados do sistema">
              ⚠ Resetar
            </button>
          )}
          {caps.canApprove && (
            <button className="notif-bell" onClick={()=>setShowNotifPanel(true)} title="Notificações de chegada">
              🔔
              {pendingNotifs.length>0&&<span className="notif-badge">{pendingNotifs.length}</span>}
            </button>
          )}
          <button className="theme-toggle" onClick={toggleTheme} title="Alternar tema">
            {theme==='dark'?'☀️':'🌙'}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={handleLogout}>Sair</button>
        </div>
      </header>

      <div className="main-layout">
        {/* ── SIDEBAR ── */}
        {processed&&!showUploadPanel&&(
          <nav className="sidebar">
            {visibleTabs.map(tab=>{
              const isSpecial = isSpecialTab(tab.id)
              const badge = tab.id==='solicitacoes' ? pendingCnt
                : tab.id==='financeiro' ? purchaseHistory.length
                : tab.id==='pedidos' ? purchaseHistory.filter(h=>Math.floor((Date.now()-new Date(h.date).getTime())/86400000)<=90).length
                : isSpecial||!tabSummary[tab.id] ? null
                : (tabSummary[tab.id]?.total??0)
              const sv = tabSummary[tab.id]?.selectedValue??0
              return (
                <button key={tab.id}
                  className={`sidebar-tab${activeTab===tab.id?' active':''}`}
                  onClick={()=>goTab(tab.id)}
                  style={activeTab===tab.id?{borderLeftColor:tab.color}:{}}>
                  <span className="sidebar-tab-icon">{tab.icon}</span>
                  <span className="sidebar-tab-label">{tab.label}</span>
                  {badge!=null&&badge>0&&<span className="sidebar-tab-badge">{badge}</span>}
                  {caps.seePrices&&sv>0&&!isSpecial&&(
                    <span className="sidebar-tab-value">{fmtBRL(sv)}</span>
                  )}
                </button>
              )
            })}
          </nav>
        )}

        {/* ── CONTENT ── */}
        <main className="content">
          {renderContent()}
        </main>
      </div>

      {/* ── MODALS ── */}
      {showExport&&(
        <ExportModal items={curTabItems} selections={selections}
          tabLabel={curTabCfg?.label??''} activeTab={activeTab}
          cityGroup={activeTab==='BELTRAO'?'BELTRAO':activeTab==='TOLEDO'?'TOLEDO':null}
          caps={caps} onClose={()=>setShowExport(false)}/>
      )}
      {showOrder&&(
        <PurchaseOrderModal items={curTabItems} selections={selections}
          tabLabel={curTabCfg?.label??''} logo={logo}
          onClose={()=>setShowOrder(false)}/>
      )}
      {showNotifPanel&&(
        <NotificationsPanel
          pendingNotifs={pendingNotifs}
          onSent={histId=>{
            const n=[...notifs,{histId,sentAt:new Date().toISOString()}]
            setNotifs(n); saveNotifs(n)
          }}
          onClose={()=>setShowNotifPanel(false)}/>
      )}
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: EncerramentosTab
// ═══════════════════════════════════════════════════════════
function EncerramentosTab({ discontinuedMap }) {
  const [search, setSearch] = useState('')

  const items = useMemo(() => {
    const arr = []
    discontinuedMap.forEach((v, code) => arr.push({ code, ...v }))
    arr.sort((a,b) => a.code.localeCompare(b.code))
    return arr
  }, [discontinuedMap])

  const filtered = useMemo(() => {
    if (!search.trim()) return items
    const q = normStr(search)
    return items.filter(i =>
      normStr(i.code).includes(q) ||
      normStr(i.description||'').includes(q) ||
      normStr(i.substitute||'').includes(q) ||
      normStr(i.substituteName||'').includes(q)
    )
  }, [items, search])

  return (
    <div>
      <div className="page-header">
        <div>
          <h2 className="page-title">🚫 Encerramentos</h2>
          <p className="page-subtitle">Produtos fora de linha e descontinuados · {items.length} itens</p>
        </div>
      </div>
      <div className="filter-bar">
        <input className="filter-search" placeholder="Buscar código, descrição ou substituto..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <span style={{fontSize:12,color:'var(--muted)'}}>{filtered.length} itens</span>
      </div>
      {filtered.length===0
        ? <div className="table-empty"><div className="table-empty-icon">🚫</div><p>Nenhum item encerrado encontrado.</p></div>
        : (
          <div className="table-scroll" style={{overflowX:'auto'}}>
            <table className="product-table">
              <thead>
                <tr>
                  <th>Código</th>
                  <th>Descrição</th>
                  <th>Cód. Substituto</th>
                  <th>Info do Substituto</th>
                  <th>Data Encerramento</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((item, idx) => (
                  <tr key={item.code} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                    <td className="mono">{item.code}</td>
                    <td style={{maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={item.description||''}>{item.description||<span style={{color:'var(--muted2)'}}>—</span>}</td>
                    <td className="mono" style={{color:item.substitute?'var(--info)':'var(--muted2)'}}>{item.substitute||'—'}</td>
                    <td style={{maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:item.substituteName?'var(--text)':'var(--muted2)'}} title={item.substituteName||''}>{item.substituteName||'—'}</td>
                    <td style={{fontSize:12,color:item.closedAt?'var(--muted)':'var(--muted2)'}}>{item.closedAt||'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      }
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: UsuariosTab
// ═══════════════════════════════════════════════════════════
function UsuariosTab({ users, onUpdateUsers }) {
  const EMPTY_USER = { id:'', username:'', password:'', name:'', whatsapp:'', role:'SELLER', active:true }
  const [form,    setForm]    = useState(null)   // null = fechado, objeto = editando/novo
  const [errors,  setErrors]  = useState({})

  const openNew  = () => setForm({...EMPTY_USER})
  const openEdit = u  => setForm({...u})
  const closeForm= () => { setForm(null); setErrors({}) }

  const validate = () => {
    const e = {}
    if (!form.username.trim()) e.username = 'Obrigatório'
    if (!form.name.trim())     e.name     = 'Obrigatório'
    if (!form.id && !form.password.trim()) e.password = 'Obrigatório'
    if (form.whatsapp && !/^\d{10,11}$/.test(form.whatsapp.replace(/\D/g,''))) e.whatsapp = 'DDD + número (10 ou 11 dígitos)'
    // Verifica username duplicado
    const dup = users.find(u=>u.username===form.username.trim().toLowerCase()&&u.id!==form.id)
    if (dup) e.username = 'Usuário já existe'
    return e
  }

  const save = () => {
    const e = validate()
    if (Object.keys(e).length) { setErrors(e); return }
    const entry = {
      ...form,
      username:  form.username.trim().toLowerCase(),
      name:      form.name.trim(),
      password:  form.password || (users.find(u=>u.id===form.id)?.password||''),
      whatsapp:  form.whatsapp.replace(/\D/g,''),
      id:        form.id || (Date.now().toString()+Math.random().toString(36).slice(2)),
    }
    const updated = form.id
      ? users.map(u=>u.id===form.id?entry:u)
      : [...users, entry]
    onUpdateUsers(updated)
    closeForm()
  }

  const toggle = id => {
    const updated = users.map(u=>u.id===id?{...u,active:!u.active}:u)
    onUpdateUsers(updated)
  }

  const del = id => {
    if (!window.confirm('Excluir este usuário?')) return
    onUpdateUsers(users.filter(u=>u.id!==id))
  }

  const fld = (key,label,type='text',placeholder='') => (
    <div className="form-field">
      <label>{label}{key!=='whatsapp'&&key!=='password'&&<span style={{color:'var(--danger)'}}> *</span>}</label>
      <input className={`login-input${errors[key]?' input-error':''}`} type={type}
        value={form[key]||''} placeholder={placeholder||label}
        onChange={e=>{ setForm(p=>({...p,[key]:e.target.value})); setErrors(p=>({...p,[key]:''})) }}/>
      {errors[key]&&<span className="field-error">{errors[key]}</span>}
    </div>
  )

  return (
    <div style={{padding:24}}>
      <div className="page-header">
        <div>
          <h2 className="page-title">👥 Usuários</h2>
          <p className="page-subtitle">{users.length} cadastrado(s)</p>
        </div>
        <button className="btn btn-yellow" onClick={openNew}>+ Novo Vendedor</button>
      </div>

      {users.length===0
        ? <div className="table-empty"><div className="table-empty-icon">👤</div><p>Nenhum vendedor cadastrado.</p></div>
        : (
          <div className="table-scroll">
            <table className="product-table">
              <thead><tr>
                <th>Nome</th><th>Usuário</th><th>WhatsApp</th><th>Cargo</th><th>Ativo</th><th>Ações</th>
              </tr></thead>
              <tbody>
                {users.map((u,idx)=>(
                  <tr key={u.id} style={{background:idx%2===0?'var(--card)':'var(--surface)',opacity:u.active===false?.5:1}}>
                    <td><strong>{u.name}</strong></td>
                    <td className="mono">{u.username}</td>
                    <td>{u.whatsapp?`(${u.whatsapp.slice(0,2)}) ${u.whatsapp.slice(2)}`:'—'}</td>
                    <td>{u.role==='SELLER'?'Vendedor':u.role}</td>
                    <td>
                      <label style={{cursor:'pointer'}}>
                        <input type="checkbox" checked={u.active!==false} onChange={()=>toggle(u.id)}/>
                      </label>
                    </td>
                    <td>
                      <div style={{display:'flex',gap:4}}>
                        <button className="btn btn-sm btn-ghost" onClick={()=>openEdit(u)}>✏️ Editar</button>
                        <button className="btn btn-sm" style={{background:'var(--danger-bg)',color:'var(--danger)',border:'1px solid var(--danger)'}} onClick={()=>del(u.id)}>🗑️</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      }

      {form && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&closeForm()}>
          <div className="modal">
            <div className="modal-header">
              <div><h2 className="modal-title">{form.id?'Editar Vendedor':'Novo Vendedor'}</h2></div>
              <button className="modal-close" onClick={closeForm}>✕</button>
            </div>
            <div className="modal-body">
              {fld('name',      'Nome completo')}
              {fld('username',  'Usuário (login)', 'text', 'minúsculo, sem espaço')}
              {fld('password',  form.id?'Nova senha (deixe em branco para manter)':'Senha','password')}
              {fld('whatsapp',  'WhatsApp (DDD + número)', 'text', '44999998888')}
              <div className="form-field">
                <label>Cargo</label>
                <select className="filter-select" style={{width:'100%'}} value={form.role}
                  onChange={e=>setForm(p=>({...p,role:e.target.value}))}>
                  <option value="SELLER">Vendedor</option>
                  <option value="GABRIEL">Gabriel</option>
                  <option value="ADMIN">Admin</option>
                </select>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-yellow" onClick={save}>Salvar</button>
              <button className="btn btn-ghost" onClick={closeForm}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: NotificationsPanel
// ═══════════════════════════════════════════════════════════
function NotificationsPanel({ pendingNotifs, onSent, onClose }) {
  const buildWaLink = (n) => {
    const msg = `Olá ${n.sellerName}! Favor verificar se o item chegou às dependências:\n\n` +
      `📦 Código: ${n.code}\n` +
      `📝 Descrição: ${n.description}\n` +
      `🔢 Quantidade: ${n.qty} un.\n\n` +
      `Previsão de chegada era ${fmtDate(n.arrivalDate)}. Por favor confirme o recebimento.`
    const phone = '55' + n.whatsapp.replace(/\D/g,'')
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`
  }

  const send = (n) => {
    window.open(buildWaLink(n), '_blank')
    onSent(n.histId)
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:560}}>
        <div className="modal-header">
          <div>
            <h2 className="modal-title">🔔 Avisos de Chegada</h2>
            <p className="modal-sub">Pedidos com prazo vencido, aguardando confirmação</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {pendingNotifs.length===0
            ? <div className="table-empty"><div className="table-empty-icon">✅</div><p>Nenhum aviso pendente.</p></div>
            : pendingNotifs.map(n=>(
              <div key={n.histId} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,marginBottom:2}}>{n.code} <span style={{fontWeight:400,color:'var(--muted)'}}>{(n.description||'').slice(0,40)}</span></div>
                  <div style={{fontSize:12,color:'var(--muted)'}}>
                    {n.qty} un. · Previsão: <span style={{color:'var(--danger)'}}>{fmtDate(n.arrivalDate)}</span> · Vendedor: <strong>{n.sellerName}</strong>
                  </div>
                </div>
                <button className="btn btn-sm" style={{background:'#25D366',color:'#fff',border:'none',whiteSpace:'nowrap'}}
                  onClick={()=>send(n)}>
                  📱 Enviar WA
                </button>
              </div>
            ))
          }
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
