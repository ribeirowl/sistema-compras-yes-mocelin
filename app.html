// Conta dias úteis (seg-sex) num intervalo [d1..d2] do mesmo mês
function countBizDays(year, month, d1, d2) {
  let n = 0
  for (let d = d1; d <= d2; d++) {
    const dow = new Date(year, month, d).getDay()
    if (dow !== 0 && dow !== 6) n++
  }
  return n
}

// Retorna { year, month, today, lastDay, thisMonth } sempre em hora local
function getLocalMonthInfo() {
  const d = new Date()
  const year  = d.getFullYear()
  const month = d.getMonth()   // 0-indexed
  const today = d.getDate()
  const lastDay = new Date(year, month+1, 0).getDate()
  const thisMonth = `${year}-${String(month+1).padStart(2,'0')}`
  return { year, month, today, lastDay, thisMonth }
}

function Dashboard({ tabSummary, onGoTab, caps, purchaseHistory, orders }) {
  const cards = [
    { tab:'BELTRAO',   label:'Beltrão',        icon:'🟣', color:'#9C8FFF' },
    { tab:'TOLEDO',    label:'Toledo',          icon:'🔵', color:'#4FC3F7' },
    { tab:'OUTROS',    label:'Outros Fornec.',  icon:'📦', color:'#3DDC97' },
    { tab:'MANUAL',    label:'Análise Manual',  icon:'⚠️', color:'#FFA726' },
    { tab:'SEM_PRECO', label:'Sem Preço',       icon:'❗', color:'#FF4D4D' },
  ]

  // Tick a cada hora para atualizar automaticamente quando o mês virar
  const [tick, setTick] = useState(0)
  useEffect(() => {
    const id = setInterval(() => setTick(t => t+1), 3600_000)
    return () => clearInterval(id)
  }, [])

  // Sempre usa hora local — sem ISO/UTC
  const { year, month, today, lastDay, thisMonth } = useMemo(() => getLocalMonthInfo(), [tick])

  const bizTotal  = countBizDays(year, month, 1, lastDay)
  const bizRemain = bizTotal - countBizDays(year, month, 1, today)

  const monthSpent = useMemo(() => {
    const res = { BELTRAO:0, TOLEDO:0 }
    // Combina purchaseHistory + orders deste mês (deduplica por id)
    const seen = new Set()
    const all  = [...(purchaseHistory||[]), ...(orders||[])]
    all.forEach(h => {
      if (seen.has(h.id)) return
      seen.add(h.id)
      if ((h.date||'').slice(0,7) === thisMonth && res[h.cityGroup] !== undefined)
        res[h.cityGroup] += (h.qty||0) * (h.pv||0)
    })
    return res
  }, [purchaseHistory, orders, thisMonth])

  return (
    <div className="dashboard">
      <h2 className="page-title">Dashboard</h2>
      <p className="page-subtitle">Visão geral das sugestões de compra</p>
      <div className="dashboard-grid">
        {cards.map(c => {
          const s = tabSummary[c.tab] ?? { total:0, totalValue:0, selectedValue:0 }
          return (
            <button key={c.tab} className="dash-card" onClick={()=>onGoTab(c.tab)}
              style={{'--card-color':c.color}}>
              <div className="dash-card-icon">{c.icon}</div>
              <div className="dash-card-label">{c.label}</div>
              <div className="dash-card-count">{s.total} itens</div>
              {caps.seePrices && s.totalValue>0 && (
                <div className="dash-card-value">{fmtBRL(s.totalValue)}</div>
              )}
            </button>
          )
        })}
      </div>

      {caps.seePrices && (
        <>
          {/* ── LIMITES ── */}
          <div style={{marginTop:24,display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            {[{key:'BELTRAO',label:'Beltrão',color:'#9C8FFF'},{key:'TOLEDO',label:'Toledo',color:'#4FC3F7'}].map(({key,label,color})=>{
              const dailyLimit   = DAILY_LIMITS[key]
              const monthlyLimit = dailyLimit * bizTotal          // limite mensal = diário × dias úteis
              const dailyUsed    = monthSpent[key]                // gasto no mês (mesmo dado)
              const monthlyPct   = Math.min(100, monthlyLimit>0 ? Math.round(dailyUsed/monthlyLimit*100) : 0)
              const overMonthly  = dailyUsed > monthlyLimit
              return (
                <div key={key} style={{background:'var(--surface2)',borderRadius:10,padding:'14px 16px',border:'1px solid var(--border)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <span style={{color,fontWeight:700,fontSize:13}}>{label}</span>
                    <span style={{fontSize:10,color:'var(--muted)',background:'var(--card2)',padding:'2px 8px',borderRadius:10}}>
                      {bizRemain} dias úteis restantes
                    </span>
                  </div>

                  {/* Diário */}
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:2,textTransform:'uppercase',letterSpacing:.5}}>Limite diário</div>
                  <div style={{fontSize:20,fontWeight:800,color:color,marginBottom:10}}>{fmtBRL(dailyLimit)}</div>

                  {/* Mensal = diário × dias úteis */}
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>
                    Limite mensal <span style={{color:'var(--muted2)',textTransform:'none',letterSpacing:0}}>({fmtBRL(dailyLimit)} × {bizTotal} dias)</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                    <strong style={{color:overMonthly?'var(--danger)':'var(--text)',fontSize:15}}>{fmtBRL(dailyUsed)}</strong>
                    <span style={{color:'var(--muted)',fontSize:12}}>/ {fmtBRL(monthlyLimit)}</span>
                  </div>
                  <div style={{background:'var(--border2)',borderRadius:4,height:7,overflow:'hidden',marginBottom:5}}>
                    <div style={{width:monthlyPct+'%',height:'100%',background:overMonthly?'var(--danger)':color,borderRadius:4,transition:'width .4s'}}/>
                  </div>
                  <div style={{fontSize:11,color:overMonthly?'var(--danger)':'var(--muted)',textAlign:'right'}}>
                    {overMonthly
                      ? <strong style={{color:'var(--danger)'}}>⛔ {fmtBRL(dailyUsed-monthlyLimit)} acima</strong>
                      : <>Disponível: <strong style={{color:'var(--text)'}}>{fmtBRL(monthlyLimit-dailyUsed)}</strong></>}
                  </div>
                </div>
              )
            })}
          </div>

          <div className="dash-summary">
            <div className="dash-summary-row">
              <span>Sugestão Beltrão:</span>

              <strong style={{color:'#4FC3F7'}}>{fmtBRL(tabSummary.TOLEDO?.totalValue??0)}</strong>

}

// COMPONENT: FilterBar

function FilterBar({ filters, sort, brands, onFilterChange, onSortChange, showBrandFilter }) {
  const SORT_OPTS = [
    ['priority-asc',   'Prioridade ↑'],
    ['suggestion-desc','Sugestão ↓'],
    ['code-asc',       'Código A→Z'],
    ['totalValue-desc','Valor ↓'],
    ['brand-asc',      'Marca A→Z'],
  ]
  const sv = `${sort.col}-${sort.dir}`
  return (
    <div className="filter-bar">
      <input className="filter-search" type="text" placeholder="Buscar código, descrição, marca..."
        value={filters.search} onChange={e=>onFilterChange({...filters,search:e.target.value})}/>
      <select className="filter-select" value={filters.priority??''}
        onChange={e=>onFilterChange({...filters,priority:e.target.value})}>
        <option value="">Todas prioridades</option>
        {['ALTA','MEDIA','NORMAL','BAIXA'].map(p=><option key={p} value={p}>{PRIORITY_LABELS[p]}</option>)}
      </select>
      {showBrandFilter && brands.length>0 && (
        <select className="filter-select" value={filters.brand??''}
          onChange={e=>onFilterChange({...filters,brand:e.target.value})}>
          <option value="">Todas marcas</option>
          {brands.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
      )}
      <select className="filter-select" value={sv}
        onChange={e=>{const[col,dir]=e.target.value.split('-');onSortChange({col,dir})}}>
        {SORT_OPTS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
      </select>
      <label className="filter-toggle">
        <input type="checkbox" checked={filters.onlySelected??false}
          onChange={e=>onFilterChange({...filters,onlySelected:e.target.checked})}/>
        <span>Só selecionados</span>
      </label>
    </div>
  )
}

// COMPONENT: ProductTable
// ═══════════════════════════════════════════════════════════
function ProductTable({ items, selections, filters, sort, activeTab, groupByBrand, caps, onToggleSelect, onSetQty, onSetPv, onSelectAll }) {
  const filtered = useMemo(() => {
    let out = items
    const q = normStr(filters.search??'')
    if (q) out = out.filter(i => normStr(i.code).includes(q)||normStr(i.description).includes(q)||normStr(i.brand).includes(q))
    if (filters.priority) out = out.filter(i=>i.priority===filters.priority)
    if (filters.brand)    out = out.filter(i=>i.brand===filters.brand)
    if (filters.onlySelected) out = out.filter(i=>selections[i.id]?.selected)
    return out
  }, [items, filters, selections])

  const sorted = useMemo(() => {
    return [...filtered].sort((a,b)=>{
      let va, vb
      switch(sort.col) {
        case 'priority':   va=PRIORITY_ORDER[a.priority];   vb=PRIORITY_ORDER[b.priority]; break
        case 'totalValue': va=(selections[a.id]?.qty??a.adjustedQty)*a.pv; vb=(selections[b.id]?.qty??b.adjustedQty)*b.pv; break
        case 'suggestion': va=a.suggestion; vb=b.suggestion; break
        case 'code':       va=a.code;       vb=b.code;       break
        case 'brand':      va=a.brand;      vb=b.brand;      break
        default:           va=a[sort.col]??0; vb=b[sort.col]??0
      }
      if (va<vb) return sort.dir==='asc'?-1:1
      if (va>vb) return sort.dir==='asc'?1:-1
      return 0
    })
  }, [filtered, sort, selections])

  if (sorted.length===0) {
    return (
      <div className="table-empty">
        <div className="table-empty-icon">🔍</div>
        <p>{items.length===0?'Nenhum item nesta aba.':'Nenhum item corresponde aos filtros.'}</p>
      </div>
    )
  }

  const showBrand = activeTab==='OUTROS'||activeTab==='MANUAL'||activeTab==='SEM_PRECO'

  if (groupByBrand && activeTab==='OUTROS') {
    const brandMap = new Map()
    for (const item of sorted) {
      const b = item.brand||'DESCONHECIDA'
      if (!brandMap.has(b)) brandMap.set(b,[])
      brandMap.get(b).push(item)
    }
    return (
      <div className="table-groups">
        {[...brandMap.entries()].map(([brand,brandItems])=>{
          const bids = brandItems.map(i=>i.id)
          const allBSel = bids.every(id=>selections[id]?.selected)
          const bTotal = brandItems.reduce((s,i)=>{const q=selections[i.id]?.qty??i.adjustedQty;return s+q*i.pv},0)
          return (
            <div key={brand} className="brand-group">
              <div className="brand-group-header">
                {caps.canEdit && (
                  <label className="checkbox-wrap">
                    <input type="checkbox" checked={allBSel} onChange={()=>onSelectAll(bids,!allBSel)}/>
                  </label>
                )}
                <span className="brand-group-name">{brand}</span>
                <span className="brand-group-count">{brandItems.length} itens</span>
                {caps.seePrices&&bTotal>0&&<span className="brand-group-value">{fmtBRL(bTotal)}</span>}
              </div>
              <TableRows items={brandItems} selections={selections} showBrand={false}
                activeTab={activeTab} caps={caps} onToggleSelect={onToggleSelect} onSetQty={onSetQty} onSetPv={onSetPv}/>
            </div>
          )
        })}
      </div>
    )
  }

  const visibleIds  = sorted.map(i=>i.id)
  const allSelected = visibleIds.length>0 && visibleIds.every(id=>selections[id]?.selected)
  const someSelected= visibleIds.some(id=>selections[id]?.selected)
  const selCount    = sorted.filter(i=>selections[i.id]?.selected).length
  const selVal      = sorted.filter(i=>selections[i.id]?.selected).reduce((s,i)=>{const q=selections[i.id]?.qty??i.adjustedQty;return s+q*i.pv},0)

  return (
    <div className="table-wrap">
      {caps.canEdit && (
        <div className="table-toolbar">
          <label className="checkbox-wrap select-all-cb">
            <input type="checkbox" checked={allSelected}
              ref={el=>{if(el)el.indeterminate=someSelected&&!allSelected}}
              onChange={()=>onSelectAll(visibleIds,!allSelected)}/>
            <span>Selecionar tudo ({sorted.length})</span>
          </label>
          <span className="table-count">
            {selCount} selecionados
            {caps.seePrices&&' · '+fmtBRL(selVal)}
          </span>
        </div>
      )}
      <TableRows items={sorted} selections={selections} showBrand={showBrand}
        activeTab={activeTab} caps={caps} onToggleSelect={onToggleSelect} onSetQty={onSetQty} onSetPv={onSetPv}/>
    </div>
  )
}

function TableRows({ items, selections, showBrand, activeTab, caps, onToggleSelect, onSetQty, onSetPv }) {
  const isOutros = activeTab === 'OUTROS'
  const storeAbbrev = label => {
    const s = String(label||'')
    if (/^1[-\s]/i.test(s)) return 'FB'
    if (/^2[-\s]/i.test(s)) return 'DV'
    if (/^3[-\s]/i.test(s)) return 'TL'
    return s.slice(0,3)
  }
  return (
    <div className="table-scroll">
      <table className="product-table">
        <thead>
          <tr>
            {caps.canEdit && <th className="col-cb"></th>}
            <th className="col-code">Código</th>
            <th className="col-desc">Descrição</th>
            {showBrand   && <th className="col-brand">Marca</th>}
            <th className="col-num">Sugestão</th>
            {caps.canEdit && <th className="col-num">Múltiplo</th>}
            {caps.canEdit && <th className="col-qty">Qtd. Final</th>}
            {caps.canEdit && <th className="col-num">Estoque</th>}
            {caps.canEdit && <th className="col-num">Reservado</th>}
            {caps.canEdit && <th className="col-num" title="Média de vendas mensal">Média/Mês</th>}
            {caps.canEdit && <th className="col-num" title="Vendas no mês atual">Mês Atual</th>}
            {caps.seePrices && <th className="col-price">{isOutros ? 'PV (edit.)' : 'PV'}</th>}
            {caps.seePrices && <th className="col-total">Total</th>}
            <th className="col-prio">Prioridade</th>
          </tr>
        </thead>
        <tbody>
          {items.map((item,idx) => {
            const sel = selections[item.id] ?? { selected:false, qty:item.adjustedQty }
            const qty = sel.qty ?? item.adjustedQty
            const effectivePv = sel.pv ?? item.pv ?? 0
            const rowBg = sel.selected ? PRIORITY_BG[item.priority] : (idx%2===0?'var(--card)':'var(--surface)')
            const rowTotal = qty * effectivePv
            const hasBreakdown = isOutros && item.breakdown && item.breakdown.length > 1
            return (
              <tr key={item.id} style={{background:rowBg}} className={`product-row${sel.selected?' row-selected':''}`}>
                {caps.canEdit && (
                  <td className="col-cb">
                    <input type="checkbox" className="row-checkbox"
                      checked={sel.selected} onChange={()=>onToggleSelect(item.id)}/>
                  </td>
                )}
                <td className="col-code mono">
                  {item.code}
                  {item.isExpensive&&caps.seePrices&&<span className="expensive-tag" title="PV > R$2.500">💰</span>}
                </td>
                <td className="col-desc" title={item.description}>
                  {item.description}
                  {item.family&&<span className="family-tag">{item.family}</span>}
                </td>
                {showBrand&&<td className="col-brand"><span className="brand-badge">{item.brand||'—'}</span></td>}
                <td className="col-num"><span className="suggestion-val">{item.suggestion}</span></td>
                {caps.canEdit&&<td className="col-num num">{item.multiple>1?item.multiple:'—'}</td>}
                {caps.canEdit&&(
                  <td className="col-qty">
                    <input type="number" className="qty-input" min="0"
                      step={item.multiple>1?item.multiple:1}
                      value={qty}
                      onChange={e=>onSetQty(item.id,parseInt(e.target.value,10)||0)}
                      disabled={!sel.selected}
                      title={item.multiple>1?`Múltiplo de ${item.multiple}`:''}/>
                  </td>
                )}
                {caps.canEdit&&(
                  <td className="col-num num">
                    {item.stock}
                    {hasBreakdown&&(
                      <div style={{fontSize:10,color:'var(--muted)',lineHeight:1.3,marginTop:2,whiteSpace:'nowrap'}}>
                        {item.breakdown.map(b=>`${storeAbbrev(b.label)}: ${b.stock}`).join(' | ')}
                      </div>
                    )}
                  </td>
                )}
                {caps.canEdit&&<td className="col-num num">{item.reserved}</td>}
                {caps.canEdit&&<td className="col-num num" style={{color:'var(--muted)'}}>{item.avgMonthly>0?Math.round(item.avgMonthly):'—'}</td>}
                {caps.canEdit&&<td className="col-num num" style={{color:item.currentMonthSales>0?'var(--success)':'var(--muted)'}}>{item.currentMonthSales>0?Math.round(item.currentMonthSales):'—'}</td>}
                {caps.seePrices&&(
                  <td className="col-price num">
                    {isOutros && onSetPv ? (
                      <input type="number" className="qty-input" min="0" step="0.01"
                        style={{width:80,textAlign:'right'}}
                        value={effectivePv||''}
                        placeholder="0,00"
                        onChange={e=>onSetPv(item.id, parseFloat(e.target.value)||0)}/>
                    ) : (
                      item.pv>0 ? fmtBRL(item.pv) : <span className="no-price">S/P</span>
                    )}
                  </td>
                )}
                {caps.seePrices&&(
                  <td className="col-total num">
                    {rowTotal>0?<strong className={rowTotal>30000?'value-high':''}>{fmtBRL(rowTotal)}</strong>:'—'}
                  </td>
                )}
                <td className="col-prio">
                  <span className="priority-badge"
                    style={{background:PRIORITY_BG[item.priority],color:PRIORITY_COLORS[item.priority],border:`1px solid ${PRIORITY_COLORS[item.priority]}44`}}>
                    {PRIORITY_LABELS[item.priority]}
                  </span>
                </td>
              </tr>
            )
          })}
        </tbody>
      </table>
    </div>
  )
}

// COMPONENT: ExportModal
// ═══════════════════════════════════════════════════════════
function ExportModal({ items, selections, tabLabel, activeTab, cityGroup, caps, onClose }) {
  const [copied,     setCopied]     = useState(false)
  const [separator,  setSeparator]  = useState('semicolon')
  const [groupBrand, setGroupBrand] = useState(activeTab==='OUTROS')

  const selectedItems = useMemo(() =>
    items.filter(i=>selections[i.id]?.selected)
      .map(i=>({...i, exportQty:selections[i.id]?.qty??i.adjustedQty, pv:selections[i.id]?.pv??i.pv??0}))
      .filter(i=>i.exportQty>0)
  , [items,selections])

  const sep = separator==='semicolon' ? ';' : separator==='tab' ? '\t' : '    '

  const exportText = useMemo(() => {
    if (groupBrand && activeTab==='OUTROS') {
      const bm = new Map()
      selectedItems.forEach(i=>{const b=i.brand||'DESCONHECIDA';if(!bm.has(b))bm.set(b,[]);bm.get(b).push(i)})
      const lines=[]
      for (const [brand,bi] of bm) { lines.push(`# ${brand}`); bi.forEach(i=>lines.push(`${i.code}${sep}${i.exportQty}`)); lines.push('') }
      return lines.join('\n')
    }
    return selectedItems.map(i=>`${i.code}${sep}${i.exportQty}`).join('\n')
  }, [selectedItems,sep,groupBrand,activeTab])

  const totalValue = selectedItems.reduce((s,i)=>s+i.exportQty*i.pv, 0)
  const split = cityGroup ? calcOrderSplit(totalValue, cityGroup) : null

  const doCopy = async () => {
    try { await navigator.clipboard.writeText(exportText) }
    catch { const el=document.getElementById('exp-ta'); el?.select(); document.execCommand('copy') }
    setCopied(true); setTimeout(()=>setCopied(false),2000)
  }

  const dlCSV = () => {
    const rows = selectedItems.map(i=>`${i.code};${i.exportQty}`)
    dlBlob(new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'}),
      `pedido_${tabLabel.replace(/\s/g,'_')}_${todayStr()}.csv`)
  }

  const dlTXT = () => dlBlob(new Blob([exportText],{type:'text/plain;charset=utf-8;'}),
    `pedido_${tabLabel.replace(/\s/g,'_')}_${todayStr()}.txt`)

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <div>
            <h2 className="modal-title">Exportar Pedido</h2>
            <p className="modal-sub">{tabLabel} · {selectedItems.length} itens{caps.seePrices?` · ${fmtBRL(totalValue)}`:''}</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {split&&split.days>1&&(
          <div className="split-warning">
            ⚠️ Valor total ({fmtBRL(totalValue)}) ultrapassa o limite diário ({fmtBRL(split.limit)}).
            Divida em <strong>{split.days} pedidos</strong> de dias úteis consecutivos.
          </div>
        )}
        <div className="modal-options">
          <div className="option-group">
            <span className="option-label">Separador:</span>
            {[['semicolon','Ponto e vírgula ( ; )'],['tab','Tab'],['space','Espaços']].map(([id,lbl])=>(
              <label key={id} className="radio-label">
                <input type="radio" name="sep" value={id} checked={separator===id} onChange={()=>setSeparator(id)}/>
                {lbl}
              </label>
            ))}
          </div>
          {activeTab==='OUTROS'&&(
            <label className="filter-toggle">
              <input type="checkbox" checked={groupBrand} onChange={e=>setGroupBrand(e.target.checked)}/>
              <span>Agrupar por marca</span>
            </label>
          )}
        </div>
        <div className="modal-preview">
          <div className="modal-preview-header"><span>Prévia</span><span>{selectedItems.length} linhas</span></div>
          <textarea id="exp-ta" className="export-textarea" readOnly value={exportText}
            rows={Math.min(12,selectedItems.length+2)}/>
        </div>
        {caps.seePrices&&selectedItems.length>0&&(
          <div className="modal-items">
            <table className="export-summary-table">
              <thead><tr><th>Código</th><th>Descrição</th><th>Marca</th><th>Qtd</th><th>PV</th><th>Total</th></tr></thead>
              <tbody>
                {selectedItems.map(i=>(
                  <tr key={i.id}>
                    <td className="mono">{i.code}</td>
                    <td className="desc-cell" title={i.description}>{i.description}</td>
                    <td><span className="brand-badge">{i.brand}</span></td>
                    <td className="num">{i.exportQty}</td>
                    <td className="num">{i.pv>0?fmtBRL(i.pv):'—'}</td>
                    <td className="num"><strong>{fmtBRL(i.exportQty*i.pv)}</strong></td>
                  </tr>
                ))}
              </tbody>
              <tfoot><tr><td colSpan={4}><strong>Total</strong></td><td/><td className="num"><strong>{fmtBRL(totalValue)}</strong></td></tr></tfoot>
            </table>
          </div>
        )}
        <div className="modal-actions">
          <button className={`btn ${copied?'btn-success':'btn-yellow'}`} onClick={doCopy}>{copied?'✅ Copiado!':'📋 Copiar'}</button>
          <button className="btn btn-secondary" onClick={dlCSV}>⬇️ CSV (ERP)</button>
          <button className="btn btn-secondary" onClick={dlTXT}>⬇️ TXT</button>
          <button className="btn btn-ghost" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: ProductSearchTab
// ═══════════════════════════════════════════════════════════
function ProductSearchTab({ rawItems, priceMap, discontinuedMap, purchaseHistory, purchaseRequests, productOverrides, availMap, role, caps }) {
  const [search,    setSearch]    = useState('')
  const [cityGroup, setCityGroup] = useState('BELTRAO')
  const [results,   setResults]   = useState([])
  const [showReq,   setShowReq]   = useState(null)

  const doSearch = useCallback(() => {
    if (!search.trim()) { setResults([]); return }
    const q = normStr(search)
    const codes = new Set()
    rawItems.forEach(i => {
      if (normStr(i.code).includes(q)||normStr(i.description).includes(q)) codes.add(i.code)
    })
    priceMap.forEach((_,k) => { if(normStr(k).includes(q)) codes.add(k) })
    // Inclui também todos os encerrados da tabela de preços
    discontinuedMap.forEach((_,k) => { if(normStr(k).includes(q)) codes.add(k) })

    const res = [...codes].map(code => {
      const rawI  = rawItems.find(i=>i.code===code) ?? {}
      const price = priceMap.get(code) ?? {}
      const disc  = discontinuedMap.get(code)
      const status = getProductStatus(code, cityGroup, rawItems, purchaseHistory, purchaseRequests, discontinuedMap, productOverrides, availMap, priceMap)
      const arrival = getArrivalDate(price.ufOrigem||'', price.brand||rawI.brand||'')
      return {
        code,
        description: rawI.description || disc?.description || (disc ? code : code),
        brand:       price.brand || rawI.brand || '',
        pv:          price.pv || 0,
        ufOrigem:    price.ufOrigem || '',
        status,
        arrival,
      }
    })
    setResults(res)
  }, [search, cityGroup, rawItems, purchaseHistory, purchaseRequests, discontinuedMap, priceMap])

  return (
    <div className="search-tab">
      <h2 className="page-title">Pesquisa de Produtos</h2>
      <p className="page-subtitle">Consulte disponibilidade e status em tempo real</p>
      <div className="search-controls">
        <input className="search-input" type="text" placeholder="Código ou descrição..."
          value={search} onChange={e=>setSearch(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
        <select className="filter-select" value={cityGroup} onChange={e=>setCityGroup(e.target.value)}>
          <option value="BELTRAO">Beltrão</option>
          <option value="TOLEDO">Toledo</option>
          <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
        </select>
        <button className="btn btn-yellow" onClick={doSearch}>🔍 Buscar</button>
      </div>

      {results.length>0&&(
        <div className="search-results">
          <table className="product-table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Marca</th>
                {caps.seePrices&&<th>PV</th>}
                <th>Status</th>
                <th>Previsão</th>
                {role==='SELLER'&&<th>Ação</th>}
              </tr>
            </thead>
            <tbody>
              {results.map((item,idx)=>{
                const cfg = STATUS_CFG[item.status.type] ?? STATUS_CFG.SEM_ESTOQUE
                const now = new Date()
                const hasArrival = ['COMPRADO_COM_PREV','COMPRADO_FATURADO'].includes(item.status.type)
                const arrD = hasArrival&&item.status.arrivalDate ? new Date(item.status.arrivalDate) : null
                const daysToArr = arrD ? bizDaysBetween(now, arrD) : null
                const arrColor  = daysToArr===null?'var(--muted)':daysToArr<7?'var(--success)':daysToArr<=15?'var(--warning)':'var(--danger)'
                const renderPrev = () => {
                  const t = item.status.type
                  if (['ENCERRADO','ENCERRADO_COM_SUB','CONSULTAR_COMPRAS'].includes(t))
                    return <span style={{color:'var(--muted)'}}>—</span>
                  if (t==='SEM_ESTOQUE'||t==='COMPRADO_SEM_PREV'||t==='SEM_INFORMACAO')
                    return <span style={{color:'var(--muted)'}}>Sem previsão</span>
                  if (t==='COMPRADO_AGUARD_FAT')
                    return <span style={{color:'var(--warning)',fontSize:12}}>Ag. faturamento</span>
                  if (['COMPRADO_COM_PREV','COMPRADO_FATURADO'].includes(t)&&arrD)
                    return <span style={{color:arrColor}}>{fmtDate(arrD)}</span>
                  if (['COMPRADO_COM_PREV','COMPRADO_FATURADO'].includes(t)&&!arrD)
                    return <span style={{color:'var(--muted)'}}>Em trânsito</span>
                  if (t==='DISPONIVEL_IMEDIATO'||t==='AGUARDANDO_COMPRA') {
                    // Produto disponível agora: mín = hoje + transit por UF
                    const minArr = getArrivalDate(item.ufOrigem||'', item.brand||'')
                    return <span style={{color:'var(--info)',fontSize:12}}>Mín. {fmtDate(minArr)}</span>
                  }
                  if (t==='DISPONIVEL_MES') {
                    // Produto disponível em até 30 dias: mín = hoje + 30 dias corridos
                    const d = new Date(); d.setDate(d.getDate() + 30)
                    return <span style={{color:'var(--warning)',fontSize:12}}>Mín. {fmtDate(d)}</span>
                  }
                  return <span style={{color:'var(--muted)'}}>—</span>
                }
                return (
                  <tr key={item.code} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                    <td className="mono">{item.code}</td>
                    <td>{item.description}</td>
                    <td><span className="brand-badge">{item.brand||'—'}</span></td>
                    {caps.seePrices&&<td className="num">{item.pv>0?fmtBRL(item.pv):'—'}</td>}
                    <td>
                      <span className="status-badge" style={{background:cfg.bg,color:cfg.txt}}>{cfg.label}</span>
                      {item.status.type==='ENCERRADO_COM_SUB'&&item.status.substituteName&&(
                        <div className="sub-info">→ Substituto: <strong>{item.status.substitute||''}</strong>{item.status.substitute ? ' — ' + item.status.substituteName.replace(item.status.substitute,'').replace(/^[\s\-–—]+/,'') : item.status.substituteName}</div>
                      )}
                      {item.status.type==='DISPONIVEL_IMEDIATO'&&(
                        <div className="sub-info">Estoque: {item.status.stock}</div>
                      )}
                    </td>
                    <td>{renderPrev()}</td>
                    {role==='SELLER'&&(
                      <td>
                        {!['ENCERRADO','ENCERRADO_COM_SUB'].includes(item.status.type)&&(
                          <button className="btn btn-yellow btn-sm" onClick={()=>setShowReq(item)}>Solicitar</button>
                        )}
                      </td>
                    )}
                  </tr>
                )
              })}
            </tbody>
          </table>
        </div>
      )}

      {results.length===0&&search&&(
        <div className="table-empty"><div className="table-empty-icon">🔍</div><p>Nenhum produto encontrado para "{search}"</p></div>
      )}

      {showReq&&(
        <RequestModal item={showReq} cityGroup={cityGroup}
          purchaseHistory={purchaseHistory} purchaseRequests={purchaseRequests}
          onClose={()=>setShowReq(null)}
          onSubmit={req=>{
            const reqs=[...getRequests(),req]
            saveRequests(reqs)
            setShowReq(null)
          }}/>
      )}
    </div>
  )
}

// COMPONENT: RequestModal
// ═══════════════════════════════════════════════════════════
function RequestModal({ item, cityGroup: cityGroupProp, purchaseHistory, purchaseRequests, onClose, onSubmit }) {
  const [qty,        setQty]        = useState(1)
  const [obs,        setObs]        = useState('')
  const [tipo,       setTipo]       = useState('ESTOQUE')
  const [city,       setCity]       = useState(cityGroupProp||'BELTRAO')
  const [sellerName, setSellerName] = useState(()=>sessionStorage.getItem('sc_name')||'')
  const [errors,     setErrors]     = useState({})
  const [warn,       setWarn]       = useState(null)
  const [blocked,    setBlocked]    = useState(false)

  useEffect(()=>{
    const now = new Date()
    const isDisc = item.status.type==='ENCERRADO'||item.status.type==='ENCERRADO_COM_SUB'
    if (isDisc) {
      setBlocked(true)
      setWarn(`Produto descontinuado / fora de linha.${item.status.substitute?` Substituto: ${item.status.substitute}`:''}`)
      return
    }
    const recent = purchaseHistory.find(h =>
      h.code===item.code && h.cityGroup===city &&
      (now-new Date(h.date))/86400000 <= 8)
    if (recent) {
      const days = Math.floor((now-new Date(recent.date))/86400000)
      setWarn(`Este produto foi comprado há ${days} dias (${fmtDate(recent.date)}). Confirme se realmente deseja solicitar novamente.`)
    } else { setWarn(null) }
  },[item,city,purchaseHistory])

  const submit = () => {
    const errs = {}
    if (!sellerName.trim()) errs.sellerName = 'Informe seu nome'
    if (!obs.trim()) errs.obs = 'Observação é obrigatória'
    if (Object.keys(errs).length) { setErrors(errs); return }
    onSubmit({
      id:          Date.now().toString(),
      code:        item.code,
      description: item.description,
      brand:       item.brand,
      cityGroup:   city,
      qty,
      tipo,
      observation: obs,
      status:      'PENDENTE',
      createdAt:   new Date().toISOString(),
      createdBy:   sellerName.trim(),
    })
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2 className="modal-title">Solicitar Compra</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="request-product-info">
            <span className="mono" style={{color:'var(--accent)',fontWeight:700}}>{item.code}</span>
            <span>{item.description}</span>
            <span><span className="brand-badge">{item.brand||'—'}</span></span>
          </div>
          {warn&&<div className={`alert ${blocked?'alert-error':'alert-warning'}`}>⚠️ {warn}</div>}
          {!blocked&&(
            <>
              <div className="form-field">
                <label>Seu nome <span style={{color:'var(--danger)'}}>*</span></label>
                <input className={`login-input${errors.sellerName?' input-error':''}`} value={sellerName}
                  onChange={e=>{setSellerName(e.target.value);setErrors(p=>({...p,sellerName:''}))}}
                  placeholder="Nome do vendedor"/>
                {errors.sellerName&&<span className="field-error">{errors.sellerName}</span>}
              </div>
              <div className="form-field">
                <label>Cidade</label>
                <select className="filter-select" style={{width:'100%'}} value={city} onChange={e=>setCity(e.target.value)}>
                  <option value="BELTRAO">Beltrão</option>
                  <option value="TOLEDO">Toledo</option>
                  <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
                </select>
              </div>
              <div className="form-field">
                <label>Quantidade</label>
                <input type="number" className="login-input" min="1" value={qty}
                  onChange={e=>setQty(parseInt(e.target.value)||1)}/>
              </div>
              <div className="form-field">
                <label>Tipo de solicitação</label>
                <select className="filter-select" style={{width:'100%'}} value={tipo} onChange={e=>setTipo(e.target.value)}>
                  <option value="ESTOQUE">Estoque</option>
                  <option value="VENDA_CASADA">Venda Casada</option>
                  <option value="PROJETO">Projeto</option>
                </select>
              </div>
              <div className="form-field">
                <label>Observação <span style={{color:'var(--danger)'}}>*</span></label>
                <textarea className={`obs-textarea${errors.obs?' input-error':''}`} value={obs}
                  onChange={e=>{setObs(e.target.value);setErrors(p=>({...p,obs:''}))}}
                  placeholder="Motivo da solicitação, urgência, cliente aguardando..."/>
                {errors.obs&&<span className="field-error">{errors.obs}</span>}
              </div>
            </>
          )}
        </div>
        <div className="modal-actions">
          {!blocked&&<button className="btn btn-yellow" onClick={submit}>Enviar Solicitação</button>}
          <button className="btn btn-ghost" onClick={onClose}>{blocked?'Fechar':'Cancelar'}</button>
        </div>
      </div>
    </div>
  )
}

function StatusOverrideModal({ item, currentOverride, onClose, onSave, onClear }) {
  const [status,      setStatus]      = useState(currentOverride?.status||'COMPRADO_COM_PREV')
  const [arrivalDate, setArrivalDate] = useState(currentOverride?.arrivalDate||todayStr())
  const [notes,       setNotes]       = useState(currentOverride?.notes||'')
  const needsDate = status==='COMPRADO_COM_PREV'||status==='DISPONIVEL_MES'
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <h2 className="modal-title">Definir Status Manual</h2>
            <p className="modal-sub">{item.code} · {item.description.slice(0,45)}</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-field">
            <label>Status</label>
            <select className="filter-select" style={{width:'100%'}} value={status} onChange={e=>setStatus(e.target.value)}>
              <option value="COMPRADO_COM_PREV">Comprado — com previsão de chegada</option>
              <option value="COMPRADO_SEM_PREV">Comprado — sem previsão</option>
              <option value="AGUARDANDO_COMPRA">Aguardando compra</option>
              <option value="DISPONIVEL_MES">Disponível em até 30 dias</option>
            </select>
          </div>
          {needsDate && (
            <div className="form-field">
              <label>Previsão de Chegada</label>
              <input type="date" className="login-input" value={arrivalDate} onChange={e=>setArrivalDate(e.target.value)}/>
            </div>
          )}
          <div className="form-field">
            <label>Observação (NF, pedido...)</label>
            <textarea className="obs-textarea" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="NF, número do pedido, info adicional..."/>
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn btn-yellow" onClick={()=>onSave({status, arrivalDate:needsDate?arrivalDate:null, notes})}>Salvar</button>
          {currentOverride && <button className="btn btn-danger" onClick={onClear}>Limpar Status Manual</button>}
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  )
}

function DisponibilidadeTab({ rawItems, priceMap, discontinuedMap, purchaseHistory, purchaseRequests, productOverrides, onUpdateOverrides, availMap, onUpdateAvailMap, onNewRequest, caps }) {
  const [search,      setSearch]      = useState('')
  const dSearch = useDebounce(search, 250)
  const [showAll,     setShowAll]     = useState(false)
  const [cityGroup,   setCityGroup]   = useState('BELTRAO')
  const [editItem,    setEditItem]    = useState(null)
  const [requestItem, setRequestItem] = useState(null)
  const [uploading,   setUploading]   = useState(false)
  const [uploadErr,   setUploadErr]   = useState(null)

  const availLoaded = availMap && availMap.size > 0

  // Unique empresas (lojas) sorted
  const empresas = useMemo(() => {
    const s = new Set()
    rawItems.forEach(i => s.add(i.empresa))
    return [...s].sort()
  }, [rawItems])

  // Consolidate by code only (show all lojas)
  const byCode = useMemo(() => {
    const map = new Map()
    rawItems.forEach(item => {
      if (!map.has(item.code)) {
        map.set(item.code, { code:item.code, description:item.description, family:item.family, brand:item.brand, empresaStock:{}, totalStock:0, totalSuggestion:0 })
      }
      const g = map.get(item.code)
      g.empresaStock[item.empresa] = (g.empresaStock[item.empresa]||0) + item.stock
      g.totalStock += item.stock
      g.totalSuggestion += item.suggestion
    })
    // Inclui itens da planilha de disponibilidade que não estão no relatório de estoque
    availMap?.forEach((av, code) => {
      if (!map.has(code)) {
        map.set(code, { code, description: av.description || code, family:'', brand:'INTELBRAS', empresaStock:{}, totalStock:0, totalSuggestion:0 })
      }
    })
    return [...map.values()]
  }, [rawItems, availMap])

  const filtered = useMemo(() => {
    let items = byCode
    if (!showAll) items = items.filter(i => i.totalSuggestion > 0 || (availMap?.has(i.code)))
    if (dSearch) { const q=normStr(dSearch); items=items.filter(i=>normStr(i.code).includes(q)||normStr(i.description).includes(q)) }
    return items.sort((a,b) => b.totalSuggestion - a.totalSuggestion)
  }, [byCode, showAll, dSearch, availMap])

  const handleAvailUpload = async file => {
    if (!file) return
    setUploading(true); setUploadErr(null)
    try {
      const wb = await readWb(file)
      const am = parseAvailability(wb)
      if (am.size === 0) throw new Error('Nenhum dado encontrado. Verifique se é a planilha de disponibilidade correta.')
      saveAvailMap(am)
      onUpdateAvailMap(am)
    } catch(e) { setUploadErr(e.message) }
    finally { setUploading(false) }
  }

  const getStatus = item => getProductStatus(item.code, cityGroup, rawItems, purchaseHistory, purchaseRequests, discontinuedMap, productOverrides, availMap, priceMap)

  const applyOverride = (code, data) => {
    const next = { ...productOverrides }
    const key = `${code}__BELTRAO`; const key2 = `${code}__TOLEDO`
    if (!data) { delete next[key]; delete next[key2] }
    else { next[key] = { ...data, setAt:new Date().toISOString() }; next[key2] = { ...data, setAt:new Date().toISOString() } }
    onUpdateOverrides(next); saveOverrides(next)
  }

  return (
    <div>
      <div className="page-header">
        <div><h2 className="page-title">📋 Disponibilidade</h2>
          <p className="page-subtitle">Estoque nas lojas · Disponibilidade Intelbras · Status para vendedores</p></div>
      </div>

      {/* Upload planilha de disponibilidade — apenas para quem pode fazer upload */}
      {caps?.canUpload ? (
        <div style={{background:'var(--card)',border:`1px solid ${availLoaded?'var(--success)':'var(--warning)'}`,borderRadius:'var(--r)',padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:1}}>
            <span style={{fontWeight:700,color:availLoaded?'var(--success)':'var(--warning)',fontSize:13}}>
              {availLoaded ? `✅ Disponibilidade Intelbras carregada — ${availMap.size} produtos` : '⚠️ Planilha de disponibilidade não carregada — status indisponível para vendedores'}
            </span>
            {uploadErr && <div style={{color:'var(--danger)',fontSize:12,marginTop:4}}>⚠️ {uploadErr}</div>}
          </div>
          <label style={{cursor:uploading?'wait':'pointer'}}>
            <input type="file" accept=".xls,.xlsx" hidden disabled={uploading}
              onChange={e=>e.target.files[0]&&handleAvailUpload(e.target.files[0])}/>
            <span className={`btn btn-sm ${availLoaded?'btn-ghost':'btn-yellow'}`}>
              {uploading?<><span className="spinner"/>Carregando...</>:availLoaded?'↑ Atualizar Planilha':'↑ Carregar Planilha de Disponibilidade Intelbras'}
            </span>
          </label>
        </div>
      ) : availLoaded && (
        <div style={{background:'var(--success-bg)',border:'1px solid var(--success)',borderRadius:'var(--r)',padding:'10px 16px',marginBottom:16,fontSize:13,color:'var(--success)',fontWeight:600}}>
          ✅ Disponibilidade Intelbras carregada — {availMap.size} produtos
        </div>
      )}

      <div className="filter-bar">
        <input className="filter-search" placeholder="Buscar código ou descrição..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="filter-select" value={cityGroup} onChange={e=>setCityGroup(e.target.value)}>
          <option value="BELTRAO">Beltrão + DV</option>
          <option value="TOLEDO">Toledo</option>
        </select>
        <label className="filter-toggle">
          <input type="checkbox" checked={showAll} onChange={e=>setShowAll(e.target.checked)}/>
          <span>Mostrar todos os itens</span>
        </label>
        <span style={{fontSize:12,color:'var(--muted)'}}>{filtered.length} itens</span>
      </div>

      {filtered.length===0
        ?<div className="table-empty"><div className="table-empty-icon">📋</div><p>Nenhum item.</p></div>
        :(
          <div className="table-scroll" style={{overflowX:'auto'}}>
            <table className="product-table" style={{minWidth:Math.max(900,700+empresas.length*80)}}>
              <thead>
                <tr>
                  <th>Código</th>
                  <th>Descrição</th>
                  {empresas.map(e=><th key={e} className="num" title={e} style={{fontSize:10}}>{e.replace(/ /g,'\u00A0').slice(0,12)}</th>)}
                  <th className="num" style={{color:'var(--success)'}} title="Disponibilidade Imediata — Origem">Imediato</th>
                  <th className="num" style={{color:'var(--info)'}} title="Disponibilidade P/ Mês — Origem">P/ Mês</th>
                  <th>Status</th>
                  <th>Previsão</th>
                  <th style={{minWidth:140}}>Ações</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((item,idx)=>{
                  const av = availMap?.get(item.code)
                  const status = getStatus(item)
                  const cfg = STATUS_CFG[status.type]??STATUS_CFG.SEM_INFORMACAO
                  const hasOverride = !!(productOverrides?.[`${item.code}__BELTRAO`])
                  return (
                    <tr key={item.code} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                      <td className="mono">{item.code}</td>
                      <td title={item.description} style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.description}</td>
                      {empresas.map(e=>(
                        <td key={e} className="num" style={{color:(item.empresaStock[e]||0)>0?'var(--success)':'var(--muted2)',fontWeight:(item.empresaStock[e]||0)>0?700:400}}>
                          {item.empresaStock[e]||0}
                        </td>
                      ))}
                      <td className="num" style={{color:av?.origemImediato?'var(--success)':'var(--muted2)',fontWeight:700}}>
                        {av ? (av.origemImediato ? 'Sim' : 'Não') : '—'}
                      </td>
                      <td className="num" style={{color:av?.origemMes?'var(--info)':'var(--muted2)'}}>
                        {av ? (av.origemMes ? 'Sim' : 'Não') : '—'}
                      </td>
                      <td>
                        <span className="status-badge" style={{background:cfg.bg,color:cfg.txt}}>{cfg.label}</span>
                        {hasOverride&&<span style={{marginLeft:4,fontSize:10,color:'var(--accent)'}}>✏️</span>}
                      </td>
                      <td style={{fontSize:12,color:'var(--muted)'}}>{status.arrivalDate?fmtDate(status.arrivalDate):'—'}</td>
                      <td style={{display:'flex',gap:3,flexWrap:'nowrap'}}>
                        <button className="btn btn-sm btn-yellow" onClick={()=>setRequestItem(item)}>+ Solicitar</button>
                        {caps?.canUpload&&<button className="btn btn-sm btn-ghost" onClick={()=>setEditItem(item)} title="Status manual">✏️</button>}
                        {caps?.canUpload&&hasOverride&&<button className="btn btn-sm btn-danger" onClick={()=>applyOverride(item.code,null)} title="Limpar">✕</button>}
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>
        )
      }

      {editItem&&(
        <StatusOverrideModal item={editItem}
          currentOverride={productOverrides?.[`${editItem.code}__BELTRAO`]}
          onClose={()=>setEditItem(null)}
          onSave={data=>{applyOverride(editItem.code,data);setEditItem(null)}}
          onClear={()=>{applyOverride(editItem.code,null);setEditItem(null)}}/>
      )}

      {requestItem&&(
        <DisponibilidadeRequestModal item={requestItem}
          purchaseHistory={purchaseHistory} purchaseRequests={purchaseRequests}
          onClose={()=>setRequestItem(null)}
          onSubmit={req=>{onNewRequest(req);setRequestItem(null)}}/>
      )}
    </div>
  )
}

function DisponibilidadeRequestModal({ item, purchaseHistory, purchaseRequests, onClose, onSubmit }) {
  const [cityGroup,  setCityGroup]  = useState('BELTRAO')
  const [qty,        setQty]        = useState(1)
  const [obs,        setObs]        = useState('')
  const [tipo,       setTipo]       = useState('ESTOQUE')
  const [sellerName, setSellerName] = useState(()=>sessionStorage.getItem('sc_name')||'')
  const [errors,     setErrors]     = useState({})
  const alreadyPending = purchaseRequests.some(r=>r.code===item.code&&r.cityGroup===cityGroup&&r.status==='PENDENTE')
  const recentPurchase = purchaseHistory.find(h=>h.code===item.code&&h.cityGroup===cityGroup&&(new Date()-new Date(h.date))/86400000<=30)

  const submit = () => {
    const errs = {}
    if (!sellerName.trim()) errs.sellerName = 'Informe seu nome'
    if (!obs.trim()) errs.obs = 'Observação é obrigatória'
    if (Object.keys(errs).length) { setErrors(errs); return }
    onSubmit({id:Date.now().toString(),code:item.code,description:item.description,brand:item.brand||'',cityGroup,qty,tipo,observation:obs,status:'PENDENTE',createdAt:new Date().toISOString(),createdBy:sellerName.trim()})
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div><h2 className="modal-title">Solicitar Compra</h2>
            <p className="modal-sub">{item.code} · {item.description.slice(0,40)}</p></div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {recentPurchase&&<div className="alert alert-warning">⚠️ Este produto foi comprado há {Math.floor((new Date()-new Date(recentPurchase.date))/86400000)} dia(s) ({fmtDate(recentPurchase.date)}). Confirme se realmente deseja solicitar novamente.</div>}
          {alreadyPending&&<div className="alert alert-warning">⚠️ Já existe uma solicitação pendente para esta cidade.</div>}
          <div className="form-field">
            <label>Seu nome <span style={{color:'var(--danger)'}}>*</span></label>
            <input className={`login-input${errors.sellerName?' input-error':''}`} value={sellerName}
              onChange={e=>{setSellerName(e.target.value);setErrors(p=>({...p,sellerName:''}))}}
              placeholder="Nome do vendedor"/>
            {errors.sellerName&&<span className="field-error">{errors.sellerName}</span>}
          </div>
          <div className="form-field">
            <label>Cidade</label>
            <select className="filter-select" style={{width:'100%'}} value={cityGroup} onChange={e=>setCityGroup(e.target.value)}>
              <option value="BELTRAO">Beltrão</option>
              <option value="TOLEDO">Toledo</option>
              <option value="DOIS_VIZINHOS">Dois Vizinhos</option>
            </select>
          </div>
          <div className="form-field">
            <label>Quantidade</label>
            <input type="number" className="login-input" min="1" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)}/>
          </div>
          <div className="form-field">
            <label>Tipo de solicitação</label>
            <select className="filter-select" style={{width:'100%'}} value={tipo} onChange={e=>setTipo(e.target.value)}>
              <option value="ESTOQUE">Estoque</option>
              <option value="VENDA_CASADA">Venda Casada</option>
              <option value="PROJETO">Projeto</option>
            </select>
          </div>
          <div className="form-field">
            <label>Observação <span style={{color:'var(--danger)'}}>*</span></label>
            <textarea className={`obs-textarea${errors.obs?' input-error':''}`} value={obs}
              onChange={e=>{setObs(e.target.value);setErrors(p=>({...p,obs:''}))}}
              placeholder="Motivo, urgência, cliente aguardando..."/>
            {errors.obs&&<span className="field-error">{errors.obs}</span>}
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn btn-yellow" onClick={submit}>Enviar Solicitação</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMPONENT: PedidosTab (visão do Vendedor)
// ═══════════════════════════════════════════════════════════
function PedidosTab({ purchaseHistory, productOverrides, rawItems, priceMap, purchaseRequests, availMap }) {
  const [lojaFilter,   setLojaFilter]   = useState('TODOS')
  const [statusFilter, setStatusFilter] = useState('TODOS')
  const [search,       setSearch]       = useState('')

  // Lojas disponíveis a partir do histórico
  const lojas = useMemo(() => {
    const s = new Set(purchaseHistory.map(h=>h.cityGroup).filter(Boolean))
    return [...s].sort()
  }, [purchaseHistory])

  const items = useMemo(() => {
    const now = new Date()
    // Pedidos do histórico (últimos 90 dias)
    const fromHistory = purchaseHistory
      .filter(h => Math.floor((now - new Date(h.date)) / 86400000) <= 90)
      .map(h => {
        const price    = priceMap?.get(h.code)
        const ufOrigem = h.ufOrigem || price?.ufOrigem || ''
        const brand    = h.brand || price?.brand || ''
        // Só calcula estimativa quando havia disponibilidade confirmada (Imediato ou P/Mês)
        // SEM_DISPONIBILIDADE ou sem availType = não é possível estimar prazo
        let arrivalDate = null
        let estimated   = false
        if (h.arrivalDate) {
          arrivalDate = h.arrivalDate  // data explícita registrada — confiável
        } else if (h.date && (h.availType==='DISPONIVEL_IMEDIATO'||h.availType==='DISPONIVEL_MES'||(
            !h.availType && (() => { const av=availMap?.get(h.code); return !av||(av.origemImediato||av.origemMes) })())))  {
          let days = UF_DAYS[ufOrigem]
          if (!days) { const nb = normStr(brand); days = nb.includes('intelbras') ? UF_DAYS.SC : 10 }
          arrivalDate = addBizDays(h.date, days).toISOString().slice(0,10)
          estimated = true
        }
        const req = h.fromRequest ? (purchaseRequests||[]).find(r=>r.id===h.fromRequest) : null
        return {
          code: h.code, description: h.description||h.code, brand,
          cityGroup: h.cityGroup, qty: h.qty, pv: h.pv||0,
          purchaseDate: h.date, arrivalDate, estimated,
          availType: h.availType||'', ufOrigem, notes: h.notes||'',
          fromRequest: !!h.fromRequest, requestedBy: req?.createdBy||null,
        }
      })
    // Overrides manuais de status comprado
    const fromOverrides = Object.entries(productOverrides||{})
      .filter(([,v]) => v.status==='COMPRADO_COM_PREV'||v.status==='COMPRADO_SEM_PREV')
      .map(([key, v]) => {
        const [code, cityGroup] = key.split('__')
        const ri = rawItems.find(i=>i.code===code)||{}
        return { code, description:ri.description||code, brand:ri.brand||'', cityGroup, qty:'—', pv:0,
          purchaseDate:v.setAt?v.setAt.slice(0,10):'—', arrivalDate:v.arrivalDate||null, availType:'override', notes:v.notes||'' }
      })
    const now2 = new Date()
    let all = [...fromHistory, ...fromOverrides]
    if (lojaFilter!=='TODOS') all = all.filter(i=>i.cityGroup===lojaFilter)
    if (statusFilter==='EM_TRANSITO') all = all.filter(i=>i.arrivalDate && new Date(i.arrivalDate) >= now2)
    if (statusFilter==='ATRASADO')    all = all.filter(i=>i.arrivalDate && new Date(i.arrivalDate) < now2)
    if (statusFilter==='SEM_PREV')    all = all.filter(i=>!i.arrivalDate)
    if (search) { const q=normStr(search); all=all.filter(i=>normStr(i.code).includes(q)||normStr(i.description).includes(q)) }
    return all.sort((a,b)=>(b.purchaseDate||'').localeCompare(a.purchaseDate||''))
  }, [purchaseHistory, productOverrides, rawItems, lojaFilter, statusFilter, search, availMap])

  const AVAIL_LABEL = { DISPONIVEL_IMEDIATO:'Imediato', DISPONIVEL_MES:'P/ Mês', SEM_DISPONIBILIDADE:'Sem disp.', override:'Manual' }
  const getAvailLabel = (item) => {
    if (item.availType && item.availType !== '') return AVAIL_LABEL[item.availType] || item.availType
    // Registro antigo sem availType — consulta disponibilidade atual no availMap
    const av = availMap?.get(item.code)
    if (!av) return '—'
    const imediato = av.origemImediato
    const mes      = av.origemMes
    if (imediato === true)  return 'Imediato'
    if (mes === true)       return 'P/ Mês'
    if (imediato === false || mes === false) return 'Sem disp.'
    return '—'
  }

  return (
    <div>
      <div className="page-header">
        <div>
          <h2 className="page-title">🚚 Pedidos Realizados</h2>
          <p className="page-subtitle">{items.length} pedido(s) — últimos 90 dias</p>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input className="filter-search" style={{minWidth:180}} placeholder="Buscar código..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select className="filter-select" value={lojaFilter} onChange={e=>setLojaFilter(e.target.value)}>
            <option value="TODOS">Todas as lojas</option>
            {lojas.map(l=><option key={l} value={l}>{l==='BELTRAO'?'Beltrão':l==='TOLEDO'?'Toledo':l}</option>)}
          </select>
          <select className="filter-select" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
            <option value="TODOS">Todos os status</option>
            <option value="EM_TRANSITO">Em trânsito</option>
            <option value="ATRASADO">Atrasados</option>
            <option value="SEM_PREV">Sem previsão</option>
          </select>
        </div>
      </div>
      {items.length===0
        ? <div className="table-empty"><div className="table-empty-icon">📭</div><p>Nenhum pedido nos últimos 90 dias.</p></div>
        : (
          <div className="table-scroll">
            <table className="product-table">
              <thead><tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Loja</th>
                <th className="num">Qtd</th>
                <th>Disponib.</th>
                <th>Origem</th>
                <th>Data</th>
                <th>Previsão Chegada</th>
              </tr></thead>
              <tbody>
                {items.map((item,idx) => {
                  const now = new Date()
                  const arrD = item.arrivalDate ? new Date(item.arrivalDate) : null
                  const daysTo = arrD ? Math.ceil((arrD - now) / 86400000) : null
                  const arrColor = daysTo===null ? 'var(--muted)'
                    : daysTo<0  ? 'var(--danger)'
                    : daysTo<7  ? 'var(--success)'
                    :              'var(--warning)'
                  return (
                    <tr key={item.code+item.cityGroup+idx} style={{background:idx%2===0?'var(--card)':'var(--surface)'}}>
                      <td className="mono">{item.code}</td>
                      <td title={item.description} style={{maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.description}</td>
                      <td><span className={`empresa-badge ${item.cityGroup==='BELTRAO'?'beltrao':item.cityGroup==='TOLEDO'?'toledo':'dv'}`}>{item.cityGroup==='BELTRAO'?'Beltrão':item.cityGroup==='TOLEDO'?'Toledo':'Dois Viz.'}</span></td>
                      <td className="num">{item.qty}</td>
                      <td style={{fontSize:11,color:'var(--muted)'}}>{getAvailLabel(item)}</td>
                      <td>
                        {item.fromRequest
                          ? <span style={{background:'var(--purple-bg)',color:'var(--purple)',fontSize:11,padding:'2px 7px',borderRadius:4,whiteSpace:'nowrap'}}>
                              📋 {item.requestedBy||'Solicitação'}
                            </span>
                          : <span style={{color:'var(--muted)',fontSize:11}}>Compra direta</span>
                        }
                      </td>
                      <td>{fmtDate(item.purchaseDate)}</td>
                      <td style={{color:arrColor}}>
                        {item.arrivalDate
                          ? <>
                              {item.estimated&&<span style={{color:'var(--muted)',fontSize:10,marginRight:3}} title="Estimativa baseada no prazo por UF de origem">~</span>}
                              {fmtDate(item.arrivalDate)}
                              {daysTo!==null&&daysTo>=0&&<span style={{fontSize:11,marginLeft:4}}>({daysTo}d)</span>}
                              {daysTo!==null&&daysTo<0&&<span style={{fontSize:11,marginLeft:4,color:'var(--danger)'}}>atrasado</span>}
                            </>
                          : <span style={{color:'var(--muted)'}}>Sem previsão</span>
                        }
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>
        )
      }
    </div>
  )
}

// COMPONENT: SolicitacaoDetailModal
// ═══════════════════════════════════════════════════════════
function SolicitacaoDetailModal({ req, users, caps, userName, priceMap, onClose, onSave }) {
  const [qty,      setQty]      = useState(req.qty || 1)
  const [response, setResponse] = useState(req.response || '')
  const seller = (users||[]).find(u => normStr(u.name) === normStr(req.createdBy || ''))

  const buildWaMsg = (status) => {
    const label = status === 'APROVADO' ? 'aprovada ✅' : status === 'RECUSADO' ? 'recusada ❌' : 'atualizada'
    let msg = `Olá ${req.createdBy}! Sua solicitação de compra foi ${label}:\n\n`
    msg += `📦 Código: ${req.code}\n`
    msg += `📝 ${(req.description||'').slice(0,60)}\n`
    msg += `🔢 Quantidade: ${qty} un.\n`
    msg += `🏪 Cidade: ${req.cityGroup==='BELTRAO'?'Beltrão':req.cityGroup==='TOLEDO'?'Toledo':'Dois Viz.'}\n`
    if (response.trim()) msg += `\n💬 ${response.trim()}`
    return msg
  }

  const sendWa = (status) => {
    if (!seller?.whatsapp) return
    const phone = '55' + seller.whatsapp.replace(/\D/g,'')
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(buildWaMsg(status))}`, '_blank')
  }

  const handleAction = (status) => {
    const updated = { ...req, qty: Number(qty), response: response.trim(), respondedBy: userName || '', respondedAt: new Date().toISOString(), status, resolvedAt: new Date().toISOString() }
    onSave(updated, status)
    sendWa(status)
    onClose()
  }

  const handleSaveQty = () => {
    const updated = { ...req, qty: Number(qty), response: response.trim() }
    onSave(updated, null)
    if (seller?.whatsapp && (Number(qty) !== req.qty || response.trim() !== (req.response||'').trim())) sendWa(null)
    onClose()
  }

  const tipoLabel = req.tipo==='VENDA_CASADA'?'Venda Casada':req.tipo==='PROJETO'?'Projeto':'Estoque'
  const canEdit = caps.canApprove

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:520}}>
        <div className="modal-header">
          <div>
            <h2 className="modal-title">📋 Solicitação de Compra</h2>
            <p className="modal-sub">{req.createdBy} · {fmtDate(req.createdAt)}</p>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Código</div>
              <div className="mono" style={{fontWeight:700}}>{req.code}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Cidade</div>
              <span className={`empresa-badge ${req.cityGroup==='BELTRAO'?'beltrao':req.cityGroup==='TOLEDO'?'toledo':'dv'}`}>
                {req.cityGroup==='BELTRAO'?'Beltrão':req.cityGroup==='TOLEDO'?'Toledo':'Dois Viz.'}
              </span>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Descrição</div>
              <div style={{fontWeight:600}}>{req.description}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Tipo</div>
              <span style={{fontSize:12,padding:'2px 8px',borderRadius:4,background:'var(--surface)',border:'1px solid var(--border)'}}>{tipoLabel}</span>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Status</div>
              <span className={`status-tag status-${(req.status||'').toLowerCase()}`}>{req.status}</span>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Quantidade</div>
              {canEdit
                ? <input type="number" min="1" className="filter-input" style={{width:80,padding:'4px 8px'}}
                    value={qty} onChange={e=>setQty(Math.max(1,parseInt(e.target.value)||1))}/>
                : <div style={{fontWeight:600}}>{req.qty}</div>
              }
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>Solicitante</div>
              <div>{req.createdBy}</div>
            </div>
          </div>
          {req.observation&&(
            <div style={{background:'var(--surface)',borderRadius:6,padding:'8px 12px',border:'1px solid var(--border)'}}>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Observação do solicitante</div>
              <div style={{fontSize:13}}>{req.observation}</div>
            </div>
          )}
          {req.response&&!canEdit&&(
            <div style={{background:'var(--info-bg)',borderRadius:6,padding:'8px 12px',border:'1px solid var(--info)'}}>
              <div style={{fontSize:11,color:'var(--info)',marginBottom:4}}>Resposta de {req.respondedBy||'Compras'}</div>
              <div style={{fontSize:13}}>{req.response}</div>
            </div>
          )}
          {canEdit&&(
            <div className="form-field">
              <label>Resposta / Observação</label>
              <textarea className="filter-input" rows={3} style={{width:'100%',resize:'vertical',fontFamily:'inherit',fontSize:13}}
                placeholder="Digite uma resposta para o vendedor (opcional)..."
                value={response} onChange={e=>setResponse(e.target.value)}/>
            </div>
          )}
          {!seller?.whatsapp&&canEdit&&(
            <div style={{fontSize:12,color:'var(--muted)'}}>⚠️ Vendedor sem WhatsApp cadastrado — notificação não será enviada.</div>
          )}
        </div>
        <div className="modal-actions" style={{justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div style={{display:'flex',gap:6}}>
            {canEdit&&req.status==='PENDENTE'&&(
              <>
                <button className="btn" style={{background:'var(--success-bg)',color:'var(--success)',border:'1px solid var(--success)'}}
                  onClick={()=>handleAction('APROVADO')}>✔ Aprovar{seller?.whatsapp?' + Notificar':''}</button>
                <button className="btn" style={{background:'var(--danger-bg)',color:'var(--danger)',border:'1px solid var(--danger)'}}
                  onClick={()=>handleAction('RECUSADO')}>✘ Recusar{seller?.whatsapp?' + Notificar':''}</button>
              </>
            )}
            {canEdit&&req.status!=='PENDENTE'&&seller?.whatsapp&&(
              <button className="btn btn-ghost" onClick={()=>sendWa(req.status)}>📱 Reenviar Notif. WA</button>
            )}
          </div>
          <div style={{display:'flex',gap:6}}>
            {canEdit&&(
              <button className="btn btn-yellow" onClick={handleSaveQty}>💾 Salvar{seller?.whatsapp&&(Number(qty)!==req.qty||response.trim()!==(req.response||'').trim())?' + Notificar':''}</button>
            )}
            <button className="btn btn-ghost" onClick={onClose}>Fechar</button>
          </div>
        </div>
      </div>
    </div>
  )
}
